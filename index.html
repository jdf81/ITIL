ute to one or more value chain activities, and activities draw on multiple practices","A practice maps to exactly one value chain activity","Practices are unrelated to the value chain","Only the service desk uses practices"],"answer":0,"explain":"There is a many-to-many relationship between practices and value chain activities.","id":318,"hash":"dbe6ee3af3"},{"domain":"D6","style":"standard","stem":"Which practice would maintain a continual improvement register (CIR)?","options":["Change enablement","Continual improvement","Incident management","Supplier management"],"answer":1,"explain":"The continual improvement practice maintains the CIR to track improvement opportunities.","id":319,"hash":"411256336d"},{"domain":"D6","style":"negative","stem":"Which of these is NOT a phase of problem management?","options":["Problem identification","Problem control","Error control","Change authorization"],"answer":3,"explain":"Change authorization belongs to change enablement, not problem management's three phases.","id":320,"hash":"9a1c1b208f"},{"domain":"D6","style":"negative","stem":"Which of these is NOT a type of change in ITIL 4?","options":["Standard","Normal","Emergency","Critical"],"answer":3,"explain":"'Critical' is not an ITIL 4 change type; the three are standard, normal, and emergency.","id":321,"hash":"0d6ff6d613"},{"domain":"D6","style":"list","stem":"Which TWO are service management practices? (Choose two.)","options":["Incident management","Risk management","Service level management","Workforce and talent management"],"answer":[0,2],"explain":"Incident management and service level management are service management practices; risk and workforce/talent management are general management practices.","id":322,"hash":"9067182b48"},{"domain":"D6","style":"list","stem":"Which TWO are general management practices? (Choose two.)","options":["Continual improvement","Incident management","Information security management","Service desk"],"answer":[0,2],"explain":"Continual improvement and information security management are general management practices; incident management and service desk are service management practices.","id":323,"hash":"8c959ff07d"},{"domain":"D6","style":"missing","stem":"Complete the definition: 'An incident is an unplanned interruption to a service or a reduction in the ____ of a service.'","options":["quality","cost","scope","schedule"],"answer":0,"explain":"An incident is an unplanned interruption or reduction in the quality of a service.","id":324,"hash":"820752a512"},{"domain":"D6","style":"missing","stem":"Complete the definition: 'A problem is a cause, or potential cause, of one or more ____.'","options":["incidents","changes","requests","events"],"answer":0,"explain":"A problem is a cause, or potential cause, of one or more incidents.","id":325,"hash":"ec4ed5f2dc"},{"domain":"D6","style":"missing","stem":"Complete the definition: 'A service request is a request from a user that initiates a service ____ agreed as a normal part of service delivery.'","options":["action","change","incident","event"],"answer":0,"explain":"A service request initiates a predefined service action that is a normal part of service delivery.","id":326,"hash":"5b61c7d04e"},{"domain":"D6","style":"standard","stem":"Which best describes the relationship between deployment and release?","options":["Identical","Neither touches production","Release always precedes deployment technically","A release can include multiple deployments, and deployment and release timing can differ"],"answer":3,"explain":"Deployment (moving components) and release (making functionality available) are distinct and can be timed independently.","id":327,"hash":"68c267eed0"},{"domain":"D6","style":"standard","stem":"Which practice ensures suppliers support seamless, quality products and services?","options":["Supplier management","Relationship management","Service level management","IT asset management"],"answer":0,"explain":"Supplier management ensures suppliers and their performance support quality delivery.","id":328,"hash":"a4aba024fe"},{"domain":"D6","style":"standard","stem":"Which practice nurtures the organization's relationships with stakeholders generally (not just suppliers)?","options":["Supplier management","Relationship management","Service level management","Incident management"],"answer":1,"explain":"Relationship management addresses stakeholder relationships broadly at strategic/tactical levels.","id":329,"hash":"1f8dbd71fa"},{"domain":"D6","style":"standard","stem":"Monitoring that simply gathers data without acting is part of which practice's scope?","options":["Problem management","Incident management","Monitoring and event management","Change enablement"],"answer":2,"explain":"Observation and recording of state changes (events) is monitoring and event management.","id":330,"hash":"d246a30c0b"},{"domain":"D6","style":"standard","stem":"Which practice would classify an alert as informational, warning, or exception?","options":["Monitoring and event management","Incident management","Service desk","Release management"],"answer":0,"explain":"Event classification (informational/warning/exception) is part of monitoring and event management.","id":331,"hash":"bb6ff81664"},{"domain":"D6","style":"standard","stem":"Which is the BEST description of the service desk's value beyond ticket logging?","options":["It eliminates other practices","It improves user experience and acts as the communications hub coordinating multiple practices","It authorizes changes","It replaces problem management"],"answer":1,"explain":"The service desk enhances user experience and coordinates across incident, request, and other practices.","id":332,"hash":"6e8f31e08f"},{"domain":"D6","style":"standard","stem":"Which practice would own the known error database / records?","options":["Change enablement","Incident management","Problem management","Service desk"],"answer":2,"explain":"Known errors are recorded and managed by problem management.","id":333,"hash":"a411685dad"},{"domain":"D6","style":"standard","stem":"Which is the correct purpose of change enablement (restated)?","options":["Find root causes","Eliminate all change","Restore services after failure","Maximize successful changes with appropriate risk assessment and authorization"],"answer":3,"explain":"Change enablement maximizes successful changes via risk assessment, authorization, and scheduling.","id":334,"hash":"0907e42051"},{"domain":"D6","style":"standard","stem":"Which practice category contains the largest number of practices?","options":["General management practices (14)","Service management practices (17)","Technical management practices (3)","They are equal"],"answer":1,"explain":"Service management practices number 17, the largest of the three categories.","id":335,"hash":"1fad020765"},{"domain":"D6","style":"standard","stem":"Which of the following correctly states the total number of ITIL 4 management practices?","options":["14","26","34","40"],"answer":2,"explain":"ITIL 4 defines 34 management practices in total.","id":336,"hash":"7a659dbc32"},{"domain":"D6","style":"standard","stem":"Which practice helps ensure information is available 'when and where needed' about service configurations?","options":["Release management","IT asset management","Monitoring and event management","Service configuration management"],"answer":3,"explain":"Service configuration management ensures CI information is available when and where needed.","id":337,"hash":"c00eaf3a87"},{"domain":"D6","style":"standard","stem":"Which practice category is 'infrastructure and platform management' in?","options":["Technical management practices","Service management practices","General management practices","None"],"answer":0,"explain":"Infrastructure and platform management is a technical management practice.","id":338,"hash":"cb5257fda5"},{"domain":"D6","style":"standard","stem":"Which statement about service requests vs incidents is correct?","options":["Both are unplanned failures","Incidents are predefined; requests are failures","Service requests are predefined normal actions; incidents are unplanned interruptions/quality reductions","They are the same"],"answer":2,"explain":"Requests are normal predefined actions; incidents are unplanned interruptions or quality reductions.","id":339,"hash":"28d7e9fb27"},{"domain":"D6","style":"standard","stem":"Which practice would you engage to define balanced, outcome-based metrics agreed with the customer?","options":["Deployment management","Supplier management","Incident management","Service level management"],"answer":3,"explain":"Service level management defines balanced, outcome-based, customer-relevant metrics.","id":340,"hash":"3de3864538"},{"domain":"D6","style":"standard","stem":"Which is the BEST reason ITIL renamed 'change management' to 'change enablement'?","options":["To stress facilitating valuable change with appropriate control rather than only gatekeeping","To remove risk assessment","To merge it with incident management","To eliminate authorization"],"answer":0,"explain":"The rename emphasizes enabling beneficial change with the right control, not merely blocking it.","id":341,"hash":"eef25c707b"},{"domain":"D6","style":"standard","stem":"A bank of monitoring alerts shows CPU at 95% but the service is still functioning. The alert is logged for awareness. This is which event type?","options":["Informational","Warning","Exception","Emergency"],"answer":1,"explain":"A 'warning' indicates something is approaching a threshold and may need attention, though service still functions.","id":342,"hash":"f7ec217a20"},{"domain":"D6","style":"standard","stem":"Which practice would handle the coordinated rollback if a deployment causes failures?","options":["Service level management","Problem management alone","Supplier management","Change enablement coordinating with deployment/release"],"answer":3,"explain":"Rollback of a failed change is coordinated through change enablement working with deployment/release.","id":343,"hash":"4f73a7ace5"},{"domain":"D6","style":"standard","stem":"A recurring incident is traced to a known error with an available workaround. Until a permanent fix is deployed, the workaround is managed by:","options":["Problem management (error control)","Incident management only","Change enablement","Service desk only"],"answer":0,"explain":"Managing known errors and their workarounds pending resolution is problem management's error control phase.","id":344,"hash":"0d2e97f28b"},{"domain":"D6","style":"standard","stem":"Which practice ensures that a new starter receives a laptop, accounts, and access on day one through predefined request fulfilment?","options":["Incident management","Service request management","IT asset management","Change enablement"],"answer":1,"explain":"Onboarding provisioning through predefined catalog actions is service request management (often with IT asset and access support).","id":345,"hash":"298ab1950f"},{"domain":"D6","style":"standard","stem":"Which practice would maintain accurate license counts to avoid compliance penalties?","options":["Supplier management","Service configuration management","IT asset management","Service level management"],"answer":2,"explain":"Tracking license entitlements and compliance is IT asset management.","id":346,"hash":"5e50aa7438"},{"domain":"D6","style":"standard","stem":"Which is the BEST example of utility delivered by a service desk tool?","options":["It lets users log requests and incidents (the functionality they need)","It is available 24/7","It has high uptime","It is fast"],"answer":0,"explain":"Logging requests/incidents is the functionality (utility). Uptime/speed are warranty aspects.","id":347,"hash":"507d19b2b8"},{"domain":"D6","style":"standard","stem":"Which is the BEST example of warranty for a service desk tool?","options":["It can log tickets","It is available and performs reliably during business hours","It has many features","It supports new request types"],"answer":1,"explain":"Availability and reliable performance are warranty (fit-for-use) characteristics.","id":348,"hash":"9ac5e5a589"},{"domain":"D6","style":"standard","stem":"Which practice would you use to systematically prioritize a backlog of improvement ideas?","options":["Change enablement","Incident management","Continual improvement (using the CIR)","Supplier management"],"answer":2,"explain":"The continual improvement practice prioritizes improvement ideas, often via a CIR.","id":349,"hash":"ed331bc123"},{"domain":"D6","style":"standard","stem":"Which practice is responsible for ensuring changes do not conflict by maintaining a schedule?","options":["Monitoring and event management","Release management","Deployment management","Change enablement"],"answer":3,"explain":"The change schedule, used to avoid conflicts, is maintained by change enablement.","id":350,"hash":"fe38ba3383"},{"domain":"D6","style":"standard","stem":"Which statement about emergency changes is correct?","options":["They skip all assessment and authorization","They follow an expedited assessment/authorization path due to urgency","They are the same as standard changes","They never affect production"],"answer":1,"explain":"Emergency changes still require assessment and authorization, but via an expedited path.","id":351,"hash":"6bcaed2da1"},{"domain":"D6","style":"standard","stem":"Which practice category does 'service level management' belong to?","options":["Technical management practices","General management practices","Service management practices","None"],"answer":2,"explain":"Service level management is a service management practice.","id":352,"hash":"13cb5faa58"},{"domain":"D6","style":"standard","stem":"Which practice category does 'supplier management' belong to?","options":["None","Service management practices","Technical management practices","General management practices"],"answer":3,"explain":"Supplier management is a general management practice.","id":353,"hash":"3651f5bd9e"},{"domain":"D6","style":"standard","stem":"Which practice category does 'relationship management' belong to?","options":["General management practices","Service management practices","Technical management practices","None"],"answer":0,"explain":"Relationship management is a general management practice.","id":354,"hash":"d31fa3fccc"},{"domain":"D6","style":"standard","stem":"Which practice category does 'information security management' belong to?","options":["Technical management practices","Service management practices","General management practices","None"],"answer":2,"explain":"Information security management is a general management practice.","id":355,"hash":"6d7f67c3ec"},{"domain":"D6","style":"standard","stem":"Which practice category does 'service configuration management' belong to?","options":["None","General management practices","Technical management practices","Service management practices"],"answer":3,"explain":"Service configuration management is a service management practice.","id":356,"hash":"79a3d1ae39"},{"domain":"D6","style":"standard","stem":"Which practice category does 'IT asset management' belong to?","options":["Service management practices","General management practices","Technical management practices","None"],"answer":0,"explain":"IT asset management is a service management practice.","id":357,"hash":"fc03dc41a7"},{"domain":"D6","style":"standard","stem":"Which practice category does 'monitoring and event management' belong to?","options":["General management practices","Service management practices","Technical management practices","None"],"answer":1,"explain":"Monitoring and event management is a service management practice.","id":358,"hash":"770b3244a7"},{"domain":"D6","style":"standard","stem":"Which practice category does 'release management' belong to?","options":["None","General management practices","Technical management practices","Service management practices"],"answer":3,"explain":"Release management is a service management practice.","id":359,"hash":"3309c62b20"},{"domain":"D6","style":"standard","stem":"Which practice category does 'change enablement' belong to?","options":["Service management practices","General management practices","Technical management practices","None"],"answer":0,"explain":"Change enablement is a service management practice.","id":360,"hash":"7c8b0929a7"},{"domain":"D6","style":"standard","stem":"Which practice category does 'problem management' belong to?","options":["General management practices","Service management practices","Technical management practices","None"],"answer":1,"explain":"Problem management is a service management practice.","id":361,"hash":"1918d1c285"},{"domain":"D6","style":"standard","stem":"Which of the following BEST captures the relationship between an event and an incident?","options":["All events are incidents","Incidents are a type of event that is always informational","Some events (exceptions) may indicate or lead to incidents, but not all events are incidents","They are unrelated"],"answer":2,"explain":"Events are state changes; only some (typically exceptions) indicate or trigger incidents.","id":362,"hash":"7ea468ce96"},{"domain":"D6","style":"standard","stem":"Which practice would define the 'single point of contact' service for users?","options":["Service desk","Incident management","Relationship management","Supplier management"],"answer":0,"explain":"The service desk provides the single point of contact for users.","id":363,"hash":"40165a7747"},{"domain":"D6","style":"standard","stem":"Which practice would be MOST involved in negotiating and reviewing SLAs with a customer?","options":["Supplier management","Service level management","Change enablement","Deployment management"],"answer":1,"explain":"SLA negotiation and review is service level management.","id":364,"hash":"67395c531c"},{"domain":"D6","style":"standard","stem":"Which practice would be MOST involved in managing underpinning contracts with vendors?","options":["Relationship management","Service level management","Supplier management","Incident management"],"answer":2,"explain":"Vendor/underpinning-contract management is supplier management.","id":365,"hash":"1b0d077af3"},{"domain":"D6","style":"standard","stem":"A service is technically available but a key report feature is missing, blocking the customer's task. This is primarily a failure of:","options":["Continuity","Warranty","Availability","Utility"],"answer":3,"explain":"Missing required functionality is a utility (fit-for-purpose) failure.","id":366,"hash":"bf4105a167"},{"domain":"D6","style":"standard","stem":"Which is the correct definition of a 'configuration item'?","options":["An unplanned interruption","Any component that needs to be managed to deliver a service","A predefined user action","A type of change"],"answer":1,"explain":"A CI is any component that must be managed to deliver an IT service.","id":367,"hash":"6f2a592310"},{"domain":"D6","style":"standard","stem":"Which is the correct definition of an 'IT asset'?","options":["A known error","Only physical servers","Any financially valuable component contributing to delivering an IT product/service","A workaround"],"answer":2,"explain":"An IT asset is any financially valuable component contributing to IT service delivery.","id":368,"hash":"fef2719df5"},{"domain":"D6","style":"standard","stem":"Which practice supports decisions on purchasing, reusing, and retiring assets across their lifecycle?","options":["Incident management","Service configuration management","Change enablement","IT asset management"],"answer":3,"explain":"Lifecycle decisions on assets are supported by IT asset management.","id":369,"hash":"5ef5984e0c"},{"domain":"D6","style":"standard","stem":"Which practice provides reliable CI data that incident and change practices often consume?","options":["Service configuration management","Supplier management","Service level management","Release management"],"answer":0,"explain":"Service configuration management supplies CI data consumed by many practices.","id":370,"hash":"5401e8fc3b"},{"domain":"D6","style":"standard","stem":"Which is true about the service desk and automation/self-service?","options":["Self-service is forbidden","Automation removes the need for users","Self-service portals and chatbots can extend the service desk and improve efficiency","The desk must be phone-only"],"answer":2,"explain":"Self-service and chatbots are common, efficiency-improving service desk channels.","id":371,"hash":"dccb0990ab"},{"domain":"D6","style":"list","stem":"Which TWO are technical management practices? (Choose two.)","options":["Deployment management","Incident management","Software development and management","Service desk"],"answer":[0,2],"explain":"Deployment management and software development and management are technical management practices; incident management and service desk are service management practices.","id":372,"hash":"c640f8c5c0"},{"domain":"D6","style":"negative","stem":"Which of the following is NOT a service value chain activity but IS a practice?","options":["Deployment","Engage","Plan","Improve"],"answer":0,"explain":"'Deployment' is a practice, not a value chain activity; Engage, Plan, and Improve are value chain activities.","id":373,"hash":"e88e87c623"},{"domain":"D6","style":"missing","stem":"Complete: 'An event is any change of ____ that has significance for the management of a CI or service.'","options":["state","cost","ownership","priority"],"answer":0,"explain":"An event is any change of state with management significance.","id":374,"hash":"3191ad65c2"},{"domain":"D6","style":"missing","stem":"Complete: 'Change enablement uses three change types: standard, normal, and ____.'","options":["emergency","critical","major","routine"],"answer":0,"explain":"The third change type is emergency.","id":375,"hash":"5771a2b864"},{"domain":"D6","style":"standard","stem":"Which practice would track whether agreed service performance targets are being met month to month?","options":["Release management","Incident management","Supplier management","Service level management"],"answer":3,"explain":"Ongoing tracking of performance against targets is service level management.","id":376,"hash":"4e8e5a19f9"},{"domain":"D6","style":"standard","stem":"Which practice is responsible for capturing the demand represented by incidents and requests at first contact?","options":["Service desk","Problem management","Change enablement","Monitoring and event management"],"answer":0,"explain":"The service desk captures demand for incident resolution and service requests at first contact.","id":377,"hash":"a017fc65fb"},{"domain":"D1","style":"missing","stem":"Value in ITIL 4 is described as the perceived benefits, usefulness, and ____ of something.","options":["importance","cost","risk","duration"],"answer":0,"explain":"Value = perceived benefits, usefulness, and importance.","id":378,"hash":"9bed16ff7f"},{"domain":"D1","style":"standard","stem":"A deliverable of an activity, tangible or intangible, is called an:","options":["outcome","output","input","asset"],"answer":1,"explain":"An output is a tangible or intangible deliverable of an activity.","id":379,"hash":"2106527377"},{"domain":"D1","style":"standard","stem":"A result for a stakeholder enabled by outputs is an:","options":["event","output","input","outcome"],"answer":3,"explain":"An outcome is a result enabled by one or more outputs.","id":380,"hash":"9e337dc2cd"},{"domain":"D1","style":"standard","stem":"'Fit for purpose' refers to a service's:","options":["utility","warranty","cost","risk"],"answer":0,"explain":"'Fit for purpose' is utility.","id":381,"hash":"fc08881a54"},{"domain":"D1","style":"standard","stem":"'Fit for use' refers to a service's:","options":["utility","warranty","cost","value"],"answer":1,"explain":"'Fit for use' is warranty.","id":382,"hash":"4a0e65d0e8"},{"domain":"D1","style":"standard","stem":"The generic role covering customer, user, and sponsor is:","options":["supplier","provider","consumer","auditor"],"answer":2,"explain":"'Consumer' is the generic role covering customer, user, and sponsor.","id":383,"hash":"9acf05704d"},{"domain":"D1","style":"standard","stem":"The role that authorizes budget for service consumption is the:","options":["sponsor","user","customer","supplier"],"answer":0,"explain":"The sponsor authorizes budget.","id":384,"hash":"771c01c42c"},{"domain":"D1","style":"standard","stem":"The role that defines requirements and owns outcomes is the:","options":["user","customer","sponsor","provider"],"answer":1,"explain":"The customer defines requirements and owns outcomes.","id":385,"hash":"594544054e"},{"domain":"D1","style":"standard","stem":"The role that uses the service day-to-day is the:","options":["sponsor","customer","user","supplier"],"answer":2,"explain":"The user uses the service day-to-day.","id":386,"hash":"f28384e77c"},{"domain":"D1","style":"standard","stem":"A configuration of resources designed to offer value to a consumer is a:","options":["practice","service relationship","value stream","product"],"answer":3,"explain":"A product is a configuration of resources offering value.","id":387,"hash":"8dd546c1b2"},{"domain":"D1","style":"standard","stem":"Service provision, service consumption, and service relationship management together form a:","options":["value stream","service relationship","supply chain","practice"],"answer":1,"explain":"Together they constitute a service relationship.","id":388,"hash":"62cfae90b6"},{"domain":"D1","style":"missing","stem":"Goods supplied in an offering result in ____ being transferred to the consumer.","options":["ownership","risk","cost","value"],"answer":0,"explain":"Goods transfer ownership to the consumer.","id":389,"hash":"206f92652c"},{"domain":"D1","style":"standard","stem":"Access to resources is granted under agreed terms without transferring:","options":["utility","value","ownership","warranty"],"answer":2,"explain":"Access grants use without transferring ownership.","id":390,"hash":"d00f99d340"},{"domain":"D1","style":"standard","stem":"Service actions can be performed by provider resources, the user, or:","options":["no one","only auditors","only suppliers","jointly by both"],"answer":3,"explain":"Service actions may be performed by the provider, the user, or jointly.","id":391,"hash":"344ef30e8b"},{"domain":"D1","style":"standard","stem":"A possible event that could cause harm or loss is a:","options":["risk","cost","value","outcome"],"answer":0,"explain":"A risk is a possible harmful event or uncertainty of outcome.","id":392,"hash":"26a55675ec"},{"domain":"D1","style":"standard","stem":"Money spent on a specific activity or resource is the:","options":["risk","value","cost","output"],"answer":2,"explain":"Cost is money spent on an activity or resource.","id":393,"hash":"88559dbe3b"},{"domain":"D1","style":"standard","stem":"Value is best described as:","options":["set by suppliers","objective and fixed","equal for all","subjective and co-created"],"answer":3,"explain":"Value is subjective and co-created with the consumer.","id":394,"hash":"eecf50a197"},{"domain":"D1","style":"missing","stem":"A service enables value co-creation by facilitating ____ the customer wants.","options":["outcomes","outputs","costs","risks"],"answer":0,"explain":"A service facilitates outcomes the customer wants.","id":395,"hash":"84f0f0dfed"},{"domain":"D1","style":"standard","stem":"Warranty typically addresses availability, capacity, security, and:","options":["continuity","functionality","price","scope"],"answer":0,"explain":"Warranty covers availability, capacity, security, and continuity.","id":396,"hash":"fef2df106c"},{"domain":"D1","style":"standard","stem":"A formal description of one or more services for a target group is a service:","options":["request","offering","relationship","action"],"answer":1,"explain":"A service offering describes services for a target consumer group.","id":397,"hash":"4937cc4e2f"},{"domain":"D1","style":"standard","stem":"In value co-creation, value is created through active collaboration between providers and:","options":["competitors","regulators","auditors","consumers"],"answer":3,"explain":"ITIL 4 stresses value is co-created through collaboration between provider and consumer, not delivered one-way.","id":398,"hash":"7f6d2d2e56"},{"domain":"D1","style":"standard","stem":"Goods, access to resources, and service actions are the three components of a service:","options":["offering","relationship","value stream","level agreement"],"answer":0,"explain":"A service offering is made up of goods, access to resources, and service actions.","id":399,"hash":"a707967348"},{"domain":"D1","style":"standard","stem":"When ownership of a resource is transferred to the consumer, the service-offering component is:","options":["access to resources","goods","service actions","warranty"],"answer":1,"explain":"Goods involve transfer of ownership; access to resources does not.","id":400,"hash":"1200fe1254"},{"domain":"D1","style":"standard","stem":"A service relationship is jointly created through service provision, service consumption, and service relationship:","options":["auditing","funding","management","automation"],"answer":2,"explain":"The three together - provision, consumption, and relationship management - form the service relationship.","id":401,"hash":"5ac0928f76"},{"domain":"D2","style":"standard","stem":"'Organizations and people' is one of the four:","options":["dimensions of service management","SVS components","guiding principles","value chain activities"],"answer":0,"explain":"It is one of the four dimensions.","id":402,"hash":"db513395bf"},{"domain":"D2","style":"standard","stem":"'Information and technology' is one of the four:","options":["SVS components","dimensions of service management","guiding principles","value chain activities"],"answer":1,"explain":"It is one of the four dimensions.","id":403,"hash":"da5a970ceb"},{"domain":"D2","style":"standard","stem":"'Partners and suppliers' is one of the four:","options":["guiding principles","SVS components","dimensions of service management","value chain activities"],"answer":2,"explain":"It is one of the four dimensions.","id":404,"hash":"6f564595af"},{"domain":"D2","style":"standard","stem":"'Value streams and processes' is one of the four:","options":["value chain activities","SVS components","guiding principles","dimensions of service management"],"answer":3,"explain":"It is one of the four dimensions.","id":405,"hash":"cd04b2ff4b"},{"domain":"D2","style":"missing","stem":"External factors on the dimensions are analyzed with the ____ model.","options":["PESTLE","SWOT","RACI","SMART"],"answer":0,"explain":"PESTLE captures external factors.","id":406,"hash":"55648d7f3e"},{"domain":"D2","style":"standard","stem":"Sourcing strategy (insource/outsource) sits in which dimension?","options":["Organizations and people","Partners and suppliers","Information and technology","Value streams and processes"],"answer":1,"explain":"Sourcing strategy is in partners and suppliers.","id":407,"hash":"c128c19fbc"},{"domain":"D2","style":"standard","stem":"Organizational culture sits in which dimension?","options":["Information and technology","Partners and suppliers","Organizations and people","Value streams and processes"],"answer":2,"explain":"Culture is in organizations and people.","id":408,"hash":"4843072ebb"},{"domain":"D2","style":"standard","stem":"Choice of ITSM tooling sits in which dimension?","options":["Value streams and processes","Organizations and people","Partners and suppliers","Information and technology"],"answer":3,"explain":"Tooling choice is information and technology.","id":409,"hash":"aa556f3b13"},{"domain":"D2","style":"standard","stem":"Workflow and procedure design sits in which dimension?","options":["Value streams and processes","Information and technology","Partners and suppliers","Organizations and people"],"answer":0,"explain":"Workflows/procedures are value streams and processes.","id":410,"hash":"b40dc3f24f"},{"domain":"D2","style":"standard","stem":"The four dimensions apply across the entire:","options":["supplier base","service desk","service value system","incident queue"],"answer":2,"explain":"They apply across the whole SVS.","id":411,"hash":"a734319b58"},{"domain":"D2","style":"standard","stem":"New privacy legislation is which PESTLE factor?","options":["Environmental","Social","Economic","Legal"],"answer":3,"explain":"Legislation is a Legal factor.","id":412,"hash":"8d094e7b03"},{"domain":"D2","style":"standard","stem":"A recession affecting budgets is which PESTLE factor?","options":["Economic","Political","Technological","Environmental"],"answer":0,"explain":"A recession is Economic.","id":413,"hash":"4905c411dd"},{"domain":"D2","style":"standard","stem":"Carbon and sustainability concerns are which PESTLE factor?","options":["Social","Environmental","Legal","Political"],"answer":1,"explain":"Sustainability is Environmental.","id":414,"hash":"2688ffb508"},{"domain":"D2","style":"standard","stem":"Failing to balance the four dimensions can lead to services that are not:","options":["documented","profitable only","automated","fit for purpose or use"],"answer":3,"explain":"Ignoring dimensions risks services not fit for purpose/use.","id":415,"hash":"c1cef6f257"},{"domain":"D2","style":"standard","stem":"Competencies and recruitment are addressed in which dimension?","options":["Organizations and people","Information and technology","Partners and suppliers","Value streams and processes"],"answer":0,"explain":"Competency and recruitment are organizations and people.","id":416,"hash":"58a31300a6"},{"domain":"D2","style":"standard","stem":"Which dimension covers roles, responsibilities, organizational structures, culture, and competencies?","options":["Information and technology","Organizations and people","Partners and suppliers","Value streams and processes"],"answer":1,"explain":"Organizations and people covers structures, roles, culture, and required skills/competencies.","id":417,"hash":"522e745248"},{"domain":"D2","style":"standard","stem":"Which dimension covers the information and knowledge plus the technologies an organization uses?","options":["Partners and suppliers","Organizations and people","Information and technology","Value streams and processes"],"answer":2,"explain":"Information and technology addresses the information/knowledge and the technologies used to manage services.","id":418,"hash":"b4b03cdae1"},{"domain":"D3","style":"standard","stem":"The SVS output is:","options":["value","demand","opportunity","governance"],"answer":0,"explain":"The SVS output is value.","id":419,"hash":"6496c27c41"},{"domain":"D3","style":"missing","stem":"The SVS inputs are opportunity and:","options":["demand","value","governance","practices"],"answer":0,"explain":"Inputs are opportunity and demand.","id":420,"hash":"0194a6366a"},{"domain":"D3","style":"missing","stem":"The five SVS components include governance, practices, continual improvement, the service value chain, and the:","options":["guiding principles","four dimensions","PESTLE factors","change schedule"],"answer":0,"explain":"The fifth component is the guiding principles.","id":421,"hash":"f5dad9c271"},{"domain":"D3","style":"standard","stem":"Universal recommendations applicable in all circumstances are the:","options":["practices","guiding principles","governance rules","value streams"],"answer":1,"explain":"The guiding principles are universal recommendations.","id":422,"hash":"b7d3c3ebc3"},{"domain":"D3","style":"standard","stem":"The means by which an organization is directed and controlled is:","options":["the service desk","a practice","governance","an SLA"],"answer":2,"explain":"Governance directs and controls the organization.","id":423,"hash":"54753c747f"},{"domain":"D3","style":"standard","stem":"Sets of organizational resources for performing work are:","options":["events","value streams","outcomes","practices"],"answer":3,"explain":"Practices are resource sets for performing work.","id":424,"hash":"702e286a0d"},{"domain":"D3","style":"standard","stem":"The central operating model of the SVS is the:","options":["governance body","service value chain","CMDB","change schedule"],"answer":1,"explain":"The service value chain is the central operating model.","id":425,"hash":"c8f5af6084"},{"domain":"D3","style":"standard","stem":"A recurring activity ensuring performance meets expectations is:","options":["an incident","an emergency change","continual improvement","a workaround"],"answer":2,"explain":"Continual improvement is the recurring improvement activity.","id":426,"hash":"5698f531c3"},{"domain":"D3","style":"standard","stem":"Options to add value to stakeholders are called:","options":["risks","demands","outputs","opportunities"],"answer":3,"explain":"Opportunities are options to add value.","id":427,"hash":"dccd2d12b6"},{"domain":"D3","style":"standard","stem":"The need or desire for products and services is called:","options":["demand","opportunity","value","governance"],"answer":0,"explain":"Demand is the need/desire for products and services.","id":428,"hash":"a089012471"},{"domain":"D3","style":"standard","stem":"The SVS helps reduce organizational:","options":["demand","value","silos","opportunity"],"answer":2,"explain":"The SVS reduces silos and promotes coordination.","id":429,"hash":"32d8fe2910"},{"domain":"D3","style":"standard","stem":"Governance is typically performed by the:","options":["service desk","end users","suppliers","governing body or delegates"],"answer":3,"explain":"Governance is performed by the governing body or its delegates.","id":430,"hash":"f5376d3932"},{"domain":"D3","style":"standard","stem":"The SVS converts opportunity and demand into:","options":["value","practices","governance","silos"],"answer":0,"explain":"The SVS converts inputs into value.","id":431,"hash":"a1ef64e06d"},{"domain":"D3","style":"standard","stem":"ITIL 4 defines how many management practices?","options":["14","34","17","7"],"answer":1,"explain":"ITIL 4 defines 34 practices.","id":432,"hash":"7da6c80941"},{"domain":"D3","style":"missing","stem":"Continual improvement applies across all SVS components and the four:","options":["dimensions","change types","event types","SLAs"],"answer":0,"explain":"It applies across all components and the four dimensions.","id":433,"hash":"f0d5ce57a8"},{"domain":"D3","style":"standard","stem":"The ITIL service value system describes how all components and activities work together to enable value via:","options":["automation only","governance only","practices only","products and services"],"answer":3,"explain":"The SVS shows how components/activities work together as a system to facilitate value through products and services.","id":434,"hash":"9a9c0348cc"},{"domain":"D3","style":"standard","stem":"Which SVS component represents flexible operating-model activities (plan, improve, engage, etc.)?","options":["The service value chain","Guiding principles","Governance","Continual improvement"],"answer":0,"explain":"The service value chain is the SVS's operating model of six activities.","id":435,"hash":"2e8b5b5188"},{"domain":"D3","style":"standard","stem":"Which SVS component consists of sets of organizational resources designed for performing work?","options":["Governance","Practices","Guiding principles","The service value chain"],"answer":1,"explain":"Practices are sets of organizational resources designed for performing work or accomplishing an objective.","id":436,"hash":"1feec0a69f"},{"domain":"D3","style":"standard","stem":"Recommendations that guide an organization in all circumstances are the SVS's:","options":["governance","practices","guiding principles","value chain"],"answer":2,"explain":"Guiding principles are universal recommendations applicable in all circumstances.","id":437,"hash":"e3ffc5ea0f"},{"domain":"D3","style":"standard","stem":"Which SVS component is the means by which the organization is directed and controlled?","options":["Governance","Practices","Guiding principles","Continual improvement"],"answer":0,"explain":"Governance is how the organization is directed and controlled.","id":438,"hash":"7a33e0678b"},{"domain":"D4","style":"missing","stem":"'Focus on value' links everything to value for the organization, customers, and:","options":["other stakeholders","suppliers only","auditors only","competitors"],"answer":0,"explain":"It links to value for all stakeholders.","id":439,"hash":"5465d05be3"},{"domain":"D4","style":"missing","stem":"'Start where you are' advises you to assess and reuse what already:","options":["exists","fails","is deleted","is hidden"],"answer":0,"explain":"It advises reusing what already exists.","id":440,"hash":"0577bec63d"},{"domain":"D4","style":"missing","stem":"'Progress iteratively with feedback' breaks work into manageable:","options":["iterations","silos","contracts","incidents"],"answer":0,"explain":"It breaks work into iterations with feedback.","id":441,"hash":"8c29a8ba6a"},{"domain":"D4","style":"missing","stem":"'Collaborate and promote visibility' improves trust and reduces:","options":["misunderstanding","collaboration","value","feedback"],"answer":0,"explain":"Transparency reduces misunderstanding and builds trust.","id":442,"hash":"e50b1f1b8b"},{"domain":"D4","style":"missing","stem":"'Think and work holistically' treats the SVS and its parts as an integrated:","options":["whole","silo","contract","queue"],"answer":0,"explain":"It treats things as an integrated whole.","id":443,"hash":"5835cb0d9e"},{"domain":"D4","style":"missing","stem":"'Keep it simple and practical' removes steps that add no:","options":["value","cost","risk","time"],"answer":0,"explain":"It removes non-value-adding steps.","id":444,"hash":"e5dc018643"},{"domain":"D4","style":"missing","stem":"'Optimize and automate' says optimize first, then:","options":["automate","delete","outsource","ignore"],"answer":0,"explain":"Optimize before automating.","id":445,"hash":"8ca7c97bfd"},{"domain":"D4","style":"standard","stem":"How many guiding principles are there?","options":["5","7","9","4"],"answer":1,"explain":"There are seven guiding principles.","id":446,"hash":"38ec1d6fd5"},{"domain":"D4","style":"standard","stem":"Which principle warns automation can amplify inefficiency if done first?","options":["Start where you are","Focus on value","Optimize and automate","Keep it simple and practical"],"answer":2,"explain":"'Optimize and automate' warns against automating unoptimized work.","id":447,"hash":"812c43380d"},{"domain":"D4","style":"standard","stem":"Which principle is about objective assessment of the current state?","options":["Keep it simple and practical","Focus on value","Optimize and automate","Start where you are"],"answer":3,"explain":"'Start where you are' calls for objective current-state assessment.","id":448,"hash":"f8f5fc159a"},{"domain":"D4","style":"standard","stem":"Which principle most supports small, frequent releases?","options":["Keep it simple and practical","Progress iteratively with feedback","Focus on value","Think and work holistically"],"answer":1,"explain":"Iterative delivery aligns with 'progress iteratively with feedback'.","id":449,"hash":"f53010b652"},{"domain":"D4","style":"standard","stem":"Which principle most supports transparency to stakeholders?","options":["Optimize and automate","Focus on value","Collaborate and promote visibility","Keep it simple and practical"],"answer":2,"explain":"Transparency is 'collaborate and promote visibility'.","id":450,"hash":"d76c40d84b"},{"domain":"D4","style":"standard","stem":"Which principle ensures local changes don't harm the whole?","options":["Optimize and automate","Keep it simple and practical","Start where you are","Think and work holistically"],"answer":3,"explain":"'Think and work holistically' protects the whole system.","id":451,"hash":"1c35ffd84f"},{"domain":"D4","style":"standard","stem":"Which principle removes unnecessary complexity?","options":["Keep it simple and practical","Think and work holistically","Focus on value","Optimize and automate"],"answer":0,"explain":"'Keep it simple and practical' removes complexity.","id":452,"hash":"63305854da"},{"domain":"D4","style":"standard","stem":"Guiding principles should be applied:","options":["only by executives","one at a time only","together, most being relevant at once","only during incidents"],"answer":2,"explain":"They apply together; most are relevant simultaneously.","id":453,"hash":"0c6458ced4"},{"domain":"D4","style":"standard","stem":"Which principle keeps work anchored to stakeholder outcomes?","options":["Keep it simple and practical","Start where you are","Optimize and automate","Focus on value"],"answer":3,"explain":"'Focus on value' anchors work to outcomes.","id":454,"hash":"17ced8a079"},{"domain":"D4","style":"standard","stem":"Which principle encourages reusing an existing tool rather than buying new?","options":["Start where you are","Optimize and automate","Focus on value","Keep it simple and practical"],"answer":0,"explain":"'Start where you are' favors reuse.","id":455,"hash":"3e903b5a5e"},{"domain":"D4","style":"standard","stem":"Which principle frees people from repetitive work via technology?","options":["Keep it simple and practical","Optimize and automate","Focus on value","Think and work holistically"],"answer":1,"explain":"'Optimize and automate' frees people from repetitive tasks.","id":456,"hash":"757deb20fc"},{"domain":"D4","style":"standard","stem":"Which principle most directly challenges collecting unused metrics?","options":["Start where you are","Optimize and automate","Collaborate and promote visibility","Keep it simple and practical"],"answer":3,"explain":"Unused metrics add no value; 'keep it simple and practical' challenges them.","id":457,"hash":"02530574cd"},{"domain":"D4","style":"standard","stem":"Which principle most directly supports engaging the right people in a decision?","options":["Collaborate and promote visibility","Focus on value","Keep it simple and practical","Optimize and automate"],"answer":0,"explain":"Engaging the right people is 'collaborate and promote visibility'.","id":458,"hash":"a851879fd5"},{"domain":"D4","style":"standard","stem":"Which guiding principle recommends understanding what is genuinely valuable to the service consumer?","options":["Start where you are","Focus on value","Keep it simple and practical","Optimize and automate"],"answer":1,"explain":"Focus on value: everything done should map, directly or indirectly, to value for stakeholders.","id":459,"hash":"439e5b66ee"},{"domain":"D4","style":"standard","stem":"Which guiding principle warns against ripping out and replacing without first assessing what exists?","options":["Collaborate and promote visibility","Progress iteratively with feedback","Start where you are","Think and work holistically"],"answer":2,"explain":"Start where you are: assess the current state and reuse what can be leveraged.","id":460,"hash":"bf8e67ef46"},{"domain":"D4","style":"standard","stem":"Organizing work into small, manageable sections completed in a timely manner reflects:","options":["Progress iteratively with feedback","Focus on value","Keep it simple and practical","Optimize and automate"],"answer":0,"explain":"Progress iteratively with feedback: work in iterations, using feedback before and after each.","id":461,"hash":"f3b995a0ef"},{"domain":"D4","style":"standard","stem":"Which guiding principle states that working together drives better buy-in and more relevant outcomes?","options":["Think and work holistically","Collaborate and promote visibility","Start where you are","Focus on value"],"answer":1,"explain":"Collaborate and promote visibility: collaboration and transparency improve flow and reduce duplicated effort.","id":462,"hash":"ae455e63bf"},{"domain":"D4","style":"standard","stem":"Recognizing that  promote visibility","Keep it simple and practical","Focus on value"],"answer":0,"explain":"Start where you are emphasizes observing and measuring the current state directly rather than assuming.","id":468,"hash":"aeb5f708b5"},{"domain":"D4","style":"standard","stem":"Quick wins delivered early, with feedback improving the next iteration, is characteristic of:","options":["Think and work holistically","Optimize and automate","Progress iteratively with feedback","Focus on value"],"answer":2,"explain":"Progress iteratively with feedback: deliver in increments and adapt using feedback loops.","id":469,"hash":"f7fcb30b47"},{"domain":"D4","style":"standard","stem":"Excessive controls and conflicting objectives across teams are best addressed by:","options":["Collaborate and promote visibility","Start where you are","Optimize and automate","Keep it simple and practical"],"answer":3,"explain":"Keep it simple and practical: simplify and remove conflicting or low-value activity.","id":470,"hash":"2a6bbc3c2f"},{"domain":"D4","style":"standard","stem":"Making work and consequences visible to reduce hidden agendas and improve decisions reflects:","options":["Collaborate and promote visibility","Think and work holistically","Focus on value","Optimize and automate"],"answer":0,"explain":"Collaborate and promote visibility: insufficient visibility leads to poor decisions and rework.","id":471,"hash":"55691e5e93"},{"domain":"D4","style":"standard","stem":"Understanding the flow of work end-to-end, rather than optimizing one team at others' expense, is:","options":["Keep it simple and practical","Think and work holistically","Start where you are","Progress iteratively with feedback"],"answer":1,"explain":"Think and work holistically: optimize the whole, not isolated parts.","id":472,"hash":"b06a095d27"},{"domain":"D5","style":"missing","stem":"'Plan' ensures shared understanding of vision, status, and improvement direction across the four:","options":["dimensions","change types","SLAs","events"],"answer":0,"explain":"Plan spans the four dimensions and the portfolio.","id":473,"hash":"75580c9bcb"},{"domain":"D5","style":"missing","stem":"'Improve' drives continual improvement across activities and the four:","options":["dimensions","suppliers","SLAs","events"],"answer":0,"explain":"Improve spans all activities and the four dimensions.","id":474,"hash":"862bbdc018"},{"domain":"D5","style":"missing","stem":"'Engage' focuses on understanding and maintaining relationships with:","options":["stakeholders","suppliers only","auditors only","competitors"],"answer":0,"explain":"Engage covers all stakeholders.","id":475,"hash":"8b68ac2eca"},{"domain":"D5","style":"missing","stem":"'Design and transition' targets quality, cost, and time to:","options":["market","close","deploy","restore"],"answer":0,"explain":"It targets quality, cost, and time to market.","id":476,"hash":"d595bfbf6f"},{"domain":"D5","style":"missing","stem":"'Obtain/build' ensures service components are available and meet agreed:","options":["specifications","budgets only","SLAs only","events"],"answer":0,"explain":"It ensures components meet agreed specifications.","id":477,"hash":"968abcf1dc"},{"domain":"D5","style":"missing","stem":"'Deliver and support' ensures services are delivered and supported to agreed:","options":["specifications and expectations","budgets only","schedules only","events"],"answer":0,"explain":"It ensures delivery/support meet agreed specifications and expectations.","id":478,"hash":"e0380e6789"},{"domain":"D5","style":"standard","stem":"How many value chain activities are there?","options":["4","5","7","6"],"answer":3,"explain":"There are six value chain activities.","id":479,"hash":"1e0f768846"},{"domain":"D5","style":"missing","stem":"A specific combination of value chain activities delivering an outcome is a value:","options":["stream","chain","desk","queue"],"answer":0,"explain":"A value stream is a combination of activities for an outcome.","id":480,"hash":"0845349998"},{"domain":"D5","style":"standard","stem":"Which activity is the entry point for stakeholder requirements?","options":["Engage","Plan","Obtain/build","Improve"],"answer":0,"explain":"Engage is the stakeholder interface/entry point.","id":481,"hash":"6a608b35ea"},{"domain":"D5","style":"standard","stem":"Which activity sets organizational vision and direction?","options":["Engage","Plan","Deliver and support","Obtain/build"],"answer":1,"explain":"Plan sets vision and direction.","id":482,"hash":"95356e170f"},{"domain":"D5","style":"standard","stem":"Which activity covers day-to-day operation and support?","options":["Plan","Design and transition","Deliver and support","Improve"],"answer":2,"explain":"Deliver and support covers operation and support.","id":483,"hash":"fc2252b5f8"},{"domain":"D5","style":"standard","stem":"Which activity covers procuring or building components?","options":["Obtain/build","Engage","Plan","Improve"],"answer":0,"explain":"Obtain/build covers procurement/build.","id":484,"hash":"8a4466e2de"},{"domain":"D5","style":"standard","stem":"Which activity takes designs through to live services?","options":["Engage","Design and transition","Plan","Improve"],"answer":1,"explain":"Design and transition delivers live services.","id":485,"hash":"092c6c4ca5"},{"domain":"D5","style":"standard","stem":"Which activity drives continual improvement?","options":["Engage","Plan","Improve","Obtain/build"],"answer":2,"explain":"Improve drives continual improvement.","id":486,"hash":"e359da1397"},{"domain":"D5","style":"missing","stem":"Value chain activities are combined flexibly rather than in a fixed:","options":["sequence","budget","contract","SLA"],"answer":0,"explain":"They combine flexibly, not in a fixed sequence.","id":487,"hash":"22caa969fb"},{"domain":"D5","style":"standard","stem":"Which value chain activity ensures a shared understanding of vision, status, and improvement direction?","options":["Deliver and support","Improve","Engage","Plan"],"answer":3,"explain":"Plan ensures shared understanding of vision, current status, and improvement direction across the organization.","id":488,"hash":"4521b22eb0"},{"domain":"D5","style":"standard","stem":"Which value chain activity provides understanding of stakeholder needs and ongoing engagement?","options":["Plan","Engage","Obtain/build","Improve"],"answer":1,"explain":"Engage provides understanding of stakeholder needs, transparency, and continual engagement.","id":489,"hash":"9ec77d8f6d"},{"domain":"D5","style":"standard","stem":"Which value chain activity ensures service components are available when and where needed?","options":["Deliver and support","Engage","Obtain/build","Plan"],"answer":2,"explain":"Obtain/build ensures service components are available when/where needed and meet agreed specifications.","id":490,"hash":"1ebfa4d725"},{"domain":"D5","style":"standard","stem":"Which value chain activity moves new and changed products and services into live use?","options":["Engage","Obtain/build","Improve","Design and transition"],"answer":3,"explain":"Design and transition ensures products/services meet expectations and are transitioned into operation.","id":491,"hash":"fd6b77d442"},{"domain":"D5","style":"standard","stem":"Which value chain activity ensures services are delivered and supported to agreed specifications?","options":["Deliver and support","Design and transition","Plan","Improve"],"answer":0,"explain":"Deliver and support ensures services are delivered and supported per agreed specs and expectations.","id":492,"hash":"c4f5c0ad07"},{"domain":"D5","style":"standard","stem":"Which value chain activity ensures continual improvement across products, services, and practices?","options":["Plan","Engage","Improve","Obtain/build"],"answer":2,"explain":"Improve drives continual improvement across all six value chain activities and the four dimensions.","id":493,"hash":"2e9da7eb64"},{"domain":"D5","style":"standard","stem":"A specific combination of value chain activities and practices designed for a scenario is a value:","options":["ladder","offering","relationship","stream"],"answer":3,"explain":"A value stream is a series of steps an organization uses to create and deliver products/services to a consumer.","id":494,"hash":"0f1b8bd954"},{"domain":"D5","style":"standard","stem":"The relationship between value chain activities and practices is best described as:","options":["many-to-many","one-to-one","one-to-many only","strictly sequential"],"answer":0,"explain":"Any activity can draw on multiple practices, and any practice may support multiple activities - many-to-many.","id":495,"hash":"5d5f5d9cf9"},{"domain":"D5","style":"standard","stem":"The value chain takes inputs of demand and opportunity and converts them into:","options":["governance","value","practices","principles"],"answer":1,"explain":"The value chain transforms demand/opportunity into value via its six activities and supporting practices.","id":496,"hash":"eedc5f8b12"},{"domain":"D5","style":"list","stem":"Which TWO activities are most associated with operating services and improving them over time? (Choose two.)","options":["Deliver and support","Improve","Obtain/build","Engage"],"answer":[0,1],"explain":"Deliver and support handles ongoing operation; Improve drives the continual betterment of that support.","id":497,"hash":"7e8f929d87"},{"domain":"D6","style":"missing","stem":"Incident management aims to restore normal service operation as quickly as:","options":["possible","scheduled","budgeted","authorized"],"answer":0,"explain":"Incident management restores service as quickly as possible.","id":498,"hash":"0ecd0e9467"},{"domain":"D6","style":"missing","stem":"A problem is a cause, or potential cause, of one or more:","options":["incidents","changes","requests","events"],"answer":0,"explain":"A problem is a cause of incidents.","id":499,"hash":"44420b09cb"},{"domain":"D6","style":"missing","stem":"A known error is a problem that has been analyzed but not:","options":["resolved","logged","escalated","closed"],"answer":0,"explain":"A known error is analyzed but unresolved.","id":500,"hash":"6a9d80c5a3"}]}</script>

/* ITIL 4 Foundation — study guide content (factually verified) */
