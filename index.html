<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#10131C">
<title>ITIL 4 Foundation — Service Management Console</title>
<style>
:root{
  --bg:#0E111A;
  --bg2:#10131C;
  --panel:#161B28;
  --panel2:#1B2233;
  --line:#283145;
  --line2:#3A4660;
  --ink:#E9E7E0;
  --ink-soft:#AEB4C2;
  --ink-dim:#727A8C;
  --violet:#7C5CFF;
  --violet-soft:#9A82FF;
  --teal:#34D8C8;
  --teal-soft:#6FE9DD;
  --amber:#F4B740;
  --rose:#FF6B81;
  --green:#4ADE80;
  --mono:"SF Mono",ui-monospace,"Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  --r:14px;
  --r-sm:10px;
  --shadow:0 18px 50px -20px rgba(0,0,0,.7);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans);
  background:
    radial-gradient(1200px 600px at 78% -10%, rgba(124,92,255,.16), transparent 60%),
    radial-gradient(900px 500px at 10% 110%, rgba(52,216,200,.10), transparent 55%),
    var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  overflow-x:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.wrap{max-width:1040px;margin:0 auto;padding:0 18px 120px}

/* ---------- Header / value-chain ribbon ---------- */
header.top{
  position:sticky;top:0;z-index:40;
  margin:0 -18px 0;padding:14px 18px 12px;
  background:linear-gradient(180deg, rgba(14,17,26,.96), rgba(14,17,26,.82) 70%, rgba(14,17,26,0));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.brand{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand .mark{
  width:38px;height:38px;border-radius:11px;flex:none;
  background:conic-gradient(from 200deg,var(--violet),var(--teal),var(--violet));
  display:grid;place-items:center;font-weight:800;color:#0b0d14;font-size:15px;
  box-shadow:0 8px 24px -8px rgba(124,92,255,.8);
  letter-spacing:-.5px;
}
.brand h1{font-size:16px;margin:0;font-weight:680;letter-spacing:.2px}
.brand .sub{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase}
.brand .spacer{flex:1}
.brand .badge{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--teal-soft);border:1px solid var(--line);padding:5px 9px;border-radius:999px;
  background:rgba(52,216,200,.06)
}

/* value chain ribbon */
.vc{display:flex;gap:0;margin-top:13px;align-items:stretch;overflow-x:auto;scrollbar-width:none;mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 14px),transparent)}
.vc::-webkit-scrollbar{display:none}
.vc .seg{
  position:relative;flex:1 0 auto;min-width:74px;text-align:center;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-dim);padding:8px 10px 9px;white-space:nowrap;
}
.vc .seg span{display:block;font-size:8px;color:var(--ink-dim);opacity:.7;margin-top:2px}
.vc .seg::before{
  content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
  background:var(--line);border-radius:2px;
}
.vc .seg.on{color:var(--teal-soft)}
.vc .seg.on::before{background:linear-gradient(90deg,var(--violet),var(--teal))}
.vc .seg.core{color:var(--violet-soft)}

/* ---------- Nav tabs ---------- */
nav.tabs{display:flex;gap:6px;margin:16px 0 20px;flex-wrap:wrap}
nav.tabs button{
  font-family:var(--sans);font-size:13.5px;font-weight:560;
  color:var(--ink-soft);background:var(--panel);border:1px solid var(--line);
  padding:9px 15px;border-radius:999px;cursor:pointer;transition:.15s;
}
nav.tabs button .ic{margin-right:6px;opacity:.8}
nav.tabs button:hover{border-color:var(--line2);color:var(--ink)}
nav.tabs button.active{
  background:linear-gradient(180deg,rgba(124,92,255,.22),rgba(124,92,255,.08));
  border-color:rgba(124,92,255,.5);color:#fff;
  box-shadow:0 6px 20px -10px rgba(124,92,255,.9)
}

/* ---------- Generic panels ---------- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.panel + .panel{margin-top:16px}
.muted{color:var(--ink-soft)}
.dim{color:var(--ink-dim)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:14px}
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px}
.kpi .v{font-size:22px;font-weight:740;letter-spacing:-.5px}
.kpi .l{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-dim);margin-top:3px}
.kpi .v.violet{color:var(--violet-soft)} .kpi .v.teal{color:var(--teal-soft)} .kpi .v.amber{color:var(--amber)}

h2.section{font-size:13px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.16em;color:var(--ink-dim);margin:4px 0 14px;font-weight:600}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--violet-soft)}

/* ---------- Home / dashboard ---------- */
.hero-lead{font-size:15px;color:var(--ink-soft);max-width:64ch}
.mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:13px;margin-top:8px}
.mode-card{
  text-align:left;cursor:pointer;border:1px solid var(--line);border-radius:var(--r);
  background:linear-gradient(180deg,var(--panel2),var(--panel));padding:17px;transition:.16s;color:inherit;font-family:inherit
}
.mode-card:hover{transform:translateY(-2px);border-color:var(--line2);box-shadow:0 16px 30px -18px rgba(0,0,0,.8)}
.mode-card .ic{font-size:20px}
.mode-card h3{margin:9px 0 5px;font-size:15.5px;font-weight:660}
.mode-card p{margin:0;font-size:12.5px;color:var(--ink-soft);line-height:1.45}
.mode-card .tag{margin-top:11px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--violet-soft)}

.domain-bars{margin-top:6px}
.dbar{display:flex;align-items:center;gap:11px;padding:8px 0;border-top:1px solid var(--line)}
.dbar:first-child{border-top:none}
.dbar .code{font-family:var(--mono);font-size:11px;color:var(--violet-soft);width:26px;flex:none}
.dbar .nm{font-size:13px;flex:1;min-width:0}
.dbar .track{flex:1.3;height:7px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.dbar .fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--teal));border-radius:6px;width:0;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.dbar .pct{font-family:var(--mono);font-size:11px;color:var(--ink-soft);width:58px;text-align:right;flex:none}

/* ---------- Study guide ---------- */
.sg-layout{display:grid;grid-template-columns:208px 1fr;gap:18px;align-items:start}
.sg-toc{position:sticky;top:150px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:10px;max-height:calc(100vh - 180px);overflow:auto}
.sg-toc a{display:block;font-size:12.5px;color:var(--ink-soft);text-decoration:none;padding:7px 9px;border-radius:8px;line-height:1.3}
.sg-toc a .n{font-family:var(--mono);font-size:10px;color:var(--violet-soft);margin-right:7px}
.sg-toc a:hover{background:var(--panel2);color:var(--ink)}
.sg-toc a.active{background:rgba(124,92,255,.14);color:#fff}
.sg-body{min-width:0}
.sg-body h3{font-size:21px;font-weight:720;letter-spacing:-.3px;margin:0 0 4px;scroll-margin-top:160px}
.sg-body h4{font-size:15.5px;font-weight:660;margin:22px 0 8px;color:#fff}
.sg-body p{font-size:14.5px;color:var(--ink-soft);margin:10px 0}
.sg-body li{font-size:14px;color:var(--ink-soft);margin:5px 0}
.sg-body ul,.sg-body ol{padding-left:20px;margin:10px 0}
.sg-body strong{color:var(--ink);font-weight:640}
.sg-body code{font-family:var(--mono);font-size:12.5px;background:var(--panel2);border:1px solid var(--line);padding:1px 6px;border-radius:6px;color:var(--teal-soft)}
.callout{border-left:3px solid var(--violet);background:rgba(124,92,255,.07);border-radius:0 10px 10px 0;padding:12px 15px;margin:16px 0}
.callout .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--violet-soft);margin-bottom:5px}
.callout.exam{border-left-color:var(--amber);background:rgba(244,183,64,.08)}
.callout.exam .lab{color:var(--amber)}
.deftable{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px}
.deftable td{border:1px solid var(--line);padding:9px 12px;vertical-align:top}
.deftable td:first-child{font-weight:620;color:var(--ink);width:38%;background:var(--panel2)}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.04em;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--ink-soft)}
.chip.v{color:var(--violet-soft);border-color:rgba(124,92,255,.4)}
.chip.t{color:var(--teal-soft);border-color:rgba(52,216,200,.35)}

/* numbered principle cards */
.prin{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:11px;margin:14px 0}
.prin .p{position:relative;border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 14px 14px;background:var(--panel2);overflow:hidden}
.prin .p .num{font-family:var(--mono);font-size:11px;color:var(--violet-soft);letter-spacing:.1em}
.prin .p h5{margin:5px 0 5px;font-size:14px;font-weight:640;color:#fff}
.prin .p p{margin:0;font-size:12.5px;color:var(--ink-soft);line-height:1.42}

/* ---------- Quiz engine ---------- */
.quiz-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.quiz-head .meta{font-family:var(--mono);font-size:11px;color:var(--ink-dim);letter-spacing:.05em}
.quiz-head .spacer{flex:1}
.progress-track{height:6px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:18px}
.progress-track .f{height:100%;background:linear-gradient(90deg,var(--violet),var(--teal));width:0;transition:width .35s}
.timer{font-family:var(--mono);font-size:13px;color:var(--ink-soft);background:var(--panel2);border:1px solid var(--line);padding:6px 11px;border-radius:8px}
.timer.warn{color:var(--amber);border-color:rgba(244,183,64,.4)}
.timer.danger{color:var(--rose);border-color:rgba(255,107,129,.45)}
.dom-pill{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--violet-soft);border:1px solid rgba(124,92,255,.35);padding:4px 9px;border-radius:999px;background:rgba(124,92,255,.07)}
.style-pill{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);border:1px solid var(--line);padding:4px 9px;border-radius:999px}

.q-stem{font-size:18px;font-weight:620;line-height:1.45;margin:6px 0 4px;letter-spacing:-.2px}
.q-hint{font-size:12.5px;color:var(--ink-dim);margin-bottom:16px;font-family:var(--mono)}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{
  display:flex;align-items:flex-start;gap:12px;text-align:left;width:100%;
  border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:14px 15px;cursor:pointer;
  transition:.13s;color:var(--ink);font-family:inherit;font-size:14.5px;line-height:1.4
}
.opt:hover{border-color:var(--line2);background:#1f273a}
.opt .key{
  font-family:var(--mono);font-size:12px;font-weight:600;flex:none;width:24px;height:24px;border-radius:7px;
  display:grid;place-items:center;background:var(--panel);border:1px solid var(--line);color:var(--ink-soft)
}
.opt.selected{border-color:var(--violet);background:rgba(124,92,255,.12)}
.opt.selected .key{background:var(--violet);color:#0b0d14;border-color:var(--violet)}
.opt.correct{border-color:var(--green);background:rgba(74,222,128,.12)}
.opt.correct .key{background:var(--green);color:#08110a;border-color:var(--green)}
.opt.wrong{border-color:var(--rose);background:rgba(255,107,129,.12)}
.opt.wrong .key{background:var(--rose);color:#1a0a0d;border-color:var(--rose)}
.opt[disabled]{cursor:default}
.opt .tick{margin-left:auto;font-size:14px;opacity:0;flex:none}
.opt.correct .tick,.opt.wrong .tick{opacity:1}

.explain{margin-top:16px;border:1px solid var(--line);border-left:3px solid var(--teal);background:rgba(52,216,200,.06);border-radius:0 10px 10px 0;padding:13px 15px;font-size:13.5px;color:var(--ink-soft);display:none}
.explain.show{display:block;animation:fade .25s ease}
.explain .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal-soft);margin-bottom:5px}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.qbtns{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn{font-family:var(--sans);font-size:14px;font-weight:600;border-radius:10px;padding:11px 20px;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);transition:.14s}
.btn:hover{border-color:var(--line2)}
.btn.primary{background:linear-gradient(180deg,var(--violet),#6647e6);border-color:transparent;color:#fff;box-shadow:0 10px 24px -12px rgba(124,92,255,.9)}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.teal{background:linear-gradient(180deg,var(--teal),#23b3a5);color:#06201d;border-color:transparent;font-weight:680}

/* setup controls */
.field{margin:14px 0}
.field label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px}
.seg-ctl{display:flex;flex-wrap:wrap;gap:7px}
.seg-ctl button{font-family:var(--sans);font-size:13px;font-weight:560;border:1px solid var(--line);background:var(--panel2);color:var(--ink-soft);padding:8px 14px;border-radius:9px;cursor:pointer;transition:.13s}
.seg-ctl button.on{background:rgba(124,92,255,.18);border-color:rgba(124,92,255,.5);color:#fff}
.dom-checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px}
.dom-check{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--panel2);border-radius:9px;padding:10px 12px;cursor:pointer;font-size:13px}
.dom-check .box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line2);flex:none;display:grid;place-items:center;font-size:11px;color:#0b0d14;transition:.12s}
.dom-check.on .box{background:var(--violet);border-color:var(--violet)}
.dom-check .cd{font-family:var(--mono);font-size:11px;color:var(--violet-soft)}
.dom-check small{color:var(--ink-dim);margin-left:auto;font-family:var(--mono);font-size:10.5px}

/* results */
.score-ring{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.ring{width:128px;height:128px;flex:none;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .ctr{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring .ctr .p{font-size:30px;font-weight:780;letter-spacing:-1px}
.ring .ctr .l{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-dim)}
.verdict h3{margin:0 0 4px;font-size:22px;font-weight:740}
.verdict p{margin:0;color:var(--ink-soft);font-size:14px}
.pass{color:var(--green)} .fail{color:var(--rose)}
.res-breakdown{margin-top:8px}
.review-item{border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;margin-top:10px;background:var(--panel2)}
.review-item .qh{display:flex;gap:9px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.review-item .ix{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
.review-item .res-tag{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:3px 8px;border-radius:999px}
.res-tag.ok{color:var(--green);border:1px solid rgba(74,222,128,.4);background:rgba(74,222,128,.08)}
.res-tag.no{color:var(--rose);border:1px solid rgba(255,107,129,.4);background:rgba(255,107,129,.08)}
.review-item .stem{font-size:14.5px;font-weight:560;margin-bottom:8px}
.review-item .ans{font-size:13px;margin:3px 0}
.review-item .ans .mk{font-family:var(--mono);font-size:11px;margin-right:6px}
.review-item .yours{color:var(--rose)} .review-item .right{color:var(--green)}
.review-item .ex{font-size:12.5px;color:var(--ink-dim);margin-top:8px;line-height:1.45}

/* flashcards */
.flash-stage{perspective:1600px;margin:10px 0 4px}
.flash{
  position:relative;width:100%;min-height:300px;cursor:pointer;
  transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.8,.2,1)
}
.flash.flip{transform:rotateY(180deg)}
.flash .face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border:1px solid var(--line);border-radius:var(--r);padding:28px;display:flex;flex-direction:column;justify-content:center;
  background:linear-gradient(180deg,var(--panel2),var(--panel))
}
.flash .back{transform:rotateY(180deg);background:linear-gradient(180deg,#19223a,#141a29);border-color:rgba(52,216,200,.3)}
.flash .face .q{font-size:18px;font-weight:620;line-height:1.45}
.flash .face .a{font-size:15px;color:var(--teal-soft);font-weight:600;margin-bottom:8px}
.flash .face .ex{font-size:13.5px;color:var(--ink-soft);line-height:1.5}
.flash .flip-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim)}
.flash-rate{display:flex;gap:10px;justify-content:center;margin-top:14px}

/* misc */
.center{text-align:center}
.spread{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.hidden{display:none!important}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);padding:11px 18px;border-radius:10px;font-size:13px;z-index:90;transition:.25s;box-shadow:var(--shadow);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer.foot{margin-top:40px;text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);letter-spacing:.05em;line-height:1.7}
footer.foot a{color:var(--violet-soft);text-decoration:none}

@media (max-width:760px){
  .sg-layout{grid-template-columns:1fr}
  .sg-toc{position:static;max-height:none;margin-bottom:14px}
  .q-stem{font-size:16.5px}
  .ring{width:108px;height:108px}
  .wrap{padding:0 14px 110px}
  header.top{margin:0 -14px}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important}
  .flash{transition:none}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="mark">IT</div>
      <div>
        <h1>ITIL&nbsp;4 Foundation</h1>
        <div class="sub">Service Management Console</div>
      </div>
      <div class="spacer"></div>
      <div class="badge" id="bankBadge">500-Q Bank</div>
    </div>
    <div class="vc" id="vcRibbon"></div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-view="home" class="active"><span class="ic">◈</span>Console</button>
    <button data-view="study"><span class="ic">▤</span>Study Guide</button>
    <button data-view="exam"><span class="ic">◷</span>Mock Exam</button>
    <button data-view="practice"><span class="ic">⊹</span>Practice</button>
    <button data-view="flash"><span class="ic">⮂</span>Flashcards</button>
    <button data-view="weak"><span class="ic">◭</span>Weak Spots</button>
  </nav>

  <main id="app"></main>

  <footer class="foot">

<script id="qdata" type="application/json">{"domains":{"D1":{"name":"Key Concepts of Service Management","target":90},"D2":{"name":"The Four Dimensions of Service Management","target":55},"D3":{"name":"The ITIL Service Value System (SVS)","target":55},"D4":{"name":"The Guiding Principles","target":80},"D5":{"name":"The Service Value Chain","target":60},"D6":{"name":"ITIL Practices","target":160}},"questions":[{"domain":"D1","style":"standard","stem":"Which definition best describes a 'service' in ITIL 4?","options":["A means of enabling value co-creation by facilitating outcomes customers want to achieve, without the customer having to manage specific costs and risks","A tangible product delivered to a customer in exchange for payment","A documented agreement between a provider and a consumer about service levels","The functionality offered by a product to meet a particular need"],"answer":0,"explain":"A service is a means of enabling value co-creation by facilitating outcomes that customers want to achieve, without the customer having to manage specific costs and risks. The last option describes 'utility', not a service.","id":1,"hash":"1fbef9b9f1"},{"domain":"D1","style":"standard","stem":"What is 'value' in the context of ITIL 4?","options":["The total cost of providing a service over its lifetime","The perceived benefits, usefulness, and importance of something","The amount a customer is willing to pay for a service","The measurable outputs produced by a service provider"],"answer":1,"explain":"Value is defined as the perceived benefits, usefulness, and importance of something. It is subjective and co-created between provider and consumer.","id":2,"hash":"0368756a20"},{"domain":"D1","style":"standard","stem":"Which term describes a result for a stakeholder enabled by one or more outputs?","options":["Output","Utility","Outcome","Warranty"],"answer":2,"explain":"An outcome is a result for a stakeholder enabled by one or more outputs. An output is a tangible or intangible deliverable of an activity.","id":3,"hash":"c185c3e053"},{"domain":"D1","style":"standard","stem":"An 'output' is best defined as which of the following?","options":["A result for a stakeholder","A possible event that could cause harm","The perceived benefit of a service","A tangible or intangible deliverable of an activity"],"answer":3,"explain":"An output is a tangible or intangible deliverable of an activity. Outcomes are the results enabled by outputs.","id":4,"hash":"334fb383ef"},{"domain":"D1","style":"standard","stem":"In service management, 'cost' is defined as:","options":["The perceived disadvantages of a service","The amount of money spent on a specific activity or resource","Any possible event that could cause harm or loss","The functionality offered by a service"],"answer":1,"explain":"Cost is the amount of money spent on a specific activity or resource. Costs removed from the consumer and costs imposed on the consumer are both relevant to value.","id":5,"hash":"f4a3e99083"},{"domain":"D1","style":"standard","stem":"Which statement about 'risk' is correct according to ITIL 4?","options":["Risk is always negative and must be eliminated","Risk is only a concern for the service provider, never the consumer","A risk is a possible event that could cause harm or loss, or make it more difficult to achieve objectives","Risk is the same as an issue that has already occurred"],"answer":2,"explain":"A risk is a possible event that could cause harm or loss, or make it more difficult to achieve objectives. Risk can also be defined as uncertainty of outcome and can be positive or negative.","id":6,"hash":"2ef3d7ac42"},{"domain":"D1","style":"standard","stem":"Which best describes 'utility' of a service?","options":["The assurance that a product or service will meet agreed requirements","The reliability and availability of a service","The perceived benefits and importance of a service","The functionality offered by a product or service to meet a particular need; 'what the service does'"],"answer":3,"explain":"Utility is the functionality offered by a product or service to meet a particular need — 'fit for purpose', or what the service does.","id":7,"hash":"445d3d6efb"},{"domain":"D1","style":"standard","stem":"Which best describes 'warranty' of a service?","options":["Assurance that a product or service will meet agreed requirements; 'fit for use'","What the service does","The cost of delivering a service","The outcomes a customer wants to achieve"],"answer":0,"explain":"Warranty is the assurance that a product or service will meet agreed requirements — 'fit for use'. It typically addresses availability, capacity, security, and continuity.","id":8,"hash":"9350cba341"},{"domain":"D1","style":"standard","stem":"For a service to have value, it must deliver both:","options":["Cost and risk","Outputs and inputs","Utility and warranty","Demand and capacity"],"answer":2,"explain":"A service offers value only when it delivers both utility (fit for purpose) and warranty (fit for use). One without the other is insufficient.","id":9,"hash":"fe849bd3fa"},{"domain":"D1","style":"standard","stem":"Which role does an organization take when it consumes services?","options":["Sponsor only","User only","Supplier","The umbrella term 'consumer', which can include the customer, user, and sponsor roles"],"answer":3,"explain":"'Consumer' is a generic role used to simplify the service relationship; it covers the more specific roles of customer, user, and sponsor.","id":10,"hash":"b215cfe947"},{"domain":"D1","style":"standard","stem":"Within the service consumer, who is the role responsible for authorizing the budget for service consumption?","options":["Sponsor","Customer","User","Service provider"],"answer":0,"explain":"The sponsor authorizes the budget for service consumption. The customer defines requirements and the user uses the service.","id":11,"hash":"22f839b86a"},{"domain":"D1","style":"standard","stem":"Within the service consumer, who defines the requirements for a service and takes responsibility for the outcomes?","options":["User","Customer","Sponsor","Supplier"],"answer":1,"explain":"The customer is the role that defines the requirements for a service and takes responsibility for the outcomes of service consumption.","id":12,"hash":"b1c6f24d45"},{"domain":"D1","style":"standard","stem":"Which role uses the service on a day-to-day basis?","options":["Customer","Sponsor","Service owner","User"],"answer":3,"explain":"The user is the role that uses services. The customer defines requirements; the sponsor authorizes budget.","id":13,"hash":"99e47449f7"},{"domain":"D1","style":"standard","stem":"An organization providing services and the consumer of those services together form what?","options":["A service relationship","A value stream","A supply chain","A configuration baseline"],"answer":0,"explain":"A service relationship is a cooperation between a service provider and service consumer, including service provision, service consumption, and service relationship management.","id":14,"hash":"9194578304"},{"domain":"D1","style":"standard","stem":"Which activities are included in a service relationship?","options":["Planning, building, and running","Service provision, service consumption, and service relationship management","Demand, supply, and value","Strategy, design, and transition"],"answer":1,"explain":"A service relationship comprises service provision, service consumption, and service relationship management — the joint activities of provider and consumer.","id":15,"hash":"2a1669044d"},{"domain":"D1","style":"standard","stem":"What is a 'service offering'?","options":["A formal contract between two or more parties","A request from a user for something to be provided","A description of one or more services designed to address the needs of a target consumer group","An unplanned interruption to a service"],"answer":2,"explain":"A service offering is a formal description of one or more services, designed to address the needs of a target consumer group. It may include goods, access to resources, and service actions.","id":16,"hash":"0cdad4bf95"},{"domain":"D1","style":"standard","stem":"Which of the following may be included in a service offering?","options":["Goods, access to resources, and service actions","Risks, costs, and issues","Inputs, activities, and outputs","Strategy, design, and operation"],"answer":0,"explain":"Service offerings may include goods (ownership transferred), access to resources (granted under agreed terms), and service actions performed to address consumer needs.","id":17,"hash":"6ec35bc144"},{"domain":"D1","style":"standard","stem":"When goods are supplied as part of a service offering, what happens to ownership?","options":["Ownership is retained by the provider","Ownership is transferred to the consumer","Ownership is shared equally","Ownership is never relevant to goods"],"answer":1,"explain":"Goods are items that, when supplied, transfer ownership to the consumer, who then takes responsibility for their future use.","id":18,"hash":"3701c45fd9"},{"domain":"D1","style":"standard","stem":"When a service provider grants 'access to resources', what is true about ownership?","options":["Ownership is transferred to the consumer","Ownership is permanently lost by both parties","Ownership is not transferred; access is granted under agreed terms and conditions","The resource is consumed and destroyed"],"answer":2,"explain":"Access to resources is granted or licensed to the consumer under agreed terms and conditions; ownership is retained by the provider and access is restricted according to agreement.","id":19,"hash":"5f552bd781"},{"domain":"D1","style":"standard","stem":"What is a 'service action'?","options":["A formal agreement on service levels","A configuration item under change control","A risk that could affect a service","An activity performed by a provider to address a consumer's needs, which may be performed by provider resources, the user, or jointly"],"answer":3,"explain":"Service actions are activities performed by a service provider to address a user's needs. They can be performed by provider resources, by the user, or jointly.","id":20,"hash":"72d9fb54c5"},{"domain":"D1","style":"standard","stem":"Which of the following best describes 'service consumption'?","options":["Management of the provider's resources","Activities performed by a consumer to consume services, including managing consumer resources, using provider resources, and receiving goods","The design of new service offerings","The continual improvement of services"],"answer":1,"explain":"Service consumption covers the consumer's activities: management of consumer resources needed to use the service, service-use actions by users, and receiving (acquiring) goods.","id":21,"hash":"14747ea302"},{"domain":"D1","style":"standard","stem":"What is a 'product' in ITIL 4?","options":["A formal description of a service","A means of enabling value co-creation","A configuration of an organization's resources designed to offer value for a consumer","An agreed level of service"],"answer":2,"explain":"A product is a configuration of an organization's resources designed to offer value for a consumer. Products are typically complex and not fully visible to the consumer.","id":22,"hash":"d099f71b80"},{"domain":"D1","style":"standard","stem":"Which statement about products and services is correct?","options":["A product can only support one service","Products are always fully visible to the consumer","Services and products are identical concepts","Products are tailored into service offerings for different consumer groups, and one product may underpin more than one service"],"answer":3,"explain":"Organizations define which product components their consumers see and tailor the product to suit target groups. A single product can underpin multiple service offerings.","id":23,"hash":"889fbef99a"},{"domain":"D1","style":"standard","stem":"What does 'value co-creation' emphasize in ITIL 4?","options":["Value is increasingly created through active collaboration between providers and consumers","Value is delivered solely by the provider to a passive consumer","Value can only be created by the consumer","Value is a fixed amount agreed in a contract"],"answer":0,"explain":"ITIL 4 stresses that value is co-created. The traditional one-directional 'provider delivers, consumer receives' model is replaced by active collaboration.","id":24,"hash":"4363e3c86d"},{"domain":"D1","style":"standard","stem":"Which of the following is an example of a service provider also being a service consumer?","options":["A provider never consumes services","Only end users can be consumers","A provider that purchases internet connectivity from a telecom company to deliver its own services","Consumers cannot also be providers"],"answer":2,"explain":"Organizations almost always act as both provider and consumer. A provider relying on a supplier (e.g., connectivity) is itself a consumer of that supplier's service.","id":25,"hash":"4e00efdbfc"},{"domain":"D1","style":"standard","stem":"An 'organization' in ITIL 4 is defined as:","options":["A single department within a company","A team of service desk agents","Only a legally incorporated company","A person or a group of people that has its own functions with responsibilities, authorities, and relationships to achieve its objectives"],"answer":3,"explain":"An organization is a person or a group of people that has its own functions with responsibilities, authorities, and relationships to achieve its objectives. It can be a whole company, a part, or a network.","id":26,"hash":"034e1c3610"},{"domain":"D1","style":"standard","stem":"Which two perspectives are balanced when considering the 'cost' of a service from the consumer's view?","options":["Costs removed from the consumer by the service, and costs imposed on the consumer by the service","Fixed costs and variable costs","Capital costs and operational costs","Direct costs and indirect costs"],"answer":0,"explain":"From the consumer's perspective, a service can remove costs (part of the value) but also impose costs (a part of value consumers may not want), such as staff training or network charges.","id":27,"hash":"70acb21b5a"},{"domain":"D1","style":"standard","stem":"Which two perspectives are balanced when considering 'risk' from the consumer's perspective?","options":["Strategic risk and operational risk","Risks removed from the consumer by the service, and risks imposed on the consumer by the service","Internal risk and external risk","Known risk and unknown risk"],"answer":1,"explain":"Services can remove risk from a consumer (a contribution to value) but can also impose new risks, such as a provider ceasing to trade or a security breach.","id":28,"hash":"ced44957ff"},{"domain":"D1","style":"standard","stem":"Which statement correctly distinguishes outputs from outcomes?","options":["Outputs and outcomes are the same thing","Outputs are for stakeholders; outcomes are for providers","An outcome is always tangible while an output is intangible","An output is a deliverable of an activity; an outcome is a result enabled by one or more outputs"],"answer":3,"explain":"Outputs are tangible or intangible deliverables of activities; outcomes are the results for stakeholders that those outputs enable. A camera (output) enables photos and memories (outcomes).","id":29,"hash":"c5ba5660c6"},{"domain":"D1","style":"standard","stem":"Identify the correct relationship between value, outcomes, costs, and risks.","options":["Value is determined by outcomes, costs, and risks together","Value depends only on outcomes","Costs and risks are irrelevant to value","Value is fixed regardless of risk"],"answer":0,"explain":"ITIL 4 frames value as being shaped by the balance of outcomes achieved, costs incurred, and risks taken on or removed by the service.","id":30,"hash":"9f68a0a035"},{"domain":"D1","style":"standard","stem":"A service that is 'fit for purpose' satisfies which requirement?","options":["Warranty","Utility","Continuity","Availability"],"answer":1,"explain":"'Fit for purpose' is utility — the functionality that meets a particular need. 'Fit for use' is warranty.","id":31,"hash":"fd2259b070"},{"domain":"D1","style":"standard","stem":"A service that is 'fit for use' satisfies which requirement?","options":["Utility","Functionality","Warranty","Demand"],"answer":2,"explain":"'Fit for use' is warranty — the assurance that the service will perform as agreed (availability, capacity, security, continuity).","id":32,"hash":"d971c89544"},{"domain":"D1","style":"standard","stem":"Which of the following are typically addressed by the warranty of a service?","options":["Availability, capacity, security, and continuity","Cost, risk, value, and demand","Strategy, design, transition, and operation","People, process, products, and partners"],"answer":0,"explain":"Warranty conditions typically cover availability, capacity, information security, and service continuity — the dimensions of 'fit for use'.","id":33,"hash":"57357031cc"},{"domain":"D1","style":"standard","stem":"Which best describes a 'configuration of resources' that offers value to a consumer?","options":["A service relationship","A product","A guiding principle","A value stream"],"answer":1,"explain":"A product is a configuration of an organization's resources designed to offer value for a consumer.","id":34,"hash":"c0d1e85394"},{"domain":"D1","style":"standard","stem":"In a service relationship, which party manages the resources needed to consume the service?","options":["The provider","The sponsor only","The consumer","An external auditor"],"answer":2,"explain":"Service consumption includes the consumer's management of its own resources required to use the service, alongside service-use actions.","id":35,"hash":"9d6270b3b0"},{"domain":"D1","style":"standard","stem":"Which statement about service relationships is true?","options":["They are one-time transactions only","They exclude the management of the relationship itself","Only the provider has responsibilities","They are established between two or more organizations to co-create value, and an organization can be both provider and consumer simultaneously"],"answer":3,"explain":"Service relationships involve ongoing cooperation. Organizations frequently act as both provider and consumer, and relationship management is part of the relationship.","id":36,"hash":"3f4cacc6a0"},{"domain":"D1","style":"standard","stem":"When the perceived benefits of a service differ between two consumers, this illustrates that value is:","options":["Objective and fixed","Subjective and depends on the consumer's perception and needs","Determined only by cost","Identical for all stakeholders"],"answer":1,"explain":"Value is subjective — it depends on the perceptions, needs, and context of the stakeholder. The same service can deliver different value to different consumers.","id":37,"hash":"ba900f830c"},{"domain":"D1","style":"standard","stem":"Which is the BEST example of an outcome rather than an output?","options":["A monthly report document","A configured server","Improved decision-making enabled by a monthly report","A completed change record"],"answer":2,"explain":"The report itself is an output; improved decision-making it enables is the outcome for the stakeholder.","id":38,"hash":"d1082a493c"},{"domain":"D1","style":"missing","stem":"Which sentence completes the definition? 'A service offering may include goods, access to resources, and ____.'","options":["service actions","guiding principles","value streams","configuration items"],"answer":0,"explain":"Service offerings comprise goods, access to resources, and service actions performed to meet consumer needs.","id":39,"hash":"00a318c3bc"},{"domain":"D1","style":"negative","stem":"Which of the following is NOT one of the specific roles within the generic 'consumer' role?","options":["Customer","User","Sponsor","Supplier"],"answer":3,"explain":"Supplier is an external party, not part of the consumer. The consumer encompasses customer, user, and sponsor.","id":40,"hash":"cfb19fa5bb"},{"domain":"D1","style":"list","stem":"Which TWO of the following are roles within the service consumer? (Choose two.)","options":["Customer","Supplier","User","Auditor"],"answer":[0,2],"explain":"Within a service consumer, the relevant roles include customer (defines requirements), user (uses the service), and sponsor (authorizes budget). Supplier and auditor are not consumer roles.","id":41,"hash":"6b0f8fa2dd"},{"domain":"D1","style":"list","stem":"Which TWO statements about utility and warranty are correct? (Choose two.)","options":["Utility is 'fit for purpose'","Warranty is 'what the service does'","Warranty is 'fit for use'","Utility addresses availability and capacity"],"answer":[0,2],"explain":"Utility = fit for purpose (what the service does); warranty = fit for use (how it performs). Availability and capacity are warranty concerns.","id":42,"hash":"582280aadc"},{"domain":"D1","style":"standard","stem":"What is the primary purpose of value co-creation between provider and consumer?","options":["To shift all risk to the consumer","To eliminate the need for service relationships","To minimize provider involvement","To jointly produce outcomes that neither could achieve as effectively alone"],"answer":3,"explain":"Value co-creation recognizes that providers and consumers actively collaborate to produce mutually beneficial outcomes.","id":43,"hash":"0cc9d27192"},{"domain":"D1","style":"standard","stem":"Which statement best reflects how ITIL 4 treats the concept of 'value'?","options":["Value is co-created and is not determined by the provider alone","Value is created exclusively by the service provider","Value equals revenue","Value is independent of consumer perception"],"answer":0,"explain":"ITIL 4 positions value as co-created and dependent on the consumer's perception; it is not unilaterally defined by the provider.","id":44,"hash":"47ad23b137"},{"domain":"D1","style":"standard","stem":"An unplanned reduction in the quality of a service that imposes a new cost on the consumer is an example of:","options":["A risk removed by the service","A guaranteed outcome","A cost or risk imposed on the consumer by the service","A service action"],"answer":2,"explain":"Services can impose costs and risks on consumers; a quality reduction that creates new costs is a clear example of an imposed cost/risk.","id":45,"hash":"5d902982fe"},{"domain":"D1","style":"standard","stem":"Which is true about the relationship between a provider's products and consumer-facing services?","options":["Each product maps to exactly one service","Services exist independently of products","Consumers always see the full product","Products are configured and tailored into service offerings, and may not be fully visible to consumers"],"answer":3,"explain":"Products are configurations of resources tailored into offerings. Providers decide which components are visible; products may underpin several services.","id":46,"hash":"ca618df61e"},{"domain":"D1","style":"standard","stem":"Which of these is the BEST definition of 'service management'?","options":["A set of specialized organizational capabilities for enabling value to customers in the form of services","A set of tools for monitoring IT systems","The act of fixing incidents quickly","A contract governing service delivery"],"answer":0,"explain":"Service management is a set of specialized organizational capabilities for enabling value for customers in the form of services.","id":47,"hash":"9461bbab7e"},{"domain":"D1","style":"standard","stem":"Specialized organizational capabilities for service management are developed primarily through:","options":["Purchasing more tools","Experience, knowledge, and a deep understanding of how to enable value through services","Reducing the number of staff","Avoiding any change"],"answer":1,"explain":"These capabilities come from experience and a deep understanding of how to create value, developed over time.","id":48,"hash":"dad5b67758"},{"domain":"D1","style":"standard","stem":"Which statement about 'sponsor' is most accurate?","options":["The sponsor uses the service daily","The sponsor is always external to the consumer organization","The sponsor designs the service","The sponsor authorizes the budget for service consumption"],"answer":3,"explain":"The sponsor is the role accountable for authorizing budget for service consumption.","id":49,"hash":"b220400c51"},{"domain":"D1","style":"standard","stem":"A service can be described as a 'means of enabling value co-creation' because:","options":["Both provider and consumer contribute to producing valuable outcomes","The provider creates all value alone","Value is created only after payment","Value is a tangible deliverable"],"answer":0,"explain":"The phrase highlights that value emerges from collaboration between provider and consumer.","id":50,"hash":"fdeafe2c6f"},{"domain":"D1","style":"standard","stem":"Which is an example of 'access to resources' in a service offering?","options":["A laptop given permanently to a user","A license granting use of software under agreed terms","A consultancy report delivered once","Ownership transfer of a server"],"answer":1,"explain":"Access to resources is granted/licensed under terms without transferring ownership — a software license fits this.","id":51,"hash":"e4d79cce6f"},{"domain":"D1","style":"standard","stem":"Which is an example of 'goods' in a service offering?","options":["A licensed cloud platform","Temporary access to a meeting room","A smartphone whose ownership transfers to the consumer","A monitoring dashboard the provider owns"],"answer":2,"explain":"Goods transfer ownership to the consumer — a purchased smartphone is an example.","id":52,"hash":"93fa49b9a4"},{"domain":"D1","style":"standard","stem":"The phrase 'without the customer having to manage specific costs and risks' appears in the definition of:","options":["A service","Value","An outcome","Warranty"],"answer":0,"explain":"This phrase is part of the ITIL 4 definition of a service.","id":53,"hash":"c0a1319aa4"},{"domain":"D1","style":"standard","stem":"Which best characterizes how value can be both created and eroded?","options":["Only outcomes affect value","Outcomes can increase value while imposed costs and risks can reduce it","Costs never affect value","Value cannot be eroded"],"answer":1,"explain":"Net value reflects outcomes achieved minus the costs and risks the service imposes.","id":54,"hash":"98978df826"},{"domain":"D1","style":"standard","stem":"Which describes the consumer activity of 'service use actions'?","options":["The provider configuring infrastructure","Authorizing budget","Users interacting with and using the provider's resources to achieve outcomes","Designing the service offering"],"answer":2,"explain":"Service-use actions are performed by users as part of service consumption.","id":55,"hash":"7c21cc544b"},{"domain":"D1","style":"standard","stem":"Which is true of a service offering targeted at different consumer groups?","options":["It must be identical for every group","It excludes service actions","It cannot include goods","It can be tailored so different groups see different components and terms"],"answer":3,"explain":"Providers tailor offerings (visible components, terms) to suit different target consumer groups.","id":56,"hash":"c92060ce86"},{"domain":"D1","style":"standard","stem":"'Perceived benefits, usefulness, and importance of something' defines which term?","options":["Outcome","Value","Utility","Warranty"],"answer":1,"explain":"This is the ITIL 4 definition of value.","id":57,"hash":"ad3d066896"},{"domain":"D1","style":"standard","stem":"Which of the following best distinguishes a customer from a user?","options":["They are always the same person","A user authorizes budget; a customer uses the service","A customer defines requirements and owns outcomes; a user actually uses the service","Neither has any responsibility"],"answer":2,"explain":"The customer specifies requirements and is accountable for outcomes; the user operates the service day-to-day.","id":58,"hash":"9be09a02bd"},{"domain":"D1","style":"standard","stem":"Which statement reflects the ITIL 4 view that an organization can hold multiple roles?","options":["An organization is only ever a provider","Only individuals, not organizations, hold roles","Roles never overlap","The same organization may be a provider in one relationship and a consumer in another, sometimes simultaneously"],"answer":3,"explain":"Organizations commonly act as both provider and consumer across, and even within, relationships.","id":59,"hash":"f4546a1f86"},{"domain":"D1","style":"standard","stem":"A possible event that could cause harm or loss, or make objectives harder to achieve, is called:","options":["A risk","An issue","A problem","A change"],"answer":0,"explain":"This is the ITIL 4 definition of risk.","id":60,"hash":"e08962a043"},{"domain":"D1","style":"standard","stem":"Which is the correct order of abstraction from most specific to most generic for consumer roles?","options":["Consumer > customer > user","Sponsor > consumer > user","User/customer/sponsor are specific roles under the generic 'consumer'","There is no relationship between them"],"answer":2,"explain":"Consumer is the generic role; customer, user, and sponsor are the specific roles it encompasses.","id":61,"hash":"27e83913db"},{"domain":"D1","style":"standard","stem":"Which best explains why ITIL emphasizes outcomes over outputs?","options":["Outputs are easier to ignore","Outputs cannot be measured","Outcomes are cheaper to produce","Stakeholders ultimately care about results (outcomes), which outputs merely enable"],"answer":3,"explain":"Focusing on outcomes keeps attention on the value stakeholders actually seek, beyond mere deliverables.","id":62,"hash":"2bc93af7f9"},{"domain":"D1","style":"standard","stem":"A service provider should view costs imposed on the consumer as:","options":["Part of the value equation that can reduce perceived value","Always irrelevant","Pure profit","Identical to provider costs"],"answer":0,"explain":"Imposed costs can reduce the consumer's perceived value and must be considered when shaping offerings.","id":63,"hash":"1662113e80"},{"domain":"D1","style":"standard","stem":"Which of the following is the best example of warranty failing?","options":["A service does something the customer did not need","A service is frequently unavailable despite offering the right functionality","A service offers new features","A service is delivered under budget"],"answer":1,"explain":"Frequent unavailability is a warranty (fit-for-use) failure even if utility is present.","id":64,"hash":"b85114cfa8"},{"domain":"D1","style":"standard","stem":"Which of the following is the best example of utility failing?","options":["A service costs more than expected","A service is occasionally slow","A service is delivered slightly late","A service is always available but lacks a feature the customer needs to do their job"],"answer":3,"explain":"Missing required functionality is a utility (fit-for-purpose) failure.","id":65,"hash":"a6b1256593"},{"domain":"D1","style":"standard","stem":"What is the relationship between a 'service' and 'value co-creation'?","options":["A service is the means of enabling value co-creation","Services prevent value co-creation","Value co-creation replaces services","They are unrelated"],"answer":0,"explain":"ITIL 4 defines a service precisely as a means of enabling value co-creation.","id":66,"hash":"5c955ad843"},{"domain":"D2","style":"standard","stem":"What are the four dimensions of service management?","options":["Strategy, Design, Transition, Operation","Organizations and people; Information and technology; Partners and suppliers; Value streams and processes","People, Process, Products, Partners","Plan, Improve, Engage, Deliver"],"answer":1,"explain":"The four dimensions are: (1) Organizations and people, (2) Information and technology, (3) Partners and suppliers, (4) Value streams and processes. All four must be considered to deliver value.","id":67,"hash":"0dccaed08e"},{"domain":"D2","style":"standard","stem":"Why must all four dimensions be considered together?","options":["They are independent and can be optimized separately","Only the technology dimension affects value","Failing to address all four can lead to services that are not fit for purpose or use, or degraded quality","They replace the service value chain"],"answer":2,"explain":"The four dimensions represent perspectives relevant to the whole SVS. Neglecting any one can compromise the quality and value of products and services.","id":68,"hash":"6fd88d4eeb"},{"domain":"D2","style":"standard","stem":"Which dimension covers roles, responsibilities, organizational structures, culture, and required competencies?","options":["Organizations and people","Information and technology","Partners and suppliers","Value streams and processes"],"answer":0,"explain":"The 'organizations and people' dimension addresses how an organization is structured and managed, including roles, culture, staffing, and competencies.","id":69,"hash":"380c9df301"},{"domain":"D2","style":"standard","stem":"Which dimension includes the information and knowledge needed to manage services, plus the technologies used?","options":["Organizations and people","Information and technology","Partners and suppliers","Value streams and processes"],"answer":1,"explain":"'Information and technology' covers the information/knowledge and the technologies required for service management and the services themselves.","id":70,"hash":"77ee0d8c31"},{"domain":"D2","style":"standard","stem":"Which dimension covers an organization's relationships with other organizations involved in design, deployment, delivery, and support of services?","options":["Value streams and processes","Organizations and people","Partners and suppliers","Information and technology"],"answer":2,"explain":"The 'partners and suppliers' dimension addresses relationships with other organizations, including contracts, integration, and the organization's sourcing strategy.","id":71,"hash":"cb74dd3e10"},{"domain":"D2","style":"standard","stem":"Which dimension defines the activities, workflows, controls, and procedures needed to achieve agreed objectives?","options":["Partners and suppliers","Information and technology","Organizations and people","Value streams and processes"],"answer":3,"explain":"'Value streams and processes' is about how the various parts of the organization work in an integrated way to enable value creation through products and services.","id":72,"hash":"4a58334d07"},{"domain":"D2","style":"standard","stem":"Which of the following are the external factors that influence all four dimensions, summarized by the 'PESTLE' model?","options":["People, Equipment, Standards, Tools, Logic, Energy","Political, Economic, Social, Technological, Legal, Environmental","Plan, Engage, Support, Transition, Learn, Evaluate","Process, Effectiveness, Service, Time, Location, Effort"],"answer":1,"explain":"External factors are captured by PESTLE: Political, Economic, Social, Technological, Legal, and Environmental factors that affect the SVS and the four dimensions.","id":73,"hash":"3fccb8fe9d"},{"domain":"D2","style":"standard","stem":"A 'product' or 'service' must address which combination of the four dimensions?","options":["Only the dimensions chosen by the provider","Only value streams and processes","All four dimensions, because they apply holistically to the entire SVS","Only organizations and people"],"answer":2,"explain":"The four dimensions apply to the whole SVS, including all services and products; all must be considered to ensure balanced, effective service management.","id":74,"hash":"d3d152ae3e"},{"domain":"D2","style":"standard","stem":"Which dimension is most directly concerned with an organization's sourcing strategy?","options":["Organizations and people","Value streams and processes","Information and technology","Partners and suppliers"],"answer":3,"explain":"The partners and suppliers dimension includes the organization's strategy for sourcing — e.g., insourcing, outsourcing, or service integration.","id":75,"hash":"e0076206d1"},{"domain":"D2","style":"standard","stem":"Which dimension is most concerned with organizational culture and the way people collaborate?","options":["Organizations and people","Partners and suppliers","Information and technology","Value streams and processes"],"answer":0,"explain":"Organizational culture, leadership, communication, and collaboration fall under the organizations and people dimension.","id":76,"hash":"fac0d68de7"},{"domain":"D2","style":"standard","stem":"When applied to information management, which considerations are part of the 'information and technology' dimension?","options":["Only hardware procurement","Only the choice of programming language","Availability, reliability, accessibility, security, and compliance of information","Only the number of staff"],"answer":2,"explain":"For information, this dimension considers how information is managed and the requirements around availability, reliability, accessibility, timeliness, accuracy, security, and regulatory compliance.","id":77,"hash":"2ac2533bdd"},{"domain":"D2","style":"standard","stem":"Which of the following technologies might be relevant to the 'information and technology' dimension of a modern service?","options":["None; technology is excluded","Only legacy mainframes","Only paper records","AI, machine learning, cloud computing, and mobile platforms"],"answer":3,"explain":"This dimension explicitly accounts for current technologies such as AI/ML, cloud, mobile, and analytics where they support or enable services.","id":78,"hash":"1331c197d9"},{"domain":"D2","style":"standard","stem":"What is the risk of focusing only on the 'value streams and processes' dimension?","options":["Other essential perspectives (people, technology, suppliers) may be neglected, harming value","Services will always succeed","Costs will be eliminated","Warranty will automatically improve"],"answer":0,"explain":"Over-focusing on one dimension at the expense of the others can produce ineffective or unbalanced services. All four must be balanced.","id":79,"hash":"a6278aee3c"},{"domain":"D2","style":"standard","stem":"Which dimension would address whether the organization has the right skills and competencies for its services?","options":["Partners and suppliers","Organizations and people","Value streams and processes","Information and technology"],"answer":1,"explain":"Ensuring the workforce has the right skills, knowledge, and competencies is part of the organizations and people dimension.","id":80,"hash":"a4927c0b72"},{"domain":"D2","style":"standard","stem":"The external factors affecting the four dimensions are often analyzed using which model?","options":["SWOT","SMART","RACI","PESTLE"],"answer":3,"explain":"PESTLE (Political, Economic, Social, Technological, Legal, Environmental) is used to assess external factors influencing the dimensions and SVS.","id":81,"hash":"51d72b6aac"},{"domain":"D2","style":"standard","stem":"Which of the following best describes how partners and suppliers can be integrated?","options":["Through formal contracts and agreements, and via service integration and management approaches","Only through informal verbal agreements","By avoiding all external relationships","By transferring all risk to the consumer"],"answer":0,"explain":"Partner/supplier relationships range from informal cooperation to formal contracts and SIAM, depending on the organization's needs and strategy.","id":82,"hash":"b0394efb82"},{"domain":"D2","style":"list","stem":"Which TWO of the following are dimensions of service management? (Choose two.)","options":["Information and technology","Strategy and tactics","Value streams and processes","Demand and supply"],"answer":[0,2],"explain":"Two of the four dimensions are 'information and technology' and 'value streams and processes'. The others are 'organizations and people' and 'partners and suppliers'.","id":83,"hash":"b1471f31d5"},{"domain":"D2","style":"negative","stem":"Which of the following is NOT one of the four dimensions of service management?","options":["Organizations and people","Partners and suppliers","Risks and costs","Value streams and processes"],"answer":2,"explain":"'Risks and costs' is not a dimension. The four dimensions are organizations and people; information and technology; partners and suppliers; value streams and processes.","id":84,"hash":"2e6a179197"},{"domain":"D2","style":"missing","stem":"Complete the sentence: 'The four dimensions apply to the entire ____ and to all of the services and products an organization manages.'","options":["service value system","service desk","supplier contract","incident record"],"answer":0,"explain":"The four dimensions apply to the whole service value system and to all services and products.","id":85,"hash":"1a58280497"},{"domain":"D2","style":"standard","stem":"Which factor is part of the 'partners and suppliers' dimension?","options":["The organization's culture","Contracts and the degree of formality in supplier relationships","Workflow design","Database technology"],"answer":1,"explain":"Contracts, agreements, and the formality of relationships with suppliers belong to the partners and suppliers dimension.","id":86,"hash":"180452d790"},{"domain":"D2","style":"standard","stem":"Insourcing, outsourcing, and service integration are decisions within which dimension?","options":["Organizations and people","Value streams and processes","Partners and suppliers","Information and technology"],"answer":2,"explain":"These sourcing decisions are part of the partners and suppliers dimension.","id":87,"hash":"3b4a6eb15e"},{"domain":"D2","style":"standard","stem":"Which dimension governs the design and management of workflows and procedures?","options":["Value streams and processes","Partners and suppliers","Organizations and people","Information and technology"],"answer":0,"explain":"Workflows, procedures, controls, and value streams are defined within the value streams and processes dimension.","id":88,"hash":"d1d99a52ad"},{"domain":"D2","style":"standard","stem":"Which dimension considers the regulatory compliance of information?","options":["Partners and suppliers","Information and technology","Organizations and people","Value streams and processes"],"answer":1,"explain":"Information compliance, security, and accuracy are part of the information and technology dimension.","id":89,"hash":"304828b4d5"},{"domain":"D2","style":"standard","stem":"Leadership style and communication patterns belong to which dimension?","options":["Partners and suppliers","Information and technology","Organizations and people","Value streams and processes"],"answer":2,"explain":"Leadership, culture, and communication are addressed in organizations and people.","id":90,"hash":"17a6496558"},{"domain":"D2","style":"standard","stem":"An organization choosing cloud over on-premises infrastructure is making a decision primarily within which dimension?","options":["Value streams and processes","Organizations and people","Partners and suppliers","Information and technology"],"answer":3,"explain":"Technology selection such as cloud vs on-prem is part of the information and technology dimension (with supplier overlap).","id":91,"hash":"f24bf76ce4"},{"domain":"D2","style":"standard","stem":"Which external factor in PESTLE would cover new data-protection legislation?","options":["Social","Legal","Economic","Environmental"],"answer":1,"explain":"Data-protection legislation is a Legal factor in PESTLE.","id":92,"hash":"93597347ec"},{"domain":"D2","style":"standard","stem":"Which external factor in PESTLE would cover a recession affecting budgets?","options":["Technological","Political","Economic","Environmental"],"answer":2,"explain":"A recession is an Economic factor.","id":93,"hash":"207ecfd693"},{"domain":"D2","style":"standard","stem":"Which external factor in PESTLE would cover sustainability and carbon regulations?","options":["Political","Social","Legal","Environmental"],"answer":3,"explain":"Sustainability and carbon concerns are Environmental factors (with possible Legal overlap).","id":94,"hash":"3d91cd9ffd"},{"domain":"D2","style":"standard","stem":"Which statement about the four dimensions is correct?","options":["They are constraints and perspectives that must all be addressed for effective, holistic service management","They are optional perspectives","Only two are needed at a time","They replace the guiding principles"],"answer":0,"explain":"All four dimensions must be addressed to ensure a holistic approach; neglecting any can reduce value.","id":95,"hash":"29d5faa3ef"},{"domain":"D2","style":"standard","stem":"How do the four dimensions relate to the service value system?","options":["They sit outside the SVS and are unrelated","They are a subset of the guiding principles","They represent perspectives that apply across the entire SVS","They are the same as the service value chain activities"],"answer":2,"explain":"The four dimensions apply across the whole SVS, ensuring balanced consideration.","id":96,"hash":"142e5e2638"},{"domain":"D2","style":"standard","stem":"Knowledge management and the handling of organizational data fall mainly under which dimension?","options":["Value streams and processes","Organizations and people","Partners and suppliers","Information and technology"],"answer":3,"explain":"Information/knowledge handling is part of the information and technology dimension.","id":97,"hash":"bbf13ca7a8"},{"domain":"D2","style":"standard","stem":"Which dimension would you examine to determine whether processes are efficient and integrated end-to-end?","options":["Value streams and processes","Information and technology","Partners and suppliers","Organizations and people"],"answer":0,"explain":"End-to-end workflow efficiency and integration are matters for the value streams and processes dimension.","id":98,"hash":"656bec50a5"},{"domain":"D2","style":"standard","stem":"Which is the BEST reason to apply a holistic four-dimensional view?","options":["To increase documentation","To avoid creating silos and ensure products/services are designed and operated effectively","To reduce the number of suppliers","To eliminate the SVS"],"answer":1,"explain":"A holistic view prevents siloed optimization and supports balanced, effective service management.","id":99,"hash":"9b9c92d0dd"},{"domain":"D2","style":"standard","stem":"Security of information is considered within which dimension?","options":["Organizations and people","Partners and suppliers","Value streams and processes","Information and technology"],"answer":3,"explain":"Information security is part of the information and technology dimension (and supported by the information security management practice).","id":100,"hash":"3330c8cd63"},{"domain":"D2","style":"standard","stem":"Which dimension is concerned with the competencies and recruitment needed to support services?","options":["Organizations and people","Information and technology","Partners and suppliers","Value streams and processes"],"answer":0,"explain":"Competency, recruitment, and staffing are part of organizations and people.","id":101,"hash":"f1d7fdab7e"},{"domain":"D2","style":"standard","stem":"Which dimension would address the choice and configuration of an ITSM tool?","options":["Organizations and people","Information and technology","Partners and suppliers","Value streams and processes"],"answer":1,"explain":"Selecting and configuring technology, including ITSM tooling, is part of the information and technology dimension.","id":102,"hash":"d93777a0dd"},{"domain":"D2","style":"standard","stem":"Which of these is a valid external influence on the four dimensions?","options":["Internal workflow only","Only staff opinions","Political and economic conditions (via PESTLE)","Only the service desk"],"answer":2,"explain":"PESTLE factors — including political and economic conditions — are valid external influences on the dimensions and SVS.","id":103,"hash":"8b2839639e"},{"domain":"D2","style":"standard","stem":"A failure to manage the partners and suppliers dimension could result in:","options":["Supply chain risk, poor integration, and degraded service value","Improved service automatically","No effect on the service","Reduced need for contracts"],"answer":0,"explain":"Neglecting supplier relationships introduces supply-chain risk and integration problems that can degrade value.","id":104,"hash":"4c81da2f60"},{"domain":"D3","style":"standard","stem":"What is the purpose of the ITIL Service Value System (SVS)?","options":["To list all ITIL practices","To describe how all the components and activities of an organization work together as a system to enable value creation","To define only the service desk function","To replace the four dimensions"],"answer":1,"explain":"The SVS describes how all the components and activities of the organization work together as a system to enable value creation. It facilitates a flexible, coordinated approach.","id":105,"hash":"e523285587"},{"domain":"D3","style":"standard","stem":"Which of the following are the components of the ITIL Service Value System?","options":["People, process, products, and partners","Strategy, design, transition, operation, and improvement","Guiding principles, governance, the service value chain, practices, and continual improvement","Plan, do, check, act"],"answer":2,"explain":"The SVS comprises: guiding principles, governance, the service value chain, practices, and continual improvement.","id":106,"hash":"8abfbd60de"},{"domain":"D3","style":"standard","stem":"What is the main input to the service value system?","options":["Value","Outcomes","Products and services","Opportunity and demand"],"answer":3,"explain":"Opportunity and demand are the inputs that trigger the SVS. Opportunities are options to add value; demand is the need for services among consumers.","id":107,"hash":"c530da67e4"},{"domain":"D3","style":"standard","stem":"What is the main output of the service value system?","options":["Opportunity and demand","Value","Practices","Governance"],"answer":1,"explain":"The output of the SVS is value. The whole purpose of the SVS is to enable the consistent co-creation of value.","id":108,"hash":"2bef042c9a"},{"domain":"D3","style":"standard","stem":"Which SVS component is 'a set of recommendations that can guide an organization in all circumstances'?","options":["Governance","Continual improvement","The guiding principles","Practices"],"answer":2,"explain":"The guiding principles are universal recommendations that guide an organization in all circumstances, regardless of changes in goals, strategies, or structure.","id":109,"hash":"70d557609a"},{"domain":"D3","style":"standard","stem":"Which SVS component refers to the means by which an organization is directed and controlled?","options":["Guiding principles","Practices","The service value chain","Governance"],"answer":3,"explain":"Governance is the means by which an organization is directed and controlled. It ensures activities align with policies and direction set by the governing body.","id":110,"hash":"ef17cc8a24"},{"domain":"D3","style":"standard","stem":"Which SVS component is a set of organizational resources designed for performing work or accomplishing an objective?","options":["Practices","The service value chain","Governance","Continual improvement"],"answer":0,"explain":"Practices are sets of organizational resources designed for performing work or accomplishing an objective. ITIL 4 defines 34 management practices.","id":111,"hash":"7e59408529"},{"domain":"D3","style":"standard","stem":"Which SVS component is the central element representing an operating model for creating, delivering, and continually improving services?","options":["Governance","The guiding principles","The service value chain","Practices"],"answer":2,"explain":"The service value chain is the central element of the SVS — an operating model defining the key activities needed to respond to demand and enable value realization.","id":112,"hash":"993b7c0031"},{"domain":"D3","style":"standard","stem":"The 'continual improvement' component of the SVS does what?","options":["Ensures one-time fixes only","Is optional and rarely used","Replaces governance","Ensures the organization's performance continually meets stakeholder expectations across all dimensions and components"],"answer":3,"explain":"Continual improvement is a recurring activity at all levels of the SVS, ensuring performance keeps meeting stakeholder expectations.","id":113,"hash":"16255476b7"},{"domain":"D3","style":"standard","stem":"What is the primary purpose of the SVS in terms of organizational silos?","options":["To represent how components and activities work together to facilitate value creation and reduce siloed working","To reinforce silos","To eliminate all practices","To remove the need for governance"],"answer":0,"explain":"The SVS promotes integration and coordination, helping organizations avoid silos that hinder consistent value creation.","id":114,"hash":"25fa1c3ed0"},{"domain":"D3","style":"standard","stem":"Which of the following is the correct relationship between opportunity, demand, and value in the SVS?","options":["Value is the input; opportunity/demand is the output","Opportunity and demand are inputs; value is the output","Both opportunity and value are inputs","Demand is an output of the SVS"],"answer":1,"explain":"Opportunity and demand feed into the SVS as inputs; value is the resulting output.","id":115,"hash":"d5d8a0142c"},{"domain":"D3","style":"standard","stem":"What is the difference between 'opportunity' and 'demand' as SVS inputs?","options":["They are the same","Opportunity is an output","Demand always precedes opportunity","Opportunities are options to add value or improve; demand is the need or desire for products and services"],"answer":3,"explain":"Opportunities represent options for adding value to stakeholders, while demand is the need or desire for products and services from internal and external consumers.","id":116,"hash":"a1a4918230"},{"domain":"D3","style":"standard","stem":"Which statement best describes how the guiding principles relate to the SVS?","options":["They can guide decisions and actions across every component and activity of the SVS","They apply only to the service desk","They replace the service value chain","They are used only during incidents"],"answer":0,"explain":"The guiding principles are universally applicable across the entire SVS and at every level of the organization.","id":117,"hash":"0b43c1589b"},{"domain":"D3","style":"standard","stem":"Governance within the SVS is typically performed by:","options":["Individual users","The governing body (e.g., board) or those it delegates authority to","Suppliers only","The service desk"],"answer":1,"explain":"Governance is carried out by the governing body, such as a board of directors, or by individuals/groups to whom that authority is delegated.","id":118,"hash":"eecc8d60f8"},{"domain":"D3","style":"standard","stem":"Which of the following correctly lists the five SVS components?","options":["Engage, Plan, Improve, Design, Deliver","Strategy, Design, Transition, Operation, CSI","Guiding principles, Governance, Service value chain, Practices, Continual improvement","Plan, Do, Check, Act, Review"],"answer":2,"explain":"The five components of the SVS are the guiding principles, governance, the service value chain, practices, and continual improvement.","id":119,"hash":"015ad22c65"},{"domain":"D3","style":"standard","stem":"Continual improvement in the SVS applies to:","options":["All components of the SVS and all four dimensions","Only the service value chain","Only practices","Only governance"],"answer":0,"explain":"Continual improvement is woven throughout the SVS and applies across all components and the four dimensions.","id":120,"hash":"11a14409b3"},{"domain":"D3","style":"standard","stem":"What does the SVS enable an organization to do in response to demand?","options":["Ignore demand","Direct, coordinate, and adapt activities to consistently co-create value","Eliminate the service value chain","Avoid governance"],"answer":1,"explain":"The SVS lets an organization consistently co-create value by directing and coordinating its components and activities in response to opportunity and demand.","id":121,"hash":"0ef02c698d"},{"domain":"D3","style":"list","stem":"Which TWO of the following are components of the ITIL SVS? (Choose two.)","options":["Governance","Four dimensions","Practices","PESTLE"],"answer":[0,2],"explain":"Governance and practices are SVS components. The four dimensions are a separate model, and PESTLE is an external-factor tool.","id":122,"hash":"c29a1463a8"},{"domain":"D3","style":"negative","stem":"Which of the following is NOT a component of the SVS?","options":["The service value chain","Continual improvement","The four dimensions of service management","Guiding principles"],"answer":2,"explain":"The four dimensions are not an SVS component; they are a separate holistic model. SVS components are guiding principles, governance, service value chain, practices, and continual improvement.","id":123,"hash":"358d8a62ab"},{"domain":"D3","style":"missing","stem":"Complete the sentence: 'The output of the service value system is ____.'","options":["value","demand","opportunity","governance"],"answer":0,"explain":"The output of the SVS is value; the inputs are opportunity and demand.","id":124,"hash":"cc6a589820"},{"domain":"D3","style":"standard","stem":"Which component ensures the organization is directed and controlled, with accountability and policies?","options":["Guiding principles","Practices","Governance","Continual improvement"],"answer":2,"explain":"Governance directs and controls the organization, ensuring accountability and adherence to policy.","id":125,"hash":"f0b70260ee"},{"domain":"D3","style":"standard","stem":"Which component provides the operating model for creating and delivering products and services?","options":["Guiding principles","Governance","Continual improvement","The service value chain"],"answer":3,"explain":"The service value chain is the operating model at the heart of the SVS.","id":126,"hash":"2d8932b03f"},{"domain":"D3","style":"standard","stem":"Which best describes the role of practices in the SVS?","options":["They are external factors","They are sets of organizational resources for performing work","They are the inputs to the SVS","They replace governance"],"answer":1,"explain":"Practices are sets of resources designed to perform work or accomplish objectives within the SVS.","id":127,"hash":"9b7bc79829"},{"domain":"D3","style":"standard","stem":"How many ITIL management practices are defined in ITIL 4?","options":["14","26","34","7"],"answer":2,"explain":"ITIL 4 defines 34 management practices across three categories.","id":128,"hash":"9e89136a5f"},{"domain":"D3","style":"standard","stem":"The guiding principles are intended to be:","options":["Used only in emergencies","Replaced frequently","Specific to a single practice","Universal and enduring recommendations applicable in all circumstances"],"answer":3,"explain":"Guiding principles are universal and enduring, guiding behavior across all circumstances.","id":129,"hash":"504a3d3aff"},{"domain":"D3","style":"standard","stem":"Which is an example of an SVS 'opportunity' input?","options":["A new market segment the organization could serve","A backlog of incidents","A failed change","A breached SLA"],"answer":0,"explain":"An opportunity is a possibility to add value — e.g., entering a new market segment.","id":130,"hash":"8ef0a62262"},{"d
