<h3 id="intro" data-toc="Overview & exam format">ITIL 4 Foundation — Overview</h3>
<p>ITIL 4 is the current iteration of the most widely adopted guidance for <strong>IT service management (ITSM)</strong>. It reframes service management around <strong>value co-creation</strong> and integrates modern ways of working — Agile, Lean, and DevOps — into a single operating model. The Foundation certification establishes a common vocabulary and a high-level understanding of the framework.</p>
<div class="callout exam">
  <div class="lab">Exam format</div>
  The ITIL&nbsp;4 Foundation exam is <strong>closed-book</strong>: 40 multiple-choice questions, 60 minutes (extra time is granted for candidates sitting in a non-native language). The pass mark is <strong>26 out of 40 — 65%</strong>. Question types are <strong>standard</strong> ("which of the following…"), <strong>missing-word</strong>, and <strong>list</strong> ("which two…"). Occasionally a <strong>negative standard</strong> question asks which option is NOT correct.
</div>
<p class="dim" style="font-size:13px">Note: PeopleCert has begun rolling out a refreshed "ITIL" generation with new modules and an AI-governance extension. ITIL&nbsp;4 remains current and is the basis of this guide and the question bank.</p>

<h4>The four key messages of ITIL 4</h4>
<ul>
  <li><strong>Value:</strong> the purpose of an organization is to create value for stakeholders.</li>
  <li><strong>Co-creation:</strong> value is created <em>together</em> by providers and consumers, not handed over one-way.</li>
  <li><strong>Holism:</strong> the service value system ties every component together.</li>
  <li><strong>Adaptability:</strong> the guiding principles let the framework flex to any situation.</li>
</ul>

<!-- ================= D1 ================= -->
<h3 id="d1" data-toc="Key concepts">1 · Key Concepts of Service Management</h3>
<p>Service management is defined as <strong>a set of specialized organizational capabilities for enabling value for customers in the form of services</strong>. Developing these capabilities requires understanding a handful of core concepts.</p>

<h4>Value and value co-creation</h4>
<p><strong>Value</strong> is the perceived benefits, usefulness, and importance of something. It is <strong>subjective</strong> (it depends on the perception of stakeholders) and is <strong>co-created</strong> through an active collaboration between the service provider and the service consumer, as well as other stakeholders.</p>

<h4>Organizations, service providers, consumers, and other stakeholders</h4>
<p>An <strong>organization</strong> is a person or a group with its own functions, responsibilities, authorities, and relationships to achieve objectives. In any service relationship an organization can take the role of <strong>service provider</strong> or <strong>service consumer</strong> — and usually both at the same time.</p>
<p>The generic term <strong>consumer</strong> covers three more specific roles:</p>
<table class="deftable">
  <tr><td>Customer</td><td>Defines the requirements for a service and takes responsibility for the outcomes of service consumption.</td></tr>
  <tr><td>User</td><td>Uses the service on a day-to-day basis.</td></tr>
  <tr><td>Sponsor</td><td>Authorizes the budget for service consumption.</td></tr>
</table>
<p>Other stakeholders include employees, suppliers, partners, investors, shareholders, governments, and society.</p>

<h4>Products and services</h4>
<p>A <strong>product</strong> is a configuration of an organization's resources designed to offer value to a consumer. A <strong>service</strong> is <strong>a means of enabling value co-creation by facilitating outcomes that customers want to achieve, without the customer having to manage specific costs and risks.</strong></p>

<h4>Service offerings</h4>
<p>A <strong>service offering</strong> is a formal description of one or more services, designed to address the needs of a target consumer group. It can include:</p>
<table class="deftable">
  <tr><td>Goods</td><td>Supplied to the consumer; <strong>ownership is transferred</strong>, and the consumer takes on responsibility for their future use.</td></tr>
  <tr><td>Access to resources</td><td>Access is granted or licensed under agreed terms; <strong>ownership is not transferred</strong>.</td></tr>
  <tr><td>Service actions</td><td>Actions performed to address a consumer's needs; performed by the provider, the user, or jointly.</td></tr>
</table>

<h4>Service relationships</h4>
<p>A <strong>service relationship</strong> is a cooperation between a service provider and service consumer. It is jointly created through <strong>service provision</strong>, <strong>service consumption</strong>, and <strong>service relationship management</strong>.</p>

<h4>Outcomes, costs, and risks</h4>
<table class="deftable">
  <tr><td>Output</td><td>A tangible or intangible <em>deliverable</em> of an activity.</td></tr>
  <tr><td>Outcome</td><td>A <em>result</em> for a stakeholder, enabled by one or more outputs. Customers care about outcomes, not outputs.</td></tr>
  <tr><td>Cost</td><td>The amount of money spent on a specific activity or resource. Services remove some costs from the consumer but introduce others (e.g. fees).</td></tr>
  <tr><td>Risk</td><td>A possible event that could cause harm or loss, or make it more difficult to achieve objectives. Services remove some risks and impose others.</td></tr>
</table>

<h4>Utility and warranty</h4>
<div class="callout">
  <div class="lab">High-frequency exam topic</div>
  <strong>Utility</strong> = "fit for <em>purpose</em>" — what the service does; whether it meets a particular need.<br>
  <strong>Warranty</strong> = "fit for <em>use</em>" — how the service performs; assurance it meets agreed requirements. Warranty typically covers <strong>availability, capacity, security, and continuity</strong>.<br>
  A service needs <em>both</em> utility and warranty to enable value.
</div>

<!-- ================= D2 ================= -->
<h3 id="d2" data-toc="Four dimensions">2 · The Four Dimensions of Service Management</h3>
<p>To work holistically, ITIL&nbsp;4 identifies four dimensions that are <strong>critical to the effective facilitation of value</strong> for customers and stakeholders. Each must be addressed for all services and products; neglecting one causes services to become unbalanced.</p>
<div class="prin">
  <div class="p"><div class="num">DIM 1</div><h5>Organizations & people</h5><p>Structures, roles and responsibilities, staffing, skills and competencies, and — crucially — culture. Everyone should understand their contribution to value.</p></div>
  <div class="p"><div class="num">DIM 2</div><h5>Information & technology</h5><p>The information and knowledge needed to manage services, plus the technologies used. Considerations include security, compliance, and the relationship between information and the organization's architecture.</p></div>
  <div class="p"><div class="num">DIM 3</div><h5>Partners & suppliers</h5><p>Relationships with other organizations involved in design, development, deployment, delivery, and support. Includes contracts, integration, and the organization's <strong>service integration and management (SIAM)</strong> approach.</p></div>
  <div class="p"><div class="num">DIM 4</div><h5>Value streams & processes</h5><p>How the various parts of the organization work together — defining the activities, workflows, controls, and procedures needed to achieve agreed objectives.</p></div>
</div>
<div class="callout exam">
  <div class="lab">Remember</div>
  The four dimensions are constrained by <strong>external factors</strong> summarized by <strong>PESTLE</strong>: <strong>P</strong>olitical, <strong>E</strong>conomic, <strong>S</strong>ocial, <strong>T</strong>echnological, <strong>L</strong>egal, and <strong>E</strong>nvironmental.
</div>

<!-- ================= D3 ================= -->
<h3 id="d3" data-toc="Service value system">3 · The Service Value System (SVS)</h3>
<p>The <strong>ITIL service value system (SVS)</strong> describes how all the components and activities of the organization work together as a system to enable value creation. Its inputs are <strong>opportunity</strong> and <strong>demand</strong>; its output is <strong>value</strong>.</p>
<table class="deftable">
  <tr><td>Opportunity</td><td>Options or possibilities to add value for stakeholders or otherwise improve the organization.</td></tr>
  <tr><td>Demand</td><td>The need or desire for products and services from internal and external consumers.</td></tr>
</table>
<h4>The five components of the SVS</h4>
<div class="prin">
  <div class="p"><div class="num">SVS 1</div><h5>Guiding principles</h5><p>Recommendations that guide the organization in all circumstances.</p></div>
  <div class="p"><div class="num">SVS 2</div><h5>Governance</h5><p>The means by which the organization is directed and controlled.</p></div>
  <div class="p"><div class="num">SVS 3</div><h5>Service value chain</h5><p>The operating model — a set of six interconnected activities.</p></div>
  <div class="p"><div class="num">SVS 4</div><h5>Practices</h5><p>Sets of organizational resources designed for performing work or accomplishing an objective.</p></div>
  <div class="p"><div class="num">SVS 5</div><h5>Continual improvement</h5><p>A recurring activity at all levels to align the organization with changing needs.</p></div>
</div>
<p>The SVS is designed to be flexible and to <strong>reduce organizational silos</strong>, enabling the whole organization to direct effort toward a common goal of value creation.</p>

<h4>Governance</h4>
<p>Every organization is directed by a <strong>governing body</strong>. Governance involves three activities: <strong>evaluate</strong>, <strong>direct</strong>, and <strong>monitor</strong>.</p>

<!-- ================= D4 ================= -->
<h3 id="d4" data-toc="Guiding principles">4 · The Seven Guiding Principles</h3>
<p>A <strong>guiding principle</strong> is a recommendation that guides an organization in all circumstances, regardless of changes in goals, strategies, type of work, or management structure. The principles are <strong>universal and enduring</strong>.</p>
<div class="prin">
  <div class="p"><div class="num">GP 1</div><h5>Focus on value</h5><p>Everything the organization does should map, directly or indirectly, to value for stakeholders. Know who is being served and what they consider valuable.</p></div>
  <div class="p"><div class="num">GP 2</div><h5>Start where you are</h5><p>Do not start from scratch. Assess the current state and reuse what already exists wherever possible; measure directly rather than assuming.</p></div>
  <div class="p"><div class="num">GP 3</div><h5>Progress iteratively with feedback</h5><p>Organize work into smaller, manageable sections, executed and completed in a timely manner. Use feedback before, during, and after each iteration.</p></div>
  <div class="p"><div class="num">GP 4</div><h5>Collaborate & promote visibility</h5><p>Work together across boundaries; the right collaboration leads to better buy-in and outcomes. Make work and consequences visible to avoid poor decisions.</p></div>
  <div class="p"><div class="num">GP 5</div><h5>Think & work holistically</h5><p>No service, practice, or component stands alone. The SVS and its parts must work together as an integrated system.</p></div>
  <div class="p"><div class="num">GP 6</div><h5>Keep it simple & practical</h5><p>Use the minimum number of steps to accomplish an objective. Eliminate anything that fails to produce useful output or create value.</p></div>
  <div class="p"><div class="num">GP 7</div><h5>Optimize & automate</h5><p>Maximize the value of work done by people and technology. <strong>Optimize first, then automate</strong> — automating an inefficient process simply produces waste faster.</p></div>
</div>
<div class="callout">
  <div class="lab">How the principles interact</div>
  The principles are not applied in isolation — most situations call for several at once. They reinforce one another: for example, "start where you are" pairs with "focus on value" to ensure improvement effort targets what stakeholders actually value.
</div>

<!-- ================= D5 ================= -->
<h3 id="d5" data-toc="Service value chain">5 · The Service Value Chain</h3>
<p>The <strong>service value chain</strong> is the central element of the SVS — an <strong>operating model</strong> for the creation, delivery, and continual improvement of services. It comprises <strong>six interconnected activities</strong>. Each takes inputs and produces outputs, and each can use any combination of practices.</p>
<div class="prin">
  <div class="p"><div class="num">VC · Plan</div><h5>Plan</h5><p>Ensures a shared understanding of the vision, current status, and improvement direction for all four dimensions and all products and services.</p></div>
  <div class="p"><div class="num">VC · Improve</div><h5>Improve</h5><p>Ensures continual improvement of products, services, and practices across all value chain activities and the four dimensions.</p></div>
  <div class="p"><div class="num">VC · Engage</div><h5>Engage</h5><p>Provides a good understanding of stakeholder needs, transparency, and continual engagement and good relationships with all stakeholders.</p></div>
  <div class="p"><div class="num">VC · D&T</div><h5>Design & transition</h5><p>Ensures products and services continually meet stakeholder expectations for quality, costs, and time to market, and are transitioned into live use.</p></div>
  <div class="p"><div class="num">VC · O/B</div><h5>Obtain / build</h5><p>Ensures service components are available when and where they are needed, and that they meet agreed specifications.</p></div>
  <div class="p"><div class="num">VC · D&S</div><h5>Deliver & support</h5><p>Ensures services are delivered and supported according to agreed specifications and stakeholders' expectations.</p></div>
</div>
<div class="callout exam">
  <div class="lab">Key exam points</div>
  • The six activities are <strong>not a sequence</strong> — they combine in different ways for different scenarios.<br>
  • A <strong>value stream</strong> is a specific combination of activities and practices designed for a particular scenario.<br>
  • The relationship between value chain activities and practices is <strong>many-to-many</strong>: any activity may draw on several practices, and any practice may support several activities.
</div>

<!-- ================= D6 ================= -->
<h3 id="d6" data-toc="ITIL practices">6 · ITIL Practices</h3>
<p>A <strong>practice</strong> is a set of organizational resources designed for performing work or accomplishing an objective. ITIL&nbsp;4 defines <strong>34 practices</strong> across three categories.</p>
<div class="chip-row">
  <div class="chip v">14 general management</div>
  <div class="chip v">17 service management</div>
  <div class="chip v">3 technical management</div>
</div>
<p>Foundation focuses in detail on a subset of these. The most heavily examined are below.</p>

<h4>General management practices (selected)</h4>
<table class="deftable">
  <tr><td>Continual improvement</td><td>Aligns the organization's practices and services with changing business needs. Uses the <strong>continual improvement model</strong> and a <strong>continual improvement register (CIR)</strong> to track ideas.</td></tr>
  <tr><td>Information security management</td><td>Protects the information needed by the organization — <strong>confidentiality, integrity, and availability (the CIA triad)</strong>, plus authentication and non-repudiation.</td></tr>
  <tr><td>Relationship management</td><td>Establishes and nurtures links between the organization and its stakeholders at strategic and tactical levels.</td></tr>
  <tr><td>Supplier management</td><td>Ensures suppliers and their performance are managed to support seamless quality products and services.</td></tr>
</table>

<h4>The continual improvement model — seven steps</h4>
<ol>
  <li>What is the vision?</li>
  <li>Where are we now?</li>
  <li>Where do we want to be?</li>
  <li>How do we get there?</li>
  <li>Take action.</li>
  <li>Did we get there?</li>
  <li>How do we keep the momentum going?</li>
</ol>

<h4>Service management practices (selected)</h4>
<table class="deftable">
  <tr><td>Incident management</td><td>Minimizes the negative impact of incidents by restoring normal service operation as quickly as possible. An <strong>incident</strong> is an unplanned interruption to a service, or reduction in its quality.</td></tr>
  <tr><td>Problem management</td><td>Reduces the likelihood and impact of incidents by managing their root causes. A <strong>problem</strong> is a cause, or potential cause, of one or more incidents.</td></tr>
  <tr><td>Service request management</td><td>Supports the agreed quality of a service by handling all pre-defined, user-initiated <strong>service requests</strong> effectively. Service requests are a normal part of service delivery, not a failure.</td></tr>
  <tr><td>Service desk</td><td>The <strong>single point of contact</strong> between the provider and users; captures demand for incident resolution and service requests.</td></tr>
  <tr><td>Service level management</td><td>Sets clear, measurable targets and monitors service levels against them, using <strong>service level agreements (SLAs)</strong>.</td></tr>
  <tr><td>Change enablement</td><td>Maximizes the number of successful service and product changes by ensuring risks are assessed and changes are authorized.</td></tr>
  <tr><td>Service configuration management</td><td>Ensures accurate, reliable information about configuration items (CIs) and the relationships between them is available when needed.</td></tr>
  <tr><td>IT asset management</td><td>Plans and manages the full lifecycle of all IT assets to maximize value, control costs, and support decisions about purchase, reuse, and retirement.</td></tr>
  <tr><td>Monitoring & event management</td><td>Systematically observes services and records and reports selected changes of state called <strong>events</strong>.</td></tr>
  <tr><td>Release management</td><td>Makes new and changed services and features available for use.</td></tr>
  <tr><td>Deployment management</td><td>Moves new or changed hardware, software, and other components to live (or test) environments.</td></tr>
</table>

<h4>Problem management — three phases</h4>
<table class="deftable">
  <tr><td>Problem identification</td><td>Detect and log problems (e.g. trend analysis, recurring incidents, supplier notifications).</td></tr>
  <tr><td>Problem control</td><td>Analyze problems and document <strong>workarounds</strong> and <strong>known errors</strong>. A <strong>known error</strong> is a problem that has been analyzed but not resolved.</td></tr>
  <tr><td>Error control</td><td>Manage known errors and identify permanent solutions; reassess the status of workarounds.</td></tr>
</table>

<h4>Change enablement — three change types</h4>
<table class="deftable">
  <tr><td>Standard change</td><td>Low-risk, pre-authorized, well-understood; follows a documented procedure. No separate risk assessment each time.</td></tr>
  <tr><td>Normal change</td><td>Must be scheduled, assessed, and authorized following a standard process. May be routed to a <strong>change authority</strong>.</td></tr>
  <tr><td>Emergency change</td><td>Must be implemented as soon as possible (e.g. to resolve an incident or apply a security patch). Often a separate, expedited authority.</td></tr>
</table>
<div class="callout">
  <div class="lab">Terms to know</div>
  <strong>Change authority</strong> — the person or group that authorizes a change. <strong>Change schedule</strong> — used to plan changes, assist communication, and avoid conflicts. ITIL&nbsp;4 deliberately moves away from a single heavyweight "change advisory board" as the default.
</div>

<h4>Events — three classifications</h4>
<p>An <strong>event</strong> is any change of state that has significance for the management of a service or other configuration item. Events are typically classified as:</p>
<table class="deftable">
  <tr><td>Informational</td><td>Does not require action; useful for confirming normal operation or for later analysis.</td></tr>
  <tr><td>Warning</td><td>Indicates a situation approaching a threshold; allows action before any impact.</td></tr>
  <tr><td>Exception</td><td>Indicates a breach of an established norm — requires action.</td></tr>
</table>

<h4>Technical management practices</h4>
<p>There are exactly <strong>three</strong>: <strong>deployment management</strong>; <strong>infrastructure and platform management</strong>; and <strong>software development and management</strong>.</p>

<div class="callout exam">
  <div class="lab">Service level management — watch the watermelon</div>
  A "<strong>watermelon SLA</strong>" looks green on the outside (all technical metrics met) but is red on the inside (the customer is unhappy). It is a reminder that SLAs must measure outcomes that matter to the customer, not just convenient technical metrics.
</div>

<h3 id="study-tips" data-toc="Exam strategy">Exam strategy & final tips</h3>
<ul>
  <li><strong>Read every word</strong> — especially "negative" questions ("which is NOT…") and "list" questions ("which TWO…").</li>
  <li><strong>Eliminate</strong> obviously wrong options first; the Foundation exam rewards recognizing precise definitions.</li>
  <li><strong>Watch the qualifiers:</strong> "co-created", "without managing specific costs and risks", "fit for purpose vs fit for use" — these distinctions are tested repeatedly.</li>
  <li><strong>Don't over-think.</strong> 60 minutes for 40 questions is generous; flag and return rather than stalling.</li>
  <li>You need <strong>26 correct</strong>. Aim consistently for 80%+ on mock exams to build a safe margin before test day.</li>
</ul>
<p class="dim" style="font-size:12.5px;margin-top:18px">This guide summarizes the ITIL&nbsp;4 Foundation syllabus in the author's own words for study purposes. Always confirm details against current official PeopleCert/AXELOS materials.</p>

function el(tag, attrs, kids){

}
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }

function QuizRunner(opts){
  // opts: {questions, mode, instant(bool), timed(bool), limitSec, title, onExit}
  this.qs=opts.questions; this.i=0; this.answers=new Array(this.qs.length).fill(null);
  this.orders=this.qs.map(displayOrder);
  this.opts=opts; this.startTime=Date.now(); this.timerId=null; this.remaining=opts.limitSec||0;
}
QuizRunner.prototype.start=function(){
  if(this.opts.timed){ this.tick(); this.timerId=setInterval(this.tick.bind(this),1000); }
  this.render();
};
QuizRunner.prototype.tick=function(){
  this.remaining--;
  var t=document.getElementById('qTimer');
  if(t){
    var m=Math.floor(Math.max(this.remaining,0)/60),s=Math.max(this.remaining,0)%60;
    t.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    t.className='timer'+(this.remaining<=60?' danger':this.remaining<=300?' warn':'');
  }
  if(this.remaining<=0){ clearInterval(this.timerId); toast('Time\u2019s up — submitting'); this.finish(); }
};
QuizRunner.prototype.stopTimer=function(){ if(this.timerId) clearInterval(this.timerId); };
QuizRunner.prototype.render=function(){
  var self=this, q=this.qs[this.i], ord=this.orders[this.i], ans=this.answers[this.i];
  // light up ribbon by domain index for flavor
  buildRibbon(DOMAIN_CODES.indexOf(q.domain));
  app.innerHTML='';
  var panel=el('div',{class:'panel'});

  // head row
  var head=el('div',{class:'quiz-head'});
  head.appendChild(el('span',{class:'dom-pill',text:q.domain+' · '+DOMAINS[q.domain].name}));
  var styleLabel={standard:'Standard',missing:'Missing word',list:'Multi-select',negative:'Negative'}[q.style];
  head.appendChild(el('span',{class:'style-pill',text:styleLabel}));
  head.appendChild(el('div',{class:'spacer'}));
  head.appendChild(el('span',{class:'meta',text:'Q '+(this.i+1)+' / '+this.qs.length}));
  if(this.opts.timed) head.appendChild(el('span',{class:'timer',id:'qTimer',text:'--:--'}));
  panel.appendChild(head);

  // progress
  var pt=el('div',{class:'progress-track'}); var pf=el('div',{class:'f'}); pt.appendChild(pf); panel.appendChild(pt);
  setTimeout(function(){pf.style.width=((self.i)/self.qs.length*100)+'%';},20);

  // stem
  panel.appendChild(el('div',{class:'q-stem',html:esc(q.stem)}));
  if(q.style==='list') panel.appendChild(el('div',{class:'q-hint',text:'Select TWO answers.'}));
  if(q.style==='negative') panel.appendChild(el('div',{class:'q-hint',text:'Note: this question asks which option is NOT correct.'}));

  // options
  var revealed = ans && ans.checked;
  var opts=el('div',{class:'opts'});
  ord.order.forEach(function(origIdx,dispIdx){
    var isMulti=(q.style==='list');
    var selected = ans && ans.picks && ans.picks.indexOf(dispIdx)>=0;
    var oEl=el('button',{class:'opt'+(selected?' selected':'')});
    oEl.appendChild(el('div',{class:'key',text:LETTERS[dispIdx]}));
    oEl.appendChild(el('div',{class:'otext',html:esc(q.options[origIdx])}));
    oEl.appendChild(el('div',{class:'tick'}));
    if(revealed){
      oEl.disabled=true;
      var correct = ord.correct[dispIdx];
      if(correct){ oEl.classList.add('correct'); oEl.lastChild.textContent='✓'; }
      if(selected && !correct){ oEl.classList.add('wrong'); oEl.lastChild.textContent='✕'; }
    } else {
      oEl.addEventListener('click',function(){ self.pick(dispIdx); });
    }
    opts.appendChild(oEl);
  });
  panel.appendChild(opts);

  // explanation (instant mode, after reveal)
  if(revealed){
    var ex=el('div',{class:'explain show'});
    ex.appendChild(el('div',{class:'lab',text:'Explanation'}));
    ex.appendChild(el('div',{html:esc(q.explain)}));
    panel.appendChild(ex);
  }

  // buttons
  var btns=el('div',{class:'qbtns'});
  if(this.i>0) btns.appendChild(el('button',{class:'btn ghost',text:'← Back',onclick:function(){self.go(-1);}}));

  if(this.opts.instant && !revealed){
    var canCheck = ans && ans.picks && ans.picks.length===(q.style==='list'?2:1);
    btns.appendChild(el('button',{class:'btn primary',disabled:!canCheck,text:'Check answer',onclick:function(){self.check();}}));
  } else {
    var last=(this.i===this.qs.length-1);
    var needPick = !(ans && ans.picks && ans.picks.length===(q.style==='list'?2:1));
    if(this.opts.instant){ // already revealed
      btns.appendChild(el('button',{class:'btn primary',text:last?'Finish →':'Next →',onclick:function(){ last?self.finish():self.go(1); }}));
    } else { // exam style: pick then advance
      btns.appendChild(el('button',{class:'btn primary',disabled:needPick && this.opts.requireAnswer,text:last?'Review & submit →':'Next →',onclick:function(){ last?self.confirmFinish():self.go(1); }}));
    }
  }
  btns.appendChild(el('div',{class:'spacer',style:'flex:1'}));
  btns.appendChild(el('button',{class:'btn ghost',style:'font-size:12.5px',text:'Exit',onclick:function(){ self.exit(); }}));
  panel.appendChild(btns);

  // jump grid for exam mode
  if(this.opts.showGrid){
    var grid=el('div',{style:'display:flex;flex-wrap:wrap;gap:6px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)'});
    this.qs.forEach(function(_,gi){
      var done=self.answers[gi]&&self.answers[gi].picks&&self.answers[gi].picks.length;
      var b=el('button',{
        style:'width:30px;height:30px;border-radius:7px;font-family:var(--mono);font-size:11px;cursor:pointer;border:1px solid var(--line);'+
              (gi===self.i?'background:var(--violet);color:#0b0d14;border-color:var(--violet);':done?'background:rgba(52,216,200,.14);color:var(--teal-soft);border-color:rgba(52,216,200,.35);':'background:var(--panel2);color:var(--ink-dim);'),
        text:String(gi+1),
        onclick:function(){ self.i=gi; self.render(); }
      });
      grid.appendChild(b);
    });
    panel.appendChild(grid);
  }

  app.appendChild(panel);
};
QuizRunner.prototype.pick=function(dispIdx){
  var q=this.qs[this.i];
  var ans=this.answers[this.i]||{picks:[],checked:false};
  if(q.style==='list'){
    var p=ans.picks.indexOf(dispIdx);
    if(p>=0) ans.picks.splice(p,1);
    else { if(ans.picks.length>=2) ans.picks.shift(); ans.picks.push(dispIdx); }
  } else {
    ans.picks=[dispIdx];
  }
  this.answers[this.i]=ans;
  this.render();
};
QuizRunner.prototype.check=function(){
  var ans=this.answers[this.i]; if(!ans||!ans.picks.length) return;
  ans.checked=true;
  var correct=this.isCorrect(this.i);
  recordAnswer(this.qs[this.i],correct);
  this.render();
};
QuizRunner.prototype.isCorrect=function(i){
  var q=this.qs[i], ord=this.orders[i], ans=this.answers[i];
  if(!ans||!ans.picks||!ans.picks.length) return false;
  var need=Object.keys(ord.correct).map(Number).sort();
  var got=ans.picks.slice().sort();
  if(need.length!==got.length) return false;
  for(var k=0;k<need.length;k++) if(need[k]!==got[k]) return false;
  return true;
};
QuizRunner.prototype.go=function(d){ this.i=Math.max(0,Math.min(this.qs.length-1,this.i+d)); this.render(); };
QuizRunner.prototype.confirmFinish=function(){
  var unanswered=this.answers.filter(function(a){return !(a&&a.picks&&a.picks.length);}).length;
  if(unanswered>0 && !confirm(unanswered+' question(s) unanswered. Submit anyway?')) return;
  this.finish();
};
QuizRunner.prototype.finish=function(){
  this.stopTimer();
  // record answers that weren't scored instantly (exam mode)
  var self=this;
  if(!this.opts.instant){
    this.qs.forEach(function(q,i){
      var ans=self.answers[i];
      if(ans&&ans.picks&&ans.picks.length && !ans.checked){
        ans.checked=true;
        recordAnswer(q, self.isCorrect(i));
      }
    });
  }
  this.showResults();
};
QuizRunner.prototype.exit=function(){
  this.stopTimer();
  if(this.opts.onExit) this.opts.onExit();
  else setView('home');
};
QuizRunner.prototype.showResults=function(){
  buildRibbon(5);
  var self=this;
  var correct=0; this.qs.forEach(function(_,i){ if(self.isCorrect(i)) correct++; });
  var total=this.qs.length;
  var pct=Math.round(correct/total*100);
  var elapsed=Math.round((Date.now()-this.startTime)/1000);

  // record exam history if this is the mock exam
  if(this.opts.mode==='exam'){
    STATS.exams.push({date:Date.now(),pct:pct,correct:correct,total:total,sec:elapsed});
    if(STATS.exams.length>50) STATS.exams=STATS.exams.slice(-50);
    save('stats',STATS);
  }

  app.innerHTML='';
  var passMark = this.opts.passPct || 65;
  var passed = pct>=passMark;

  var top=el('div',{class:'panel'});
  top.appendChild(el('div',{class:'eyebrow',text:this.opts.title||'Results'}));
  var ring=el('div',{class:'score-ring',style:'margin-top:12px'});
  var circ=2*Math.PI*54;
  var ringEl=el('div',{class:'ring',html:
    '<svg width="128" height="128" viewBox="0 0 128 128">'+
      '<circle cx="64" cy="64" r="54" fill="none" stroke="var(--line)" stroke-width="11"/>'+
      '<circle cx="64" cy="64" r="54" fill="none" stroke="'+(passed?'var(--green)':'var(--rose)')+'" stroke-width="11" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'" id="ringArc"/>'+
    '</svg>'});
  ringEl.appendChild(el('div',{class:'ctr',html:'<div class="p '+(passed?'pass':'fail')+'">'+pct+'%</div><div class="l">Score</div>'}));
  ring.appendChild(ringEl);
  var verdict=el('div',{class:'verdict'});
  verdict.appendChild(el('h3',{class:passed?'pass':'fail',text:passed?'Pass':'Below pass mark'}));
  verdict.appendChild(el('p',{html:correct+' / '+total+' correct &nbsp;·&nbsp; pass mark '+passMark+'% &nbsp;·&nbsp; '+Math.floor(elapsed/60)+'m '+(elapsed%60)+'s'}));
  if(this.opts.mode==='exam') verdict.appendChild(el('p',{class:'dim',style:'margin-top:6px;font-size:12.5px',text: passed?'On the real 40-question exam you would need 26 correct. Keep drilling weak domains to build margin.':'The real exam requires 26/40. Review the explanations below, then re-drill your weakest domains.'}));
  ring.appendChild(verdict);
  top.appendChild(ring);

  // per-domain breakdown
  var byDom={};
  this.qs.forEach(function(q,i){ (byDom[q.domain]=byDom[q.domain]||{c:0,t:0}); byDom[q.domain].t++; if(self.isCorrect(i)) byDom[q.domain].c++; });
  var bd=el('div',{class:'res-breakdown'});
  bd.appendChild(el('h2',{class:'section',style:'margin-top:22px',text:'By domain'}));
  var bars=el('div',{class:'domain-bars'});
  Object.keys(byDom).sort().forEach(function(code){
    var d=byDom[code]; var p=Math.round(d.c/d.t*100);
    var row=el('div',{class:'dbar'});
    row.appendChild(el('div',{class:'code',text:code}));
    row.appendChild(el('div',{class:'nm',text:DOMAINS[code].name}));
    var track=el('div',{class:'track'}); var fill=el('div',{class:'fill'}); track.appendChild(fill); row.appendChild(track);
    row.appendChild(el('div',{class:'pct',text:d.c+'/'+d.t+' · '+p+'%'}));
    bars.appendChild(row);
    setTimeout(function(){fill.style.width=p+'%';},60);
  });
  bd.appendChild(bars);
  top.appendChild(bd);

  var actions=el('div',{class:'qbtns',style:'margin-top:22px'});
  actions.appendChild(el('button',{class:'btn primary',text:'Retake',onclick:function(){ self.opts.restart(); }}));
  actions.appendChild(el('button',{class:'btn teal',text:'Re-drill wrong only',onclick:function(){
    var wrongQs=self.qs.filter(function(q,i){return !self.isCorrect(i);});
    if(!wrongQs.length){ toast('Nothing wrong — nice work!'); return; }
    startQuiz({questions:shuffle(wrongQs),mode:'practice',instant:true,title:'Re-drill: missed questions',
      restart:function(){},onExit:function(){setView(self.opts.mode==='exam'?'exam':'practice');}});
  }}));
  actions.appendChild(el('button',{class:'btn ghost',text:'Done',onclick:function(){ setView('home'); }}));
  top.appendChild(actions);
  app.appendChild(top);

  // animate ring
  setTimeout(function(){ var arc=document.getElementById('ringArc'); if(arc) arc.style.transition='stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)', arc.style.strokeDashoffset=(circ*(1-pct/100)); },80);

  // full review
  var rev=el('div',{class:'panel'});
  rev.appendChild(el('h2',{class:'section',text:'Question review'}));
  this.qs.forEach(function(q,i){
    var ord=self.orders[i], ans=self.answers[i], ok=self.isCorrect(i);
    var item=el('div',{class:'review-item'});
    var qh=el('div',{class:'qh'});
    qh.appendChild(el('span',{class:'ix',text:'Q'+(i+1)}));
    qh.appendChild(el('span',{class:'dom-pill',text:q.domain}));
    qh.appendChild(el('span',{class:'res-tag '+(ok?'ok':'no'),text:ok?'Correct':'Incorrect'}));
    item.appendChild(qh);
    item.appendChild(el('div',{class:'stem',html:esc(q.stem)}));
    // correct answer text
    var correctTexts=Object.keys(ord.correct).map(function(d){return q.options[ord.order[d]];});
    item.appendChild(el('div',{class:'ans right',html:'<span class="mk">✓ Correct:</span>'+esc(correctTexts.join(' · '))}));
    if(!ok){
      var yourTexts=(ans&&ans.picks||[]).map(function(d){return q.options[ord.order[d]];});
      item.appendChild(el('div',{class:'ans yours',html:'<span class="mk">✕ You chose:</span>'+ (yourTexts.length?esc(yourTexts.join(' · ')):'— (skipped)')}));
    }
    item.appendChild(el('div',{class:'ex',html:'<strong style="color:var(--teal-soft)">Why: </strong>'+esc(q.explain)}));
    rev.appendChild(item);
  });
  app.appendChild(rev);
  window.scrollTo(0,0);
}

var ACTIVE_QUIZ=null;
function startQuiz(opts){
  ACTIVE_QUIZ=new QuizRunner(opts);
  if(!opts.restart) opts.restart=function(){ startQuiz(opts); };
  ACTIVE_QUIZ.start();
}

// ---------- MOCK EXAM ----------
function buildExamQuestions(){
  var picked=[];
  DOMAIN_CODES.forEach(function(code){
    var pool=QUESTIONS.filter(function(q){return q.domain===code;});
    picked=picked.concat(sample(pool, EXAM_BLUEPRINT[code]||0));
  });
  return shuffle(picked);
}
function renderExamSetup(){
  buildRibbon(-1);
  var p=el('div',{class:'panel'});
  p.appendChild(el('div',{class:'eyebrow',text:'Exam simulation'}));
  p.appendChild(el('h2',{class:'section',text:'ITIL 4 Foundation mock exam'}));
  p.appendChild(el('p',{class:'muted',html:'40 questions · 60-minute timer · pass mark <strong>65% (26/40)</strong>. Questions are sampled across all six domains using the official syllabus weighting. Answers are revealed only at the end, exactly like the real test.'}));

  var bp=el('div',{class:'chip-row',style:'margin-top:14px'});
  DOMAIN_CODES.forEach(function(code){ bp.appendChild(el('div',{class:'chip v',text:code+' ×'+EXAM_BLUEPRINT[code]})); });
  p.appendChild(bp);

  if(STATS.exams.length){
    var last=STATS.exams[STATS.exams.length-1];
    p.appendChild(el('div',{class:'callout',html:'<div class="lab">Last attempt</div>'+last.pct+'% ('+last.correct+'/'+last.total+') · '+new Date(last.date).toLocaleDateString()}));
  }

  var go=el('div',{class:'qbtns'});
  go.appendChild(el('button',{class:'btn primary',text:'Start 60-minute exam',onclick:launchExam}));
  p.appendChild(go);
  app.appendChild(p);

  // history
  if(STATS.exams.length){
    var h=el('div',{class:'panel'});
    h.appendChild(el('h2',{class:'section',text:'Exam history'}));
    var list=el('div');
    STATS.exams.slice().reverse().forEach(function(e){
      var row=el('div',{class:'dbar'});
      row.appendChild(el('div',{class:'code',style:'color:'+(e.pct>=65?'var(--green)':'var(--rose)'),text:e.pct+'%'}));
      row.appendChild(el('div',{class:'nm',text:new Date(e.date).toLocaleString()}));
      row.appendChild(el('div',{class:'pct',text:e.correct+'/'+e.total+' · '+Math.floor(e.sec/60)+'m'}));
      list.appendChild(row);
    });
    h.appendChild(list);
    app.appendChild(h);
  }
}
function launchExam(){
  startQuiz({
    questions:buildExamQuestions(), mode:'exam', instant:false, timed:true, limitSec:3600,
    requireAnswer:false, showGrid:true, passPct:65, title:'Mock exam result',
    restart:launchExam,           // a fresh, newly-sampled exam each retake
    onExit:function(){ setView('exam'); }
  });
}

// ---------- PRACTICE SETUP ----------
var PRACTICE_CFG={domains:DOMAIN_CODES.slice(),count:20,instant:true};
function renderPracticeSetup(){
  buildRibbon(-1);
  var p=el('div',{class:'panel'});
  p.appendChild(el('div',{class:'eyebrow',text:'Custom practice'}));
  p.appendChild(el('h2',{class:'section',text:'Build a practice drill'}));

  // domains
  var f1=el('div',{class:'field'});
  f1.appendChild(el('label',{text:'Domains'}));
  var checks=el('div',{class:'dom-checks'});
  DOMAIN_CODES.forEach(function(code){
    var on=PRACTICE_CFG.domains.indexOf(code)>=0;
    var cnt=QUESTIONS.filter(function(q){return q.domain===code;}).length;
    var c=el('div',{class:'dom-check'+(on?' on':'')});
    c.appendChild(el('div',{class:'box',text:on?'✓':''}));
    c.appendChild(el('span',{class:'cd',text:code}));
    c.appendChild(el('span',{text:DOMAINS[code].name}));
    c.appendChild(el('small',{text:cnt+'Q'}));
    c.addEventListener('click',function(){
      var idx=PRACTICE_CFG.domains.indexOf(code);
      if(idx>=0){ if(PRACTICE_CFG.domains.length>1) PRACTICE_CFG.domains.splice(idx,1); }
      else PRACTICE_CFG.domains.push(code);
      renderPracticeSetup();
    });
    checks.appendChild(c);
  });
  f1.appendChild(checks);
  p.appendChild(f1);

  // count
  var f2=el('div',{class:'field'});
  f2.appendChild(el('label',{text:'Number of questions'}));
  var seg=el('div',{class:'seg-ctl'});
  [10,20,30,50,100].forEach(function(n){
    seg.appendChild(el('button',{class:PRACTICE_CFG.count===n?'on':'',text:String(n),onclick:function(){PRACTICE_CFG.count=n;renderPracticeSetup();}}));
  });
  // all
  var avail=QUESTIONS.filter(function(q){return PRACTICE_CFG.domains.indexOf(q.domain)>=0;}).length;
  seg.appendChild(el('button',{class:PRACTICE_CFG.count==='all'?'on':'',text:'All ('+avail+')',onclick:function(){PRACTICE_CFG.count='all';renderPracticeSetup();}}));
  f2.appendChild(seg);
  p.appendChild(f2);

  // reveal mode
  var f3=el('div',{class:'field'});
  f3.appendChild(el('label',{text:'Answer reveal'}));
  var seg3=el('div',{class:'seg-ctl'});
  seg3.appendChild(el('button',{class:PRACTICE_CFG.instant?'on':'',text:'Instant (after each)',onclick:function(){PRACTICE_CFG.instant=true;renderPracticeSetup();}}));
  seg3.appendChild(el('button',{class:!PRACTICE_CFG.instant?'on':'',text:'At the end',onclick:function(){PRACTICE_CFG.instant=false;renderPracticeSetup();}}));
  f3.appendChild(seg3);
  p.appendChild(f3);

  var go=el('div',{class:'qbtns'});
  go.appendChild(el('button',{class:'btn primary',text:'Start practice',onclick:startPractice}));
  p.appendChild(go);
  app.appendChild(p);
}
function startPractice(){
  var pool=QUESTIONS.filter(function(q){return PRACTICE_CFG.domains.indexOf(q.domain)>=0;});
  var n=PRACTICE_CFG.count==='all'?pool.length:Math.min(PRACTICE_CFG.count,pool.length);
  var qs=sample(pool,n);
  startQuiz({
    questions:qs, mode:'practice', instant:PRACTICE_CFG.instant, timed:false,
    requireAnswer:false, showGrid:!PRACTICE_CFG.instant, passPct:65,
    title:'Practice result',
    restart:function(){ startPractice(); },
    onExit:function(){ setView('practice'); }
  });
}

// ---------- FLASHCARDS ----------
var FLASH_CFG={domains:DOMAIN_CODES.slice()};
function renderFlashSetup(){
  buildRibbon(-1);
  var p=el('div',{class:'panel'});
  p.appendChild(el('div',{class:'eyebrow',text:'Active recall'}));
  p.appendChild(el('h2',{class:'section',text:'Flashcards'}));
  p.appendChild(el('p',{class:'muted',text:'Each card shows a prompt; tap to flip and reveal the answer with a short explanation. Rate yourself to keep cards you miss in rotation.'}));

  var f1=el('div',{class:'field'});
  f1.appendChild(el('label',{text:'Domains in deck'}));
  var checks=el('div',{class:'dom-checks'});
  DOMAIN_CODES.forEach(function(code){
    var on=FLASH_CFG.domains.indexOf(code)>=0;
    var c=el('div',{class:'dom-check'+(on?' on':'')});
    c.appendChild(el('div',{class:'box',text:on?'✓':''}));
    c.appendChild(el('span',{class:'cd',text:code}));
    c.appendChild(el('span',{text:DOMAINS[code].name}));
    c.addEventListener('click',function(){
      var idx=FLASH_CFG.domains.indexOf(code);
      if(idx>=0){ if(FLASH_CFG.domains.length>1) FLASH_CFG.domains.splice(idx,1);} else FLASH_CFG.domains.push(code);
      renderFlashSetup();
    });
    checks.appendChild(c);
  });
  f1.appendChild(checks);
  p.appendChild(f1);
  var go=el('div',{class:'qbtns'});
  go.appendChild(el('button',{class:'btn primary',text:'Start deck',onclick:startFlash}));
  p.appendChild(go);
  app.appendChild(p);
}
function startFlash(){
  var pool=QUESTIONS.filter(function(q){return FLASH_CFG.domains.indexOf(q.domain)>=0 && q.style!=='list';});
  var deck=shuffle(pool);
  var idx=0, flipped=false, again=[];
  function correctText(q){ return q.options[q.answer]; }
  function draw(){
    buildRibbon(DOMAIN_CODES.indexOf(deck[idx].domain));
    var q=deck[idx];
    app.innerHTML='';
    var panel=el('div',{class:'panel'});
    var head=el('div',{class:'quiz-head'});
    head.appendChild(el('span',{class:'dom-pill',text:q.domain+' · '+DOMAINS[q.domain].name}));
    head.appendChild(el('div',{class:'spacer'}));
    head.appendChild(el('span',{class:'meta',text:(idx+1)+' / '+deck.length}));
    panel.appendChild(head);

    var stage=el('div',{class:'flash-stage'});
    var card=el('div',{class:'flash'+(flipped?' flip':'')});
    var front=el('div',{class:'face'});
    front.appendChild(el('div',{class:'q',html:esc(q.stem)}));
    front.appendChild(el('div',{class:'flip-hint',text:'Tap to reveal'}));
    var back=el('div',{class:'face back'});
    back.appendChild(el('div',{class:'a',html:'✓ '+esc(correctText(q))}));
    back.appendChild(el('div',{class:'ex',html:esc(q.explain)}));
    back.appendChild(el('div',{class:'flip-hint',text:'Tap to flip back'}));
    card.appendChild(front); card.appendChild(back);
    card.addEventListener('click',function(){ flipped=!flipped; card.classList.toggle('flip'); });
    stage.appendChild(card);
    panel.appendChild(stage);

    var rate=el('div',{class:'flash-rate'});
    rate.appendChild(el('button',{class:'btn ghost',text:'↺ Review again',onclick:function(){ again.push(q); recordAnswer(q,false); next(); }}));
    rate.appendChild(el('button',{class:'btn teal',text:'✓ Got it',onclick:function(){ recordAnswer(q,true); next(); }}));
    panel.appendChild(rate);

    var nav=el('div',{class:'qbtns'});
    if(idx>0) nav.appendChild(el('button',{class:'btn ghost',text:'← Prev',onclick:function(){ idx--; flipped=false; draw(); }}));
    nav.appendChild(el('div',{style:'flex:1'}));
    nav.appendChild(el('button',{class:'btn ghost',style:'font-size:12.5px',text:'Exit',onclick:function(){ setView('flash'); }}));
    panel.appendChild(nav);
    app.appendChild(panel);
  }
  function next(){
    flipped=false;
    if(idx<deck.length-1){ idx++; draw(); }
    else if(again.length){ deck=shuffle(again); again=[]; idx=0; toast('Reviewing '+deck.length+' card(s) again'); draw(); }
    else { flashDone(); }
  }
  function flashDone(){
    app.innerHTML='';
    var p=el('div',{class:'panel center'});
    p.appendChild(el('div',{class:'eyebrow',text:'Deck complete'}));
    p.appendChild(el('h2',{class:'section',style:'margin-top:8px',text:'You worked through the whole deck'}));
    p.appendChild(el('p',{class:'muted',text:'All cards rated "Got it". Switch to a mock exam to test recall under time pressure.'}));
    var b=el('div',{class:'qbtns',style:'justify-content:center'});
    b.appendChild(el('button',{class:'btn primary',text:'New deck',onclick:startFlash}));
    b.appendChild(el('button',{class:'btn ghost',text:'Mock exam',onclick:function(){setView('exam');}}));
    p.appendChild(b);
    app.appendChild(p);
  }
  draw();
}

// ---------- WEAK SPOTS ----------
function renderWeak(){
  buildRibbon(-1);
  // gather wrong-answered questions
  var wrongIds=Object.keys(STATS.perQ).filter(function(id){ var r=STATS.perQ[id]; return r.wrong>0 && r.wrong>=r.correct; });
  var wrongQs=QUESTIONS.filter(function(q){return wrongIds.indexOf(String(q.id))>=0;});

  var p=el('div',{class:'panel'});
  p.appendChild(el('div',{class:'eyebrow',text:'Adaptive re-drill'}));
  p.appendChild(el('h2',{class:'section',text:'Weak spots'}));

  if(!wrongQs.length){
    p.appendChild(el('p',{class:'muted',text:'No weak spots recorded yet. Take a mock exam or a practice drill — any question you miss will be collected here for targeted re-drilling, weighted toward your weakest domains.'}));
    var b=el('div',{class:'qbtns'});
    b.appendChild(el('button',{class:'btn primary',text:'Take a practice drill',onclick:function(){setView('practice');}}));
    b.appendChild(el('button',{class:'btn ghost',text:'Mock exam',onclick:function(){setView('exam');}}));
    p.appendChild(b);
    app.appendChild(p);
    return;
  }

  // weakest-domain ordering
  var domScore=DOMAIN_CODES.map(function(c){return {c:c,m:domainMastery(c)};})
                .filter(function(d){return d.m.seen>0;})
                .sort(function(a,b){return a.m.pct-b.m.pct;});

  p.appendChild(el('p',{class:'muted',text:wrongQs.length+' question(s) you\u2019ve struggled with are queued. They\u2019re ordered to front-load your weakest domains.'}));
  var chips=el('div',{class:'chip-row'});
  domScore.slice(0,3).forEach(function(d){ chips.appendChild(el('div',{class:'chip t',text:d.c+' · '+d.m.pct+'%'})); });
  p.appendChild(chips);

  var b=el('div',{class:'qbtns'});
  b.appendChild(el('button',{class:'btn primary',text:'Re-drill '+wrongQs.length+' weak question(s)',onclick:function(){
    // order by domain weakness
    var rank={}; domScore.forEach(function(d,i){rank[d.c]=i;});
    var ordered=wrongQs.slice().sort(function(a,b){return (rank[a.domain]||99)-(rank[b.domain]||99);});
    startQuiz({
      questions:ordered, mode:'practice', instant:true, timed:false, passPct:65,
      title:'Weak-spot re-drill result',
      restart:function(){ renderWeak(); },
      onExit:function(){ setView('weak'); }
    });
  }}));
  b.appendChild(el('button',{class:'btn ghost',text:'Clear weak list',onclick:function(){
    if(!confirm('Clear the weak-spot queue? (Keeps overall stats.)')) return;
    wrongQs.forEach(function(q){ var r=STATS.perQ[q.id]; if(r){ r.wrong=0; r.correct=Math.max(r.correct,1);} });
    save('stats',STATS); toast('Weak list cleared'); renderWeak();
  }}));
  p.appendChild(b);
  app.appendChild(p);
}

// ---------- boot ----------
document.getElementById('bankBadge').textContent=QUESTIONS.length+'-Q Bank';
setView('home');

})();
