omain":"D3","style":"standard","stem":"Which is an example of an SVS 'demand' input?","options":["A board policy","An internal audit","Customer requests for a new mobile feature","A guiding principle"],"answer":2,"explain":"Demand is the need/desire for products and services, such as customer feature requests.","id":131,"hash":"93d93c61df"},{"domain":"D3","style":"standard","stem":"The SVS is designed to be:","options":["Rigid and fixed","Limited to incident handling","Used only by large enterprises","Flexible and adaptable to many contexts"],"answer":3,"explain":"The SVS is intentionally flexible so organizations can adapt it to their context.","id":132,"hash":"0455dd3810"},{"domain":"D3","style":"standard","stem":"Why is the SVS described as a 'system'?","options":["Because its components and activities interact and depend on one another to create value","Because it is software","Because it is automated","Because it excludes people"],"answer":0,"explain":"Calling it a system emphasizes the interdependence and interaction of its components in producing value.","id":133,"hash":"5ee493a0cb"},{"domain":"D3","style":"standard","stem":"Which component is responsible for keeping services and practices relevant over time?","options":["Governance","Continual improvement","Guiding principles","Service value chain"],"answer":1,"explain":"Continual improvement keeps the organization aligned with evolving stakeholder needs.","id":134,"hash":"aede4941c0"},{"domain":"D3","style":"standard","stem":"Governance influences the SVS by:","options":["Eliminating practices","Performing all operational tasks","Replacing the service value chain","Setting direction, policies, and ensuring compliance and accountability"],"answer":3,"explain":"Governance sets direction and policy and ensures the organization remains accountable and compliant.","id":135,"hash":"e435f6f800"},{"domain":"D3","style":"standard","stem":"Which statement about the relationship between the SVS and value is correct?","options":["The SVS converts opportunity and demand into value","The SVS consumes value as input","The SVS produces only outputs, never value","Value is unrelated to the SVS"],"answer":0,"explain":"The SVS transforms inputs (opportunity and demand) into the output of value.","id":136,"hash":"df95e6ef69"},{"domain":"D3","style":"standard","stem":"Which combination correctly pairs SVS inputs and outputs?","options":["Inputs: value; Output: demand","Inputs: opportunity and demand; Output: value","Inputs: governance; Output: practices","Inputs: practices; Output: governance"],"answer":1,"explain":"Opportunity and demand are inputs; value is the output of the SVS.","id":137,"hash":"a78f63e6d2"},{"domain":"D3","style":"standard","stem":"The service value chain sits within which larger structure?","options":["The four dimensions","A single practice","The service value system","PESTLE"],"answer":2,"explain":"The service value chain is a component within the broader service value system.","id":138,"hash":"2696eaad96"},{"domain":"D3","style":"standard","stem":"Which is true about continual improvement's placement in the SVS?","options":["It surrounds and supports all other components as an ongoing activity","It is a one-off project","It is only part of governance","It is external to the SVS"],"answer":0,"explain":"Continual improvement is an ongoing, organization-wide activity supporting all SVS components.","id":139,"hash":"e80de7dc02"},{"domain":"D4","style":"standard","stem":"How many guiding principles are defined in ITIL 4?","options":["5","7","9","4"],"answer":1,"explain":"ITIL 4 defines seven guiding principles: focus on value; start where you are; progress iteratively with feedback; collaborate and promote visibility; think and work holistically; keep it simple and practical; optimize and automate.","id":140,"hash":"010403d800"},{"domain":"D4","style":"standard","stem":"Which guiding principle states that everything the organization does should map, directly or indirectly, to value for stakeholders?","options":["Keep it simple and practical","Start where you are","Focus on value","Optimize and automate"],"answer":2,"explain":"'Focus on value' means everything the organization does should link back to value for itself, its customers, and other stakeholders.","id":141,"hash":"620c8a9270"},{"domain":"D4","style":"standard","stem":"Which guiding principle advises against starting from scratch without first assessing what already exists?","options":["Progress iteratively with feedback","Collaborate and promote visibility","Think and work holistically","Start where you are"],"answer":3,"explain":"'Start where you are' advises assessing the current state and reusing what is already available rather than rebuilding from nothing.","id":142,"hash":"379fa5ca9e"},{"domain":"D4","style":"standard","stem":"Which guiding principle recommends organizing work into smaller, manageable sections that can be executed and completed in a timely manner?","options":["Keep it simple and practical","Progress iteratively with feedback","Optimize and automate","Focus on value"],"answer":1,"explain":"'Progress iteratively with feedback' recommends breaking work into smaller iterations, using feedback to adjust at each step.","id":143,"hash":"06a66dcb93"},{"domain":"D4","style":"standard","stem":"Which guiding principle stresses that working together across boundaries produces better results and that visibility builds trust?","options":["Start where you are","Think and work holistically","Collaborate and promote visibility","Keep it simple and practical"],"answer":2,"explain":"'Collaborate and promote visibility' emphasizes that the right collaboration and transparency lead to better outcomes and reduce misunderstanding.","id":144,"hash":"6be5c38d7f"},{"domain":"D4","style":"standard","stem":"Which guiding principle reminds us that no service or component stands alone and that outcomes depend on how parts work together?","options":["Progress iteratively with feedback","Optimize and automate","Focus on value","Think and work holistically"],"answer":3,"explain":"'Think and work holistically' stresses that the SVS and its parts must be considered as an integrated whole to deliver value.","id":145,"hash":"8eef426269"},{"domain":"D4","style":"standard","stem":"Which guiding principle advises eliminating anything that fails to provide value or produce a useful outcome?","options":["Keep it simple and practical","Optimize and automate","Start where you are","Collaborate and promote visibility"],"answer":0,"explain":"'Keep it simple and practical' advises using the minimum number of steps to accomplish objectives and removing anything that adds no value.","id":146,"hash":"5213d8df1c"},{"domain":"D4","style":"standard","stem":"Which guiding principle recommends maximizing the value of work performed by people and technology, using automation where it makes sense?","options":["Focus on value","Keep it simple and practical","Optimize and automate","Think and work holistically"],"answer":2,"explain":"'Optimize and automate' recommends first optimizing, then using technology/automation to handle what can be automated, freeing people for complex work.","id":147,"hash":"cf263148af"},{"domain":"D4","style":"standard","stem":"According to 'optimize and automate', what should be done before automating a process?","options":["Automate immediately for speed","Outsource the process","Delete the process","Optimize the process first, since automating an inefficient process can amplify inefficiency"],"answer":3,"explain":"You should optimize first. Automating an unoptimized, wasteful process simply makes the waste happen faster.","id":148,"hash":"4d1b18bd26"},{"domain":"D4","style":"standard","stem":"Under 'focus on value', whose perspective ultimately determines what is valuable?","options":["The service consumer's perception of value","The service provider's","The supplier's","The auditor's"],"answer":0,"explain":"Value is defined by the consumer; understanding who is being served and what they value is central to this principle.","id":149,"hash":"8f1ff9682d"},{"domain":"D4","style":"standard","stem":"Under 'start where you are', what should you do with existing services, processes, and tools?","options":["Discard them all","Assess and measure them objectively, reusing what can be leveraged","Hide them from stakeholders","Automate them without analysis"],"answer":1,"explain":"Assess the current state objectively (using accurate data where possible) and reuse what is valuable rather than discarding everything.","id":150,"hash":"77c1c7bca5"},{"domain":"D4","style":"standard","stem":"Under 'progress iteratively with feedback', why are feedback loops important?","options":["They slow projects down deliberately","They are only relevant after completion","They replace planning entirely","They allow course-correction, reduce risk, and confirm work remains aligned with needs"],"answer":3,"explain":"Feedback at each iteration enables timely adjustments, keeps work aligned to needs, and reduces the risk of large failures.","id":151,"hash":"84cce8abad"},{"domain":"D4","style":"standard","stem":"Under 'collaborate and promote visibility', what is a key benefit of involving the right people?","options":["Better buy-in, more relevant information, and increased likelihood of long-term success","Decisions are made in isolation","Reduced communication","Fewer stakeholders are consulted"],"answer":0,"explain":"Collaboration with the right stakeholders brings better information and buy-in, improving the chances of lasting success.","id":152,"hash":"14ac06b129"},{"domain":"D4","style":"standard","stem":"Under 'think and work holistically', what happens if activities are managed in isolation?","options":["Value is maximized","Complexity and dependencies may be missed, reducing overall effectiveness","Nothing changes","Automation becomes easier"],"answer":1,"explain":"Working in isolation can overlook interdependencies and complexity, undermining the value the whole system can deliver.","id":153,"hash":"73386aada9"},{"domain":"D4","style":"standard","stem":"Under 'keep it simple and practical', how should you handle a process with steps that add no value?","options":["Keep all steps for completeness","Automate the wasteful steps","Eliminate steps that do not contribute to value or produce a useful outcome","Add more steps"],"answer":2,"explain":"Remove non-value-adding steps. Simplicity reduces effort and error while keeping the process practical.","id":154,"hash":"489b134be4"},{"domain":"D4","style":"standard","stem":"Which guiding principle is most relevant when you are tempted to design an over-engineered, complex solution?","options":["Keep it simple and practical","Optimize and automate","Start where you are","Focus on value"],"answer":0,"explain":"'Keep it simple and practical' counsels against unnecessary complexity, favoring the simplest effective approach.","id":155,"hash":"fbeaaeea86"},{"domain":"D4","style":"standard","stem":"Which guiding principle is most relevant when deciding whether to reuse an existing monitoring tool?","options":["Optimize and automate","Start where you are","Collaborate and promote visibility","Focus on value"],"answer":1,"explain":"'Start where you are' encourages assessing and reusing existing capabilities, such as a current monitoring tool, before acquiring new ones.","id":156,"hash":"4233c01913"},{"domain":"D4","style":"standard","stem":"Which guiding principle most directly supports a DevOps practice of small, frequent releases?","options":["Think and work holistically","Keep it simple and practical","Progress iteratively with feedback","Focus on value"],"answer":2,"explain":"Small, frequent releases embody 'progress iteratively with feedback' — incremental delivery with continuous learning.","id":157,"hash":"a9beb20e70"},{"domain":"D4","style":"standard","stem":"The guiding principles are intended to be applied:","options":["Selectively, choosing only one per project","Only during incidents","Only by senior leadership","In combination, with most or all being relevant in any given situation"],"answer":3,"explain":"The guiding principles should be considered together; most are relevant in any situation, though their relative emphasis varies.","id":158,"hash":"fa00641b21"},{"domain":"D4","style":"list","stem":"Which TWO of the following are ITIL 4 guiding principles? (Choose two.)","options":["Optimize and automate","Plan and design","Focus on value","Measure and report"],"answer":[0,2],"explain":"'Optimize and automate' and 'focus on value' are guiding principles. 'Plan and design' and 'measure and report' are not.","id":159,"hash":"2ff67a53e6"},{"domain":"D4","style":"negative","stem":"Which of the following is NOT one of the seven guiding principles?","options":["Focus on value","Start where you are","Centralize and control","Keep it simple and practical"],"answer":2,"explain":"'Centralize and control' is not a guiding principle. The seven are focus on value; start where you are; progress iteratively with feedback; collaborate and promote visibility; think and work holistically; keep it simple and practical; optimize and automate.","id":160,"hash":"cb51885352"},{"domain":"D4","style":"missing","stem":"Complete the principle: 'Progress iteratively with ____.'","options":["feedback","automation","governance","value"],"answer":0,"explain":"The full principle is 'progress iteratively with feedback'.","id":161,"hash":"7a67f7ac18"},{"domain":"D4","style":"missing","stem":"Complete the principle: 'Collaborate and promote ____.'","options":["visibility","automation","value","simplicity"],"answer":0,"explain":"The full principle is 'collaborate and promote visibility'.","id":162,"hash":"c3906abe7c"},{"domain":"D4","style":"standard","stem":"A team wants to improve a service but lacks data about its current performance. Which principle applies first?","options":["Optimize and automate","Start where you are","Keep it simple and practical","Focus on value"],"answer":1,"explain":"'Start where you are' calls for objectively assessing and measuring the current state before changing it.","id":163,"hash":"1e47635f33"},{"domain":"D4","style":"standard","stem":"Which principle warns that automating a bad process just produces bad results faster?","options":["Focus on value","Keep it simple and practical","Optimize and automate","Start where you are"],"answer":2,"explain":"Under 'optimize and automate', you optimize first so automation amplifies value rather than waste.","id":164,"hash":"2edcb7c4ac"},{"domain":"D4","style":"standard","stem":"Which principle most directly addresses removing bureaucracy that adds no value?","options":["Focus on value","Think and work holistically","Collaborate and promote visibility","Keep it simple and practical"],"answer":3,"explain":"'Keep it simple and practical' targets the elimination of non-value-adding steps and bureaucracy.","id":165,"hash":"749236a43e"},{"domain":"D4","style":"standard","stem":"Which principle helps ensure that improvement initiatives don't optimize one area while harming another?","options":["Think and work holistically","Keep it simple and practical","Start where you are","Optimize and automate"],"answer":0,"explain":"'Think and work holistically' ensures the whole system is considered so local optimization doesn't harm overall value.","id":166,"hash":"4d39876fe4"},{"domain":"D4","style":"standard","stem":"A manager hides project status from stakeholders to avoid scrutiny. Which principle is being violated?","options":["Keep it simple and practical","Focus on value","Collaborate and promote visibility","Optimize and automate"],"answer":2,"explain":"Concealing status violates 'collaborate and promote visibility', which values transparency and trust.","id":167,"hash":"ce18c1b9a6"},{"domain":"D4","style":"standard","stem":"Which principle guides you to confirm that a planned feature actually benefits the consumer?","options":["Think and work holistically","Start where you are","Optimize and automate","Focus on value"],"answer":3,"explain":"'Focus on value' keeps work tied to genuine stakeholder value.","id":168,"hash":"c945d2880e"},{"domain":"D4","style":"standard","stem":"Breaking a large transformation into manageable increments reflects which principle?","options":["Progress iteratively with feedback","Keep it simple and practical","Optimize and automate","Focus on value"],"answer":0,"explain":"Incremental delivery with learning is 'progress iteratively with feedback'.","id":169,"hash":"55b66c56d3"},{"domain":"D4","style":"standard","stem":"Which principle suggests measuring before improving and using accurate data?","options":["Focus on value","Start where you are","Optimize and automate","Keep it simple and practical"],"answer":1,"explain":"'Start where you are' stresses objective, data-based assessment of the current state.","id":170,"hash":"6a6f28395a"},{"domain":"D4","style":"standard","stem":"Which principle most supports cross-functional teams working transparently?","options":["Keep it simple and practical","Think and work holistically","Optimize and automate","Collaborate and promote visibility"],"answer":3,"explain":"Cross-functional transparency is the heart of 'collaborate and promote visibility'.","id":171,"hash":"f1e47014c2"},{"domain":"D4","style":"standard","stem":"When designing automation, which principle reminds you to consider the whole value stream, not just one task?","options":["Think and work holistically","Keep it simple and practical","Start where you are","Focus on value"],"answer":0,"explain":"'Think and work holistically' keeps the entire value stream in view during automation.","id":172,"hash":"b1d010f388"},{"domain":"D4","style":"standard","stem":"Which principle would caution against adding controls that don't reduce real risk?","options":["Optimize and automate","Keep it simple and practical","Collaborate and promote visibility","Focus on value"],"answer":1,"explain":"Unnecessary controls violate 'keep it simple and practical', which removes anything that adds no value.","id":173,"hash":"461896fec0"},{"domain":"D4","style":"standard","stem":"A team plans to deliver everything in one 'big bang' release after a year. Which principle would challenge this?","options":["Start where you are","Focus on value","Progress iteratively with feedback","Optimize and automate"],"answer":2,"explain":"'Progress iteratively with feedback' favors smaller, feedback-driven iterations over big-bang delivery.","id":174,"hash":"fe66db1227"},{"domain":"D4","style":"standard","stem":"Which principle would you cite to justify involving frontline staff in designing a new workflow?","options":["Collaborate and promote visibility","Optimize and automate","Keep it simple and practical","Start where you are"],"answer":0,"explain":"Engaging the right people, including frontline staff, reflects 'collaborate and promote visibility'.","id":175,"hash":"44813f0562"},{"domain":"D4","style":"standard","stem":"Which principle ensures improvements are tied back to stakeholder outcomes rather than activity for its own sake?","options":["Keep it simple and practical","Focus on value","Optimize and automate","Start where you are"],"answer":1,"explain":"'Focus on value' keeps everything anchored to stakeholder outcomes.","id":176,"hash":"b0ee17b049"},{"domain":"D4","style":"standard","stem":"Which principle is BEST applied when you discover a complex, redundant approval chain?","options":["Collaborate and promote visibility","Think and work holistically","Keep it simple and practical","Optimize and automate"],"answer":2,"explain":"Simplifying a redundant approval chain is 'keep it simple and practical'.","id":177,"hash":"aa7fc2d577"},{"domain":"D4","style":"standard","stem":"Which principle would you apply to ensure that automation efforts maximize the value of human work?","options":["Keep it simple and practical","Focus on value","Start where you are","Optimize and automate"],"answer":3,"explain":"'Optimize and automate' aims to free people from repetitive work so they focus on higher-value tasks.","id":178,"hash":"3b8d3115bd"},{"domain":"D4","style":"list","stem":"Which TWO principles together best support continual improvement using current capabilities? (Choose two.)","options":["Start where you are","Progress iteratively with feedback","Centralize and control","Measure everything"],"answer":[0,1],"explain":"'Start where you are' (assess current state) and 'progress iteratively with feedback' (improve in increments) jointly underpin continual improvement.","id":179,"hash":"1c7bbdf9d1"},{"domain":"D4","style":"standard","stem":"Which principle reminds practitioners that some existing practices can be carried forward rather than reinvented?","options":["Optimize and automate","Start where you are","Focus on value","Keep it simple and practical"],"answer":1,"explain":"'Start where you are' encourages leveraging what already works.","id":180,"hash":"3577822f1d"},{"domain":"D4","style":"standard","stem":"Why should the guiding principles be considered together rather than individually?","options":["They contradict one another","Only one can ever apply","Most are relevant in any situation and reinforce one another","They are ranked and only the top one matters"],"answer":2,"explain":"The principles are complementary; most apply simultaneously and reinforce each other.","id":181,"hash":"607deb8a02"},{"domain":"D4","style":"standard","stem":"Which principle would you invoke to challenge collecting metrics that nobody uses?","options":["Think and work holistically","Focus on value","Optimize and automate","Keep it simple and practical"],"answer":3,"explain":"Collecting unused metrics adds no value, so 'keep it simple and practical' would challenge it (with support from 'focus on value').","id":182,"hash":"46fc78ef8e"},{"domain":"D4","style":"standard","stem":"A service improvement reduces incident volume but increases supplier costs sharply. Which principle helps weigh this trade-off?","options":["Think and work holistically","Keep it simple and practical","Start where you are","Collaborate and promote visibility"],"answer":0,"explain":"'Think and work holistically' ensures trade-offs across the whole system are considered.","id":183,"hash":"8497bef8ca"},{"domain":"D4","style":"standard","stem":"Which principle most directly informs the decision to reuse an existing CMDB instead of buying a new tool?","options":["Focus on value","Optimize and automate","Start where you are","Keep it simple and practical"],"answer":2,"explain":"Reusing existing capabilities such as a CMDB reflects 'start where you are'.","id":184,"hash":"c715addfbb"},{"domain":"D4","style":"standard","stem":"Which principle supports giving stakeholders clear, timely information about work in progress?","options":["Optimize and automate","Focus on value","Keep it simple and practical","Collaborate and promote visibility"],"answer":3,"explain":"Sharing clear, timely information is part of 'collaborate and promote visibility'.","id":185,"hash":"995c61aeaa"},{"domain":"D5","style":"standard","stem":"What are the six activities of the service value chain?","options":["Plan; Improve; Engage; Design and transition; Obtain/build; Deliver and support","Strategy; Design; Transition; Operation; Improvement; Governance","Identify; Assess; Plan; Implement; Review; Close","Detect; Diagnose; Repair; Recover; Restore; Report"],"answer":0,"explain":"The six service value chain activities are: Plan; Improve; Engage; Design and transition; Obtain/build; and Deliver and support.","id":186,"hash":"51b04b01a0"},{"domain":"D5","style":"standard","stem":"What is the purpose of the 'Plan' value chain activity?","options":["To handle incidents","To ensure a shared understanding of the vision, current status, and improvement direction for all four dimensions and products/services","To build software","To engage with suppliers only"],"answer":1,"explain":"'Plan' ensures a shared understanding of the vision, current status, and improvement direction for all four dimensions and all products and services across the organization.","id":187,"hash":"d827168b00"},{"domain":"D5","style":"standard","stem":"What is the purpose of the 'Improve' value chain activity?","options":["To design new services only","To deliver services to users","To procure hardware","To ensure continual improvement of products, services, and practices across all value chain activities and the four dimensions"],"answer":3,"explain":"'Improve' ensures continual improvement of products, services, and practices across all value chain activities and the four dimensions of service management.","id":188,"hash":"a107426a49"},{"domain":"D5","style":"standard","stem":"What is the purpose of the 'Engage' value chain activity?","options":["To provide a good understanding of stakeholder needs, transparency, and continual engagement with all stakeholders","To write code","To deploy releases","To improve processes only"],"answer":0,"explain":"'Engage' provides a good understanding of stakeholder needs, ongoing transparency, and continual engagement and good relationships with all stakeholders.","id":189,"hash":"2672bcda79"},{"domain":"D5","style":"standard","stem":"What is the purpose of the 'Design and transition' value chain activity?","options":["To resolve incidents","To ensure products and services continually meet stakeholder expectations for quality, costs, and time to market","To engage suppliers","To plan the organization's vision"],"answer":1,"explain":"'Design and transition' ensures products and services continually meet stakeholder expectations for quality, costs, and time to market.","id":190,"hash":"9284916f58"},{"domain":"D5","style":"standard","stem":"What is the purpose of the 'Obtain/build' value chain activity?","options":["To set the organizational vision","To handle user requests","To ensure service components are available when and where needed and meet agreed specifications","To engage with customers"],"answer":2,"explain":"'Obtain/build' ensures that service components are available when and where they are needed and that they meet agreed specifications.","id":191,"hash":"f7bb14d583"},{"domain":"D5","style":"standard","stem":"What is the purpose of the 'Deliver and support' value chain activity?","options":["To ensure services are delivered and supported according to agreed specifications and stakeholders' expectations","To design services","To plan improvements","To build components"],"answer":0,"explain":"'Deliver and support' ensures services are delivered and supported according to agreed specifications and stakeholders' expectations.","id":192,"hash":"5fa919e5d4"},{"domain":"D5","style":"standard","stem":"The service value chain is best described as:","options":["A rigid, linear sequence that must always run in the same order","A flexible operating model whose activities combine in different sequences (value streams) to respond to demand","A list of all ITIL practices","The same as continual improvement"],"answer":1,"explain":"The value chain is a flexible operating model. Its activities are combined into different value streams depending on the scenario, not a single fixed sequence.","id":193,"hash":"5586d9d13e"},{"domain":"D5","style":"standard","stem":"What is a 'value stream' in ITIL 4?","options":["A single value chain activity","A type of supplier contract","A series of steps an organization undertakes to create and deliver products and services to consumers","A guiding principle"],"answer":2,"explain":"A value stream is a series of steps an organization uses to create and deliver products and services; value streams are specific combinations of value chain activities.","id":194,"hash":"b104df26ff"},{"domain":"D5","style":"standard","stem":"Each value chain activity transforms inputs into outputs by using which of the following?","options":["Only the service desk","Only governance","Only suppliers","Practices (combinations of which contribute to each activity)"],"answer":3,"explain":"Value chain activities use practices to convert inputs into outputs. Multiple practices may contribute to a single activity, and a practice may support many activities.","id":195,"hash":"99a1ee640f"},{"domain":"D5","style":"standard","stem":"Which value chain activity is primarily responsible for understanding and continually engaging stakeholders?","options":["Plan","Engage","Obtain/build","Improve"],"answer":1,"explain":"'Engage' is focused on understanding stakeholder needs and maintaining ongoing, transparent relationships.","id":196,"hash":"0fdb8af370"},{"domain":"D5","style":"standard","stem":"Which value chain activity would most directly handle the development or procurement of new service components?","options":["Plan","Engage","Obtain/build","Improve"],"answer":2,"explain":"'Obtain/build' ensures service components are obtained or built to specification and available when needed.","id":197,"hash":"b00f913ac3"},{"domain":"D5","style":"standard","stem":"Which value chain activity ensures services are operated and supported day-to-day?","options":["Improve","Design and transition","Plan","Deliver and support"],"answer":3,"explain":"'Deliver and support' covers ongoing delivery and support of services to meet agreed expectations.","id":198,"hash":"b94cbd6571"},{"domain":"D5","style":"standard","stem":"Which value chain activity sets the vision and direction across all four dimensions?","options":["Plan","Engage","Deliver and support","Obtain/build"],"answer":0,"explain":"'Plan' establishes shared vision, current status, and improvement direction across the four dimensions and the portfolio.","id":199,"hash":"1e2d1dad2e"},{"domain":"D5","style":"standard","stem":"Which value chain activity ensures continual improvement across all activities and dimensions?","options":["Engage","Plan","Improve","Deliver and support"],"answer":2,"explain":"'Improve' drives continual improvement of products, services, and practices across the value chain and the four dimensions.","id":200,"hash":"bf6ae6501f"},{"domain":"D5","style":"standard","stem":"How do the service value chain and practices relate?","options":["Practices replace the value chain","Practices and value chain activities are identical","Each activity uses exactly one practice","Practices are applied within value chain activities; a practice can support several activities and an activity can draw on several practices"],"answer":3,"explain":"Practices are the resources that support value chain activities. The relationship is many-to-many: one practice can support multiple activities and vice versa.","id":201,"hash":"53ee565128"},{"domain":"D5","style":"standard","stem":"Which statement about the order of value chain activities is correct?","options":["Their sequence varies by value stream; activities can be combined in many different ways","They always execute Plan → Design → Build → Deliver in that fixed order","Only one activity can run at a time","Engage must always be last"],"answer":0,"explain":"Value chain activities are not a fixed pipeline; value streams combine them in varied sequences to meet specific needs.","id":202,"hash":"c0198ccd4b"},{"domain":"D5","style":"list","stem":"Which TWO of the following are service value chain activities? (Choose two.)","options":["Engage","Strategy","Improve","Operation"],"answer":[0,2],"explain":"'Engage' and 'Improve' are value chain activities. 'Strategy' and 'Operation' are lifecycle stages from ITIL v3, not value chain activities.","id":203,"hash":"9989b1c580"},{"domain":"D5","style":"negative","stem":"Which of the following is NOT a service value chain activity?","options":["Plan","Engage","Deploy","Improve"],"answer":2,"explain":"'Deploy' is not a value chain activity (deployment is a practice). The six activities are Plan, Improve, Engage, Design and transition, Obtain/build, and Deliver and support.","id":204,"hash":"669bc9a8db"},{"domain":"D5","style":"missing","stem":"Complete the activity name: 'Design and ____.'","options":["transition","deliver","build","engage"],"answer":0,"explain":"The full activity name is 'Design and transition'.","id":205,"hash":"cd37a01a41"},{"domain":"D5","style":"standard","stem":"A customer raises a new requirement. Which value chain activity is the natural entry point for capturing it?","options":["Obtain/build","Engage","Improve","Deliver and support"],"answer":1,"explain":"'Engage' captures stakeholder needs and requirements as the interface with stakeholders.","id":206,"hash":"eeb74e88d5"},{"domain":"D5","style":"standard","stem":"Which value chain activity would oversee turning a design into a working, transitioned service?","options":["Improve","Engage","Plan","Design and transition"],"answer":3,"explain":"'Design and transition' takes designs through to live, expectation-meeting services.","id":207,"hash":"475a5c4a31"},{"domain":"D5","style":"standard","stem":"A monitoring alert triggers support work to restore a service. Which activity is primarily engaged?","options":["Deliver and support","Plan","Improve","Obtain/build"],"answer":0,"explain":"Restoring and supporting live services is 'Deliver and support'.","id":208,"hash":"12d9bc4f7d"},{"domain":"D5","style":"standard","stem":"Which activity ensures the organization knows its current state and target direction holistically?","options":["Engage","Plan","Obtain/build","Deliver and support"],"answer":1,"explain":"'Plan' provides shared understanding of vision, status, and direction across the four dimensions.","id":209,"hash":"fa736ba944"},{"domain":"D5","style":"standard","stem":"Which activity drives the ongoing reduction of recurring issues and waste?","options":["Obtain/build","Engage","Improve","Design and transition"],"answer":2,"explain":"'Improve' continually enhances products, services, and practices.","id":210,"hash":"604564a462"},{"domain":"D5","style":"standard","stem":"Procuring a component from a supplier falls under which activity?","options":["Obtain/build","Engage","Plan","Improve"],"answer":0,"explain":"Obtaining/procuring or building components is 'Obtain/build'.","id":211,"hash":"1b6468d767"},{"domain":"D5","style":"standard","stem":"Which statement correctly characterizes the value chain?","options":["A fixed lifecycle","An operating model of six interconnected activities forming value streams","A single practice","A governance body"],"answer":1,"explain":"The value chain is an operating model of six interconnected activities combined into value streams.","id":212,"hash":"de83c73084"},{"domain":"D5","style":"standard","stem":"Which activity is concerned with stakeholder relationships and demand understanding?","options":["Improve","Obtain/build","Engage","Design and transition"],"answer":2,"explain":"'Engage' handles stakeholder relationships and understanding demand.","id":213,"hash":"ab1dc1bda7"},{"domain":"D5","style":"standard","stem":"Each value chain activity receives inputs and produces outputs that may feed:","options":["Only the next activity in a strict line","Nothing","Only governance","Other value chain activities or external stakeholders, in flexible ways"],"answer":3,"explain":"Outputs can flow to other activities or stakeholders depending on the value stream, not a strict line.","id":214,"hash":"a227abda27"},{"domain":"D5","style":"standard","stem":"Which is true about practices supporting value chain activities?","options":["A practice supports only one activity","A single practice can contribute to multiple activities","Activities cannot use practices","Each activity uses all 34 practices equally"],"answer":1,"explain":"Practices have a many-to-many relationship with activities; one practice can support several activities.","id":215,"hash":"71b1fec8b3"},{"domain":"D5","style":"list","stem":"Which two activities are most directly involved in creating a brand-new service from a requirement? (Choose two.)","options":["Design and transition","Obtain/build","Improve","Engage"],"answer":[0,1],"explain":"Designing/transitioning the service and obtaining/building its components are central to creating a new service.","id":216,"hash":"d09d80aa7f"},{"domain":"D5","style":"standard","stem":"Which activity ensures quality, cost, and time-to-market expectations are met as services are introduced or changed?","options":["Plan","Engage","Design and transition","Deliver and support"],"answer":2,"explain":"'Design and transition' targets quality, cost, and time-to-market for new/changed services.","id":217,"hash":"a3d1097a3b"},{"domain":"D5","style":"standard","stem":"A value stream is BEST described as:","options":["A fixed set of suppliers","A type of governance","A single guiding principle","A specific combination of value chain activities to deliver a particular outcome"],"answer":3,"explain":"A value stream is a tailored sequence of value chain activities producing a specific product/service outcome.","id":218,"hash":"de054e7990"},{"domain":"D5","style":"standard","stem":"Which activity would coordinate continual improvement registers and initiatives?","options":["Improve","Plan","Engage","Obtain/build"],"answer":0,"explain":"'Improve' coordinates continual improvement activity across the organization.","id":219,"hash":"77ef63189a"},{"domain":"D5","style":"standard","stem":"Why is the value chain called 'central' to the SVS?","options":["It is the only component","It replaces governance","It is the operating model that the other SVS components support and enable","It is optional"],"answer":2,"explain":"The value chain is the central operating model; guiding principles, governance, practices, and continual improvement all support it.","id":220,"hash":"6f535c567e"},{"domain":"D6","style":"standard","stem":"ITIL 4 groups its 34 management practices into how many categories, and what are they?","options":["Two: technical and non-technical","Five, matching the SVS components","Four: plan, build, run, improve","Three: general management practices, service management practices, and technical management practices"],"answer":3,"explain":"ITIL 4's 34 practices fall into three categories: general management practices (14), service management practices (17), and technical management practices (3).","id":221,"hash":"351e621419"},{"domain":"D6","style":"standard","stem":"How many general management practices are defined in ITIL 4?","options":["14","17","3","7"],"answer":0,"explain":"There are 14 general management practices, adapted from general business management domains.","id":222,"hash":"8bf00cb4b0"},{"domain":"D6","style":"standard","stem":"How many service management practices are defined in ITIL 4?","options":["14","17","3","34"],"answer":1,"explain":"There are 17 service management practices, developed in service management and ITSM industries.","id":223,"hash":"1abdade351"},{"domain":"D6","style":"standard","stem":"How many technical management practices are defined in ITIL 4?","options":["17","7","14","3"],"answer":3,"explain":"There are 3 technical management practices, adapted from technology management domains for service management purposes.","id":224,"hash":"d8dd755ec5"},{"domain":"D6","style":"standard","stem":"What is a 'practice' in ITIL 4?","options":["A set of organizational resources designed for performing work or accomplishing an objective","A single automated task","A type of supplier contract","A guiding principle"],"answer":0,"explain":"A practice is a set of organizational resources designed for performing work or accomplishing an objective.","id":225,"hash":"dd50939349"},{"domain":"D6","style":"standard","stem":"What is the purpose of the incident management practice?","options":["To identify the root cause of problems","To minimize the negative impact of incidents by restoring normal service operation as quickly as possible","To authorize changes to the environment","To manage the lifecycle of all service requests"],"answer":1,"explain":"Incident management aims to minimize the negative impact of incidents by restoring normal service operation as quickly as possible.","id":226,"hash":"aeefc66c8a"},{"domain":"D6","style":"standard","stem":"How does ITIL 4 define an 'incident'?","options":["A planned change to a service","A cause, or potential cause, of one or more incidents","An unplanned interruption to a service, or reduction in the quality of a service","A request from a user for something to be provided"],"answer":2,"explain":"An incident is an unplanned interruption to a service or reduction in the quality of a service.","id":227,"hash":"85942cfd1f"},{"domain":"D6","style":"standard","stem":"Which technique is recommended for handling incidents that cannot be resolved quickly by the initial support level?","options":["Escalation (e.g., to support teams with specific expertise) and possibly swarming","Deleting the incident record","Ignoring it until it self-resolves","Converting it directly into a change"],"answer":0,"explain":"Incidents may be escalated to teams with the right expertise; ITIL also notes collaborative techniques like swarming for complex incidents.","id":228,"hash":"755df29206"},{"domain":"D6","style":"standard","stem":"Major incidents typically require:","options":["No special handling","A separate procedure with shorter timescales and greater urgency, often a dedicated team","Automatic closure","Conversion to a standard change"],"answer":1,"explain":"Major incidents have higher impact/urgency and usually follow a separate procedure with tighter timescales and dedicated coordination.","id":229,"hash":"ba447f0aa9"},{"domain":"D6","style":"standard","stem":"What is the purpose of the problem management practice?","options":["To restore service as quickly as possible","To authorize all changes","To reduce the likelihood and impact of incidents by identifying actual and potential causes, and managing workarounds and known errors","To handle service requests"],"answer":2,"explain":"Problem management reduces the likelihood and impact of incidents by identifying actual and potential causes of incidents and managing workarounds and known errors.","id":230,"hash":"f5a6b2ab29"},{"domain":"D6","style":"standard","stem":"How does ITIL 4 define a 'problem'?","options":["An unplanned interruption to a service","A request for change","A known error with a workaround","A cause, or potential cause, of one or more incidents"],"answer":3,"explain":"A problem is a cause, or potential cause, of one or more incidents.","id":231,"hash":"4ff6905324"},{"domain":"D6","style":"standard","stem":"What is a 'known error' in problem management?","options":["An incident that has been closed","A problem that has been analyzed but not resolved","A change that failed","A service request"],"answer":1,"explain":"A known error is a problem that has been analyzed but has not been resolved. Information about it is recorded for future use.","id":232,"hash":"9daab109f7"},{"domain":"D6","style":"standard","stem":"What is a 'workaround'?","options":["A permanent fix to a problem","The closure of an incident","A solution that reduces or eliminates the impact of an incident or problem for which a full resolution is not yet available","A type of change request"],"answer":2,"explain":"A workaround is a solution that reduces or eliminates the impact of an incident or problem for which a full resolution is not yet available.","id":233,"hash":"114ac4d91e"},{"domain":"D6","style":"standard","stem":"Problem management has three phases. Which set is correct?","options":["Detect, diagnose, repair","Open, in progress, closed","Plan, do, check","Problem identification, problem control, and error control"],"answer":3,"explain":"Problem management comprises problem identification, problem control (including analysis and workarounds), and error control (managing known errors and potential permanent resolutions).","id":234,"hash":"f1abb3cf93"},{"domain":"D6","style":"standard","stem":"What is the key difference between incident management and problem management?","options":["Incident management restores service quickly; problem management addresses the underlying causes to prevent recurrence","They are identical","Problem management restores service; incident management finds causes","Neither deals with incidents"],"answer":0,"explain":"Incident management focuses on rapid restoration of service; problem management focuses on identifying and removing causes to reduce future incidents.","id":235,"hash":"fbde565c89"},{"domain":"D6","style":"standard","stem":"What is the purpose of the change enablement practice?","options":["To maximize the number of changes regardless of risk","To eliminate all changes","To maximize the number of successful service and product changes by ensuring risks are properly assessed, authorizing changes to proceed, and managing the change schedule","To restore service after incidents"],"answer":2,"explain":"Change enablement maximizes the number of successful changes by ensuring risks are assessed, authorizing changes, and managing the change schedule.","id":236,"hash":"a468f4b57c"},{"domain":"D6","style":"standard","stem":"ITIL 4 defines three types of change. Which set is correct?","options":["Major, minor, trivial","Open, closed, deferred","Planned, unplanned, failed","Standard, normal, and emergency"],"answer":3,"explain":"The three change types are standard (pre-authorized, low risk), normal (assessed and authorized via the change authority), and emergency (must be implemented urgently).","id":237,"hash":"d6b2f0c7d2"},{"domain":"D6","style":"standard","stem":"Which change type is pre-authorized, low-risk, and follows a documented procedure?","options":["Standard change","Normal change","Emergency change","Major change"],"answer":0,"explain":"A standard change is pre-authorized, low-risk, well-understood, and follows a documented procedure (often automated).","id":238,"hash":"fb4fd544e5"},{"domain":"D6","style":"standard","stem":"Which change type must be assessed, authorized, and scheduled via a defined change authority?","options":["Standard change","Normal change","Emergency change","Pre-authorized change"],"answer":1,"explain":"Normal changes go through assessment, authorization, and scheduling. They may be low- or high-risk and use the appropriate change authority.","id":239,"hash":"3f7c47c6b6"},{"domain":"D6","style":"standard","stem":"Which change type is reserved for situations that must be resolved as soon as possible, such as a security patch?","options":["Standard change","Normal change","Routine change","Emergency change"],"answer":3,"explain":"Emergency changes must be implemented as soon as possible (e.g., to resolve a major incident or apply a critical security patch), often with an expedited assessment and authorization.","id":240,"hash":"0d2baa7c17"},{"domain":"D6","style":"standard","stem":"In ITIL 4, the person or group that authorizes a change is called the:","options":["Change authority","Change manager only","Service owner","Incident manager"],"answer":0,"explain":"A change authority is the person or group responsible for authorizing a change. The appropriate authority varies by change type and risk.","id":241,"hash":"4e9ab9e1f6"},{"domain":"D6","style":"standard","stem":"Why does ITIL 4 use the term 'change enablement' rather than 'change management'?","options":["They mean completely different things","To emphasize enabling beneficial changes to flow with appropriate control, rather than acting purely as a gatekeeper","Because change management was abolished","Because enablement excludes risk assessment"],"answer":1,"explain":"The term 'change enablement' stresses facilitating valuable changes with the right level of control and risk assessment, rather than simply blocking change.","id":242,"hash":"c0f80f200d"},{"domain":"D6","style":"standard","stem":"What is the purpose of the service request management practice?","options":["To handle unplanned interruptions","To authorize changes","To support the agreed quality of a service by handling all predefined, user-initiated service requests effectively and user-friendly","To find root causes"],"answer":2,"explain":"Service request management supports agreed service quality by handling all predefined, user-initiated service requests in an effective and user-friendly manner.","id":243,"hash":"5a54305fc5"},{"domain":"D6","style":"standard","stem":"How does ITIL 4 define a 'service request'?","options":["A request from a user or user's authorized representative that initiates a service action agreed as a normal part of service delivery","An unplanned interruption to a service","A cause of one or more incidents","An emergency change"],"answer":0,"explain":"A service request is a request from a user (or authorized representative) that initiates a service action which has been agreed as a normal part of service delivery.","id":244,"hash":"6598c05eb0"},{"domain":"D6","style":"standard","stem":"Which of the following is the BEST example of a service request?","options":["A server crash","A request for a password reset or access to an application","A network outage","A root-cause investigation"],"answer":1,"explain":"Service requests are normal, predefined actions such as access requests, information requests, or provisioning — not interruptions or failures.","id":245,"hash":"7bd0159f5d"},{"domain":"D6","style":"standard","stem":"Service requests are best fulfilled using which approach?","options":["Ad hoc, undocumented handling each time","Emergency change procedures","Standardized, often automated procedures and workflows, since requests are predefined and repeatable","Root-cause analysis"],"answer":2,"explain":"Because requests are predefined and repeatable, they should follow standardized, frequently automated procedures to maximize efficiency and consistency.","id":246,"hash":"dda9275f1b"},{"domain":"D6","style":"standard","stem":"What is the purpose of the service desk practice?","options":["To design new services","To manage suppliers","To authorize changes","To capture demand for incident resolution and service requests, and to be the entry point and single point of contact for users"],"answer":3,"explain":"The service desk captures demand for incident resolution and service requests and acts as the single point of contact between the service provider and its users.","id":247,"hash":"79c3ed40eb"},{"domain":"D6","style":"standard","stem":"Which of the following best describes a key role of the service desk beyond logging tickets?","options":["Eliminating the need for any other practice","Providing a clear path for users to report issues, ask questions, and make requests, and coordinating with other practices","Replacing problem management","Authorizing all emergency changes"],"answer":1,"explain":"The service desk is the communication hub for users — reporting, requesting, and getting acknowledgment — and coordinates with practices like incident and request management.","id":248,"hash":"eb98d7f3c1"},{"domain":"D6","style":"standard","stem":"A modern service desk may use which of the following channels?","options":["Only walk-up desks","Only postal mail","Phone, email, chat, self-service portals, chatbots, and walk-up, depending on the organization","Only fax"],"answer":2,"explain":"Service desks increasingly use multiple channels — phone, email, chat/chatbots, self-service portals, and walk-up support — to meet user needs.","id":249,"hash":"f6fe0b1e73"},{"domain":"D6","style":"standard","stem":"What is the purpose of the service level management practice?","options":["To find root causes","To restore failed services","To authorize changes","To set, monitor, and manage targets for service performance against agreed levels (SLAs) and to ensure services meet expectations"],"answer":3,"explain":"Service level management sets clear, business-based targets for service performance so delivery can be properly assessed, monitored, and managed against agreed service levels.","id":250,"hash":"0773c219a2"},{"domain":"D6","style":"standard","stem":"What is a service level agreement (SLA)?","options":["A documented agreement between a service provider and a customer that identifies both required services and the expected level of service","A list of incidents","A type of emergency change","A configuration item"],"answer":0,"explain":"An SLA is a documented agreement between a service provider and a customer that identifies both the services required and the expected level of service.","id":251,"hash":"f6823a2cb0"},{"domain":"D6","style":"standard","stem":"ITIL 4 warns against which common SLA pitfall, sometimes called the 'watermelon SLA'?","options":["Setting too few metrics","Using only customer feedback","Metrics that look green (meeting targets) while the customer experience is actually red (poor) — measuring the wrong things","Reviewing SLAs too often"],"answer":2,"explain":"The 'watermelon' effect describes SLAs that report green on technical metrics while customers are dissatisfied — a sign that the metrics don't reflect real outcomes.","id":252,"hash":"33cbe70135"},{"domain":"D6","style":"standard","stem":"Good SLAs should be based on what, according to ITIL 4?","options":["Only internal technical metrics chosen by IT","The provider's costs alone","The number of staff in the team","An outcome-based view that reflects the customer's perspective and is related to a defined service"],"answer":3,"explain":"Effective SLAs are outcome-based, reflect the customer's perspective, relate to a clearly defined service, and use balanced sets of metrics.","id":253,"hash":"bfc7c41621"},{"domain":"D6","style":"standard","stem":"What is the purpose of the continual improvement practice?","options":["To align the organization's practices and services with changing business needs through ongoing improvement of products, services, and practices","To restore service after incidents","To procure hardware","To authorize changes"],"answer":0,"explain":"Continual improvement aligns practices and services with changing business needs through the recurring identification and improvement of products, services, and practices.","id":254,"hash":"5b2ee848ef"},{"domain":"D6","style":"standard","stem":"Which model does ITIL 4 provide to structure improvement efforts?","options":["The PESTLE model","The continual improvement model (seven steps)","The RACI model","The Kano model"],"answer":1,"explain":"ITIL 4 offers the continual improvement model — a seven-step approach guiding improvement from vision through action and review.","id":255,"hash":"ef875df6d7"},{"domain":"D6","style":"standard","stem":"Which is the correct first step of the ITIL continual improvement model?","options":["Where are we now?","Take action","Did we get there?","What is the vision?"],"answer":3,"explain":"The first step is 'What is the vision?' — establishing the vision and linking it to business objectives.","id":256,"hash":"164264eb97"},{"domain":"D6","style":"standard","stem":"Place these continual improvement model steps in order: (1) Where are we now? (2) What is the vision? (3) Where do we want to be?","options":["2, 1, 3","1, 2, 3","3, 2, 1","2, 3, 1"],"answer":0,"explain":"The order is: What is the vision? → Where are we now? → Where do we want to be? → How do we get there? → Take action → Did we get there? → How do we keep the momentum going?","id":257,"hash":"d8533667f6"},{"domain":"D6","style":"standard","stem":"What is the final step of the continual improvement model?","options":["What is the vision?","How do we keep the momentum going?","Take action","Where are we now?"],"answer":1,"explain":"The seventh and final step is 'How do we keep the momentum going?' — embedding improvements and sustaining the cycle.","id":258,"hash":"ce67271094"},{"domain":"D6","style":"standard","stem":"Maintaining a continual improvement register (CIR) helps an organization to:","options":["Delete improvement ideas","Avoid measuring anything","Capture, document, track, and prioritize improvement opportunities","Replace governance"],"answer":2,"explain":"A CIR is used to capture and track improvement ideas and opportunities, supporting prioritization and follow-through.","id":259,"hash":"2e5f2a403a"},{"domain":"D6","style":"standard","stem":"What is the purpose of the relationship management practice?","options":["To establish and nurture links between the organization and its stakeholders at strategic and tactical levels","To restore failed services","To find root causes","To authorize changes"],"answer":0,"explain":"Relationship management establishes and nurtures the links between the organization and its stakeholders at strategic and tactical levels.","id":260,"hash":"5ed33b2090"},{"domain":"D6","style":"standard","stem":"What is the purpose of the supplier management practice?","options":["To resolve incidents","To ensure the organization's suppliers and their performance are managed appropriately to support seamless quality products and services","To set SLAs with customers","To find root causes"],"answer":1,"explain":"Supplier management ensures suppliers and their performance are managed appropriately to support the provision of seamless, quality products and services.","id":261,"hash":"868b854379"},{"domain":"D6","style":"standard","stem":"What is the purpose of the information security management practice?","options":["To authorize changes","To restore service after incidents","To protect the information needed by the organization to conduct its business, covering confidentiality, integrity, and availability","To handle service requests"],"answer":2,"explain":"Information security management protects the information the organization needs to conduct business, addressing confidentiality, integrity, availability, and related aspects like authentication and non-repudiation.","id":262,"hash":"e0318ff6d5"},{"domain":"D6","style":"standard","stem":"The classic information security triad consists of:","options":["Plan, do, check","Cost, risk, and value","People, process, and technology","Confidentiality, integrity, and availability"],"answer":3,"explain":"The 'CIA' triad — confidentiality, integrity, and availability — is central to information security management.","id":263,"hash":"453f9cf70c"},{"domain":"D6","style":"standard","stem":"What is the purpose of the service configuration management practice?","options":["To restore service quickly","To ensure accurate and reliable information about the configuration of services, and the CIs that support them, is available when and where needed","To handle service requests","To set SLAs"],"answer":1,"explain":"Service configuration management ensures that accurate, reliable information about the configuration of services and the configuration items (CIs) supporting them is available when and where it is needed.","id":264,"hash":"0052bf1668"},{"domain":"D6","style":"standard","stem":"What is a configuration item (CI)?","options":["A type of change","An unplanned interruption","Any component that needs to be managed in order to deliver an IT service","A guiding principle"],"answer":2,"explain":"A CI is any component that needs to be managed in order to deliver an IT service. CIs are recorded in a configuration management system/CMDB.","id":265,"hash":"d0b788cc50"},{"domain":"D6","style":"standard","stem":"What is the purpose of the IT asset management practice?","options":["To authorize all changes","To restore service after incidents","To find root causes","To plan and manage the full lifecycle of all IT assets to maximize value, control costs, manage risks, and support decision-making about reuse and retirement"],"answer":3,"explain":"IT asset management plans and manages the full lifecycle of IT assets to maximize value, control costs, manage risks, and support decisions about purchase, reuse, and retirement.","id":266,"hash":"af6442b117"},{"domain":"D6","style":"standard","stem":"What is an 'IT asset'?","options":["Any financially valuable component that can contribute to the delivery of an IT product or service","Only physical hardware","Only software licenses","An incident record"],"answer":0,"explain":"An IT asset is any financially valuable component that can contribute to delivering an IT product or service — including hardware, software, networking, and cloud resources.","id":267,"hash":"6e0a768193"},{"domain":"D6","style":"standard","stem":"What is the purpose of the monitoring and event management practice?","options":["To set SLAs","To restore service after incidents only","To systematically observe services and components, and record and report selected changes of state identified as events","To manage suppliers"],"answer":2,"explain":"Monitoring and event management systematically observes services and CIs, and records and reports selected changes of state identified as events.","id":268,"hash":"51ba07d454"},{"domain":"D6","style":"standard","stem":"How does ITIL 4 define an 'event'?","options":["An unplanned interruption to a service","A known error","A request for change","Any change of state that has significance for the management of a service or other configuration item"],"answer":3,"explain":"An event is any change of state that has significance for the management of a service or other configuration item.","id":269,"hash":"a0c01ce2dc"},{"domain":"D6","style":"standard","stem":"Events are often categorized as informational, warning, and:","options":["Exception","Emergency","Standard","Normal"],"answer":0,"explain":"Events are commonly classified as informational, warning, and exception. Exceptions indicate something is operating abnormally and may require action.","id":270,"hash":"9e71d81dd6"},{"domain":"D6","style":"standard","stem":"What is the purpose of the deployment management practice?","options":["To authorize changes","To move new or changed hardware, software, documentation, processes, or any other component to live (or test) environments","To find root causes","To set SLAs"],"answer":1,"explain":"Deployment management moves new or changed components (hardware, software, documentation, processes, etc.) to live environments — and to other environments such as test or staging.","id":271,"hash":"d4fc20eca1"},{"domain":"D6","style":"standard","stem":"What is the purpose of the release management practice?","options":["To find root causes","To move components into the live environment technically","To restore service after incidents","To make new and changed services and features available for use"],"answer":3,"explain":"Release management makes new and changed services and features available for use, coordinating when functionality is made available to users.","id":272,"hash":"ab7e2f1b4a"},{"domain":"D6","style":"standard","stem":"What is the key distinction between deployment management and release management in ITIL 4?","options":["Deployment moves components to an environment; release controls making functionality available for use — they can occur at different times","They are the same practice","Release moves components; deployment makes them available","Neither involves the live environment"],"answer":0,"explain":"Deployment is about moving components into environments; release is about making functionality available to users. A component can be deployed but not yet released (e.g., behind a feature flag).","id":273,"hash":"807c0a4601"},{"domain":"D6","style":"standard","stem":"Into which category does 'incident management' fall?","options":["General management practices","Service management practices","Technical management practices","It is not a practice"],"answer":1,"explain":"Incident management is a service management practice.","id":274,"hash":"859b19445a"},{"domain":"D6","style":"standard","stem":"Into which category does 'continual improvement' fall?","options":["Technical management practices","Service management practices","General management practices","It is not a practice"],"answer":2,"explain":"Continual improvement is a general management practice (it is also a component of the SVS).","id":275,"hash":"de79b72e23"},{"domain":"D6","style":"standard","stem":"Into which category does 'deployment management' fall?","options":["Technical management practices","Service management practices","General management practices","It is not a practice"],"answer":0,"explain":"Deployment management is one of the three technical management practices (with infrastructure and platform management, and software development and management).","id":276,"hash":"2c714d6813"},{"domain":"D6","style":"standard","stem":"Which of the following are the three technical management practices?","options":["Incident, problem, and change","Deployment management; infrastructure and platform management; software development and management","Supplier, relationship, and risk","Plan, improve, and engage"],"answer":1,"explain":"The three technical management practices are deployment management; infrastructure and platform management; and software development and management.","id":277,"hash":"4e86563502"},{"domain":"D6","style":"standard","stem":"Which of the following is a general management practice?","options":["Incident management","Service desk","Risk management","Deployment management"],"answer":2,"explain":"Risk management is a general management practice. Incident management and service desk are service management practices; deployment management is technical.","id":278,"hash":"7baf5f4d00"},{"domain":"D6","style":"standard","stem":"Which of the following is a service management practice?","options":["Risk management","Information security management","Workforce and talent management","Service request management"],"answer":3,"explain":"Service request management is a service management practice. Risk, information security, and workforce/talent management are general management practices.","id":279,"hash":"4d0b58ce2b"},{"domain":"D6","style":"standard","stem":"What is the purpose of the relationship management practice (restated)?","options":["To restore services","To nurture stakeholder links at strategic and tactical levels","To find causes","To deploy software"],"answer":1,"explain":"Relationship management establishes and nurtures links with stakeholders at strategic and tactical levels.","id":280,"hash":"3a52cda034"},{"domain":"D6","style":"standard","stem":"Which practice is responsible for handling password resets and access provisioning as predefined actions?","options":["Problem management","Incident management","Service request management","Change enablement"],"answer":2,"explain":"Predefined, user-initiated actions such as access provisioning are handled by service request management.","id":281,"hash":"dff85cc1e2"},{"domain":"D6","style":"standard","stem":"Which practice restores normal service operation as quickly as possible?","options":["Service level management","Problem management","Change enablement","Incident management"],"answer":3,"explain":"Rapid restoration of normal service is the aim of incident management.","id":282,"hash":"78b9c0f03c"},{"domain":"D6","style":"standard","stem":"Which practice identifies the underlying causes of incidents?","options":["Problem management","Incident management","Service desk","Release management"],"answer":0,"explain":"Problem management identifies actual and potential causes of incidents.","id":283,"hash":"abdb91560d"},{"domain":"D6","style":"standard","stem":"Which practice authorizes and schedules changes while assessing risk?","options":["Deployment management","Release management","Change enablement","Incident management"],"answer":2,"explain":"Change enablement assesses risk, authorizes changes, and manages the change schedule.","id":284,"hash":"513b382759"},{"domain":"D6","style":"standard","stem":"Which practice is the single point of contact for users?","options":["Supplier management","Incident management","Problem management","Service desk"],"answer":3,"explain":"The service desk is the single point of contact between provider and users.","id":285,"hash":"562e58ab74"},{"domain":"D6","style":"standard","stem":"Which practice sets and manages service level targets with customers?","options":["Service level management","Supplier management","Relationship management","Incident management"],"answer":0,"explain":"Service level management agrees and manages targets for service performance with customers.","id":286,"hash":"2d9c877cbe"},{"domain":"D6","style":"standard","stem":"Which practice ensures accurate information about CIs is available?","options":["IT asset management","Service configuration management","Change enablement","Incident management"],"answer":1,"explain":"Service configuration management maintains accurate, reliable information about CIs.","id":287,"hash":"d92e78a367"},{"domain":"D6","style":"standard","stem":"Which practice manages the financial lifecycle of hardware and software assets?","options":["Release management","Service configuration management","Supplier management","IT asset management"],"answer":3,"explain":"IT asset management plans and manages the full lifecycle of financially valuable IT assets.","id":288,"hash":"ba30c2928f"},{"domain":"D6","style":"standard","stem":"Which practice systematically observes services and records significant state changes?","options":["Monitoring and event management","Incident management","Problem management","Service desk"],"answer":0,"explain":"Monitoring and event management observes services/CIs and records/report events.","id":289,"hash":"043e1fa1ce"},{"domain":"D6","style":"standard","stem":"Which practice makes new or changed functionality available to users?","options":["Deployment management","Release management","Change enablement","Incident management"],"answer":1,"explain":"Release management controls making functionality available for use.","id":290,"hash":"7f233887e6"},{"domain":"D6","style":"standard","stem":"Which practice moves components into live or test environments?","options":["Change enablement","Release management","Deployment management","Service desk"],"answer":2,"explain":"Deployment management moves new/changed components into environments.","id":291,"hash":"3dd1fd3299"},{"domain":"D6","style":"standard","stem":"Which practice protects confidentiality, integrity, and availability of information?","options":["Information security management","Risk management","Supplier management","Incident management"],"answer":0,"explain":"Information security management protects the CIA of organizational information.","id":292,"hash":"5749f180f5"},{"domain":"D6","style":"standard","stem":"Which practice manages relationships and performance with external providers?","options":["Relationship management","Supplier management","Service level management","Incident management"],"answer":1,"explain":"Supplier management oversees suppliers and their performance.","id":293,"hash":"ea996686ee"},{"domain":"D6","style":"standard","stem":"Which practice continually aligns services and practices with changing business needs?","options":["Service level management","Change enablement","Continual improvement","Problem management"],"answer":2,"explain":"Continual improvement keeps services and practices aligned with evolving needs.","id":294,"hash":"20d2253faf"},{"domain":"D6","style":"standard","stem":"A user reports they cannot log in because the authentication service is down for everyone. This is BEST classified as:","options":["A known error","A service request","A standard change","An incident"],"answer":3,"explain":"An unplanned outage affecting service is an incident, not a request.","id":295,"hash":"630cfb109d"},{"domain":"D6","style":"standard","stem":"A user asks to be granted access to a shared drive, a normal predefined action. This is BEST classified as:","options":["An incident","A service request","A problem","An emergency change"],"answer":1,"explain":"A predefined, user-initiated normal action is a service request.","id":296,"hash":"91ffd4ddd4"},{"domain":"D6","style":"standard","stem":"Repeated printer failures across the building, where the root cause is unknown, would prompt which practice to investigate?","options":["Release management","Service request management","Problem management","Supplier management"],"answer":2,"explain":"Recurring incidents with unknown cause are investigated by problem management.","id":297,"hash":"9af7c350d1"},{"domain":"D6","style":"standard","stem":"Applying a critical security patch immediately to stop an active exploit is which type of change?","options":["Pre-approved change","Standard change","Normal change","Emergency change"],"answer":3,"explain":"An urgent fix to an active threat is an emergency change.","id":298,"hash":"d721aff400"},{"domain":"D6","style":"standard","stem":"Adding a pre-approved, low-risk new laptop from a catalog using a documented procedure is which type of change?","options":["Standard change","Emergency change","Normal change","Major change"],"answer":0,"explain":"A documented, pre-authorized, low-risk action is a standard change.","id":299,"hash":"20a2ab065b"},{"domain":"D6","style":"standard","stem":"A workaround differs from a resolution because it:","options":["Permanently removes the cause","Closes the incident automatically","Reduces or removes impact without yet fully resolving the underlying problem","Is a type of change"],"answer":2,"explain":"A workaround mitigates impact while a full resolution is still pending.","id":300,"hash":"9e71c23e1a"},{"domain":"D6","style":"standard","stem":"Which document records a problem that has been analyzed but not resolved?","options":["SLA","Service request","Change schedule","Known error record"],"answer":3,"explain":"A known error record captures an analyzed-but-unresolved problem.","id":301,"hash":"731c8ee85d"},{"domain":"D6","style":"standard","stem":"Which practice would own the change schedule (formerly 'change calendar')?","options":["Change enablement","Release management","Deployment management","Incident management"],"answer":0,"explain":"Change enablement maintains the change schedule to coordinate and avoid conflicts.","id":302,"hash":"1c1cbad0b4"},{"domain":"D6","style":"standard","stem":"A 'watermelon SLA' indicates that:","options":["All metrics are red","Metrics are green but customers are unhappy","There are no metrics","The SLA is too short"],"answer":1,"explain":"Green-on-the-outside, red-on-the-inside metrics define the watermelon SLA problem.","id":303,"hash":"ea255ac9d3"},{"domain":"D6","style":"standard","stem":"Which set correctly lists ITIL 4's three change types?","options":["Open, pending, closed","Minor, major, critical","Planned, urgent, failed","Standard, normal, emergency"],"answer":3,"explain":"The three change types are standard, normal, and emergency.","id":304,"hash":"b99f4ed1c4"},{"domain":"D6","style":"standard","stem":"Which practice category is risk management part of?","options":["General management practices","Service management practices","Technical management practices","None"],"answer":0,"explain":"Risk management is a general management practice.","id":305,"hash":"e4121b7686"},{"domain":"D6","style":"standard","stem":"Which practice category is service desk part of?","options":["General management practices","Service management practices","Technical management practices","None"],"answer":1,"explain":"Service desk is a service management practice.","id":306,"hash":"af1ec8a46a"},{"domain":"D6","style":"standard","stem":"Which practice category is software development and management part of?","options":["General management practices","Service management practices","Technical management practices","None"],"answer":2,"explain":"Software development and management is a technical management practice.","id":307,"hash":"0730b0fcab"},{"domain":"D6","style":"standard","stem":"Which of the following is the BEST description of an event classified as 'exception'?","options":["An indication that something is operating abnormally and may require action","Routine confirmation that something works","A scheduled maintenance notice","A user request"],"answer":0,"explain":"Exception events indicate abnormal operation that may require a response.","id":308,"hash":"1f59401817"},{"domain":"D6","style":"standard","stem":"Which of the following is the BEST description of an 'informational' event?","options":["A failure requiring immediate action","A routine message that something completed or is operating normally","A breached SLA","An emergency change"],"answer":1,"explain":"Informational events are routine notifications that do not require action.","id":309,"hash":"45d60684e1"},{"domain":"D6","style":"standard","stem":"Which practice helps decide whether to reuse, redeploy, or retire hardware?","options":["Incident management","Service configuration management","IT asset management","Supplier management"],"answer":2,"explain":"Lifecycle decisions about reuse/retirement of assets are part of IT asset management.","id":310,"hash":"4375c7e5ac"},{"domain":"D6","style":"standard","stem":"Which practice provides the data foundation many other practices rely on for relationships between components?","options":["Release management","Incident management","Service level management","Service configuration management"],"answer":3,"explain":"Service configuration management provides CI information and relationships used widely across practices.","id":311,"hash":"075232c8c8"},{"domain":"D6","style":"standard","stem":"Which practice is MOST associated with measuring and improving customer satisfaction against agreed targets?","options":["Supplier management","Service level management","Deployment management","Problem management"],"answer":1,"explain":"Service level management tracks performance against agreed, customer-relevant targets.","id":312,"hash":"6bf7f6ea25"},{"domain":"D6","style":"standard","stem":"In ITIL 4, who typically acts as the entry point for both incidents and service requests?","options":["The problem manager","The change authority","The service desk","The supplier"],"answer":2,"explain":"The service desk is the single entry point/contact for incidents and requests.","id":313,"hash":"b11749c7c7"},{"domain":"D6","style":"standard","stem":"Which is the BEST reason to automate standard changes?","options":["To bypass all risk assessment","Because they require executive approval each time","Because they are emergencies","Because they are low-risk, repeatable, and pre-authorized, making automation safe and efficient"],"answer":3,"explain":"Standard changes are pre-authorized, low-risk, and repeatable, which makes them strong automation candidates.","id":314,"hash":"04a8b40547"},{"domain":"D6","style":"standard","stem":"Which practice would coordinate a major incident's communications and resolution under tighter timescales?","options":["Incident management (major incident procedure)","Problem management","Change enablement","Supplier management"],"answer":0,"explain":"Major incidents follow a distinct incident management procedure with tighter timescales and coordination.","id":315,"hash":"eff743f81c"},{"domain":"D6","style":"standard","stem":"A 'change authority' may differ depending on:","options":["The color of the change form","The time of day only","The type and risk of the change","The number of incidents"],"answer":2,"explain":"The appropriate change authority depends on the change type and its associated risk.","id":316,"hash":"2ce6f91f47"},{"domain":"D6","style":"standard","stem":"Which practice ensures predefined user requests are handled in a user-friendly, standardized way?","options":["Problem management","Incident management","Change enablement","Service request management"],"answer":3,"explain":"Service request management standardizes and streamlines predefined user requests.","id":317,"hash":"23aa57f6b4"},{"domain":"D6","style":"standard","stem":"Which statement about practices and the value chain is correct?","options":["Practices contrib
